<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="config.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 88px;
  --bg: #ffffff;
  --sidebar-bg: #f0f0ee;
  --border: #e2e2de;
  --text: #1c1c1a;
  --muted: #92928d;
  --header-bg: #fafaf8;
  --font: 'DM Sans', sans-serif;
  --shadow: 0 2px 16px rgba(0,0,0,0.09);
  --today-ring: #2c6bed;
  --kids: #22a06b;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  width: 100vw;
  display: flex;
  overflow: hidden;
  font-size: 13px;
}

.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 2px;
  flex-shrink: 0;
  z-index: 20;
  height: 100vh;
  overflow: hidden;
}


.nav-btn {
  width: 72px; height: 58px;
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  transition: background 0.13s, color 0.13s;
}
.nav-btn:hover { background: rgba(0,0,0,0.04); }
.nav-btn.active { background: #fff; color: var(--today-ring); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.nav-btn svg { width: 20px; height: 20px; }
.nav-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

.member-legend {
  margin-top: auto;
  display: flex; flex-direction: column;
  gap: 7px; align-items: center;
  padding-top: 10px;
}
.mdot {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  color: white;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s;
  position: relative;
}
.mdot:hover { transform: scale(1.12); }
.mdot.off { opacity: 0.28; }
.mdot-tip {
  position: absolute; left: 34px;
  background: #1c1c1a; color: white;
  font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 5px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.15s; z-index: 99;
}
.mdot:hover .mdot-tip { opacity: 1; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar {
  height: 80px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 15px;
  flex-shrink: 0;
}
.tb-left { display: flex; flex-direction: row; align-items: center; gap: 15px; }
.tb-season { font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 5px; color: var(--muted); }
.tb-season-icon { font-size: 18px; line-height: 1; }
.tb-title { font-size: 26px; font-weight: 400; line-height: 1; font-family: 'DM Serif Display', serif; letter-spacing: -0.01em; }
.tb-space { flex: 1; }

/* View dropdown — custom (native select opens upward on Kindle) */
.vdrop-wrap {
  position: relative; flex-shrink: 0;
}
.vdrop-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px; height: 44px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: var(--font);
  white-space: nowrap; min-width: 90px;
  justify-content: space-between;
  transition: background 0.12s;
}
.vdrop-btn:hover { background: var(--sidebar-bg); }
.vdrop-btn svg { flex-shrink: 0; transition: transform 0.2s; }
.vdrop-btn.open svg { transform: rotate(180deg); }
.vdrop-menu {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: var(--shadow);
  overflow: hidden; z-index: 500;
  min-width: 100%;
  opacity: 0; pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.vdrop-menu.open {
  opacity: 1; pointer-events: all;
  transform: translateY(0);
}
.vdrop-item {
  display: flex; align-items: center;
  padding: 14px 18px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; color: var(--text);
  transition: background 0.1s;
  white-space: nowrap;
}
.vdrop-item:hover { background: var(--sidebar-bg); }
.vdrop-item.active {
  color: var(--today-ring); font-weight: 700;
  background: #f0f6ff;
}

.arr-btn {
  width: 44px; height: 44px;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); transition: background 0.11s; flex-shrink: 0;
}
.arr-btn:hover { background: var(--sidebar-bg); }

.today-btn {
  padding: 0 16px; height: 44px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg);
  font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--text);
  transition: background 0.11s; white-space: nowrap;
  display: inline-flex; align-items: center;
}
.today-btn:hover { background: var(--sidebar-bg); }

.content { flex: 1; overflow: auto; position: relative; }

/* MONTH */
.mwrap { display: flex; flex-direction: column; height: 100%; }
.dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  border-bottom: 1px solid var(--border);
  background: var(--header-bg); flex-shrink: 0;
}
.dow-cell {
  text-align: center; padding: 6px 0;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted);
}
.mcells { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; }
.mcell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 5px 6px; cursor: pointer;
  transition: background 0.1s; overflow: hidden;
}
.mcell:hover { background: #f6f6f3; }
.mcell:nth-child(7n) { border-right: none; }
.mcell.other { background: #fafaf8; }
.mcell.other .dnum { color: #ccc; }
.mcell.is-today { background: #fffbf0; }

/* Month view wrapper with overlay support */
.month-rows-wrap { flex: 1; display: flex; flex-direction: column; }
.month-row {
  position: relative;
  display: grid;
  grid-template-columns: repeat(7,1fr);
  flex: 1;
}
/* Multi-day event overlay layer sits on top of cells */
.mday-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 2;
}
.mday-bar {
  position: absolute;
  height: 22px;
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center;
  padding: 0 5px 0 6px;
  border-radius: 6px;
  white-space: nowrap; overflow: visible;
  pointer-events: all; cursor: pointer;
  box-sizing: border-box;
  min-width: 8px;
  border-left: 3px solid;
}
.dnum {
  font-size: 12px; font-weight: 500;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 3px;
}
.is-today .dnum { background: var(--today-ring); color: #fff; font-weight: 600; }
.epill {
  font-size: 12px; font-weight: 500;
  padding: 3px 7px 3px 6px; border-radius: 6px;
  margin-bottom: 3px; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  overflow: visible;
}
.edot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.emore { font-size: 9px; color: var(--muted); font-weight: 500; }

/* WEEK */
.wwrap { display: flex; flex-direction: column; height: 100%; position: relative; }
.whead {
  display: grid; border-bottom: 1px solid var(--border);
  background: var(--header-bg); flex-shrink: 0;
}
.wh-sp { border-right: 1px solid var(--border); }
.wh-cell {
  padding: 8px 6px; text-align: center;
  border-right: 1px solid var(--border);
}
.wh-cell:last-child { border-right: none; }
.wh-dow { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
.wh-date {
  font-size: 18px; font-weight: 300;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin: 3px auto 0;
}
.wh-date.tod { background: var(--today-ring); color: #fff; font-weight: 600; }

.wbody { flex: 1; overflow-y: auto; display: flex; }
.tcol { width: 46px; flex-shrink: 0; border-right: 1px solid var(--border); }
.tlbl {
  height: 104px; display: flex;
  align-items: flex-start; justify-content: flex-end;
  padding: 2px 7px 0 0;
  font-size: 9px; color: var(--muted); font-weight: 600;
}
.dcols { flex: 1; display: grid; }
.dcol { border-right: 1px solid var(--border); position: relative; }
.dcol:last-child { border-right: none; }
.hslot { height: 104px; border-bottom: 1px solid #f0f0ec; position: relative; }
.hslot:last-child { border-bottom: none; }
.wev {
  position: absolute; left: 2px; right: 2px;
  border-radius: 12px; padding: 5px 7px;
  font-size: 15px; font-weight: 600;
  overflow: hidden; cursor: pointer; z-index: 2;
  line-height: 1.3;
}
.wev-t { font-size: 13px; font-weight: 400; color: rgba(0,0,0,0.55); }
.wev-loc { font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.now-line {
  position: absolute; left: 0; right: 0;
  height: 2px; z-index: 5; pointer-events: none;
}
.now-dot {
  position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
}

/* DAY */
.daywrap { display: flex; flex-direction: column; height: 100%; }
.dayhero {
  padding: 12px 18px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--header-bg);
  display: flex; align-items: baseline; gap: 10px; flex-shrink: 0;
}
.dayhero-n { font-family: 'DM Serif Display', serif; font-size: 38px; line-height: 1; }
.dayhero-dow { font-size: 14px; font-weight: 500; }
.dayhero-sub { font-size: 11px; color: var(--muted); }
.daybody { flex: 1; overflow-y: auto; display: flex; }
.dayinner { flex: 1; position: relative; }

/* AGENDA */
.agwrap { height: 100%; overflow-y: auto; }
.ag-hdr {
  position: sticky; top: 0;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex; align-items: center; gap: 10px; z-index: 5;
}
.ag-num {
  font-size: 20px; font-weight: 500;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0;
}
.ag-num.tod { background: var(--today-ring); color: #fff; }
.ag-dow { font-size: 12px; font-weight: 500; }
.ag-mon { font-size: 10px; color: var(--muted); }
.ag-evs { padding: 4px 16px; }
.ag-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.ag-row:last-child { border-bottom: none; }
.ag-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 32px; flex-shrink: 0; }
.ag-time { font-size: 10px; color: var(--muted); font-weight: 600; min-width: 80px; padding-top: 2px; }
.ag-title { font-size: 12px; font-weight: 500; }
.ag-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.ag-who { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-top: 3px; }
.ag-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 8px 0; }

/* TASKS */
.taskwrap { height: 100%; overflow-y: auto; padding: 16px; }
.sec-hd {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted);
  margin-bottom: 8px; margin-top: 4px;
}
.task-row {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px; background: var(--bg);
  border: 1px solid var(--border); border-radius: 9px;
  margin-bottom: 5px; cursor: pointer; transition: box-shadow 0.12s;
}
.task-row:hover { box-shadow: var(--shadow); }
.tck {
  width: 18px; height: 18px; border-radius: 50%;
  border: 1.5px solid var(--border); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.13s;
}
.tck.done { border-color: var(--kids); background: var(--kids); }
.ttxt { flex: 1; font-size: 12px; }
.ttxt.done { text-decoration: line-through; color: var(--muted); }
.tdue { font-size: 10px; color: var(--muted); font-weight: 500; }
.tdue.late { color: #d44b4b; }
.twho {
  width: 22px; height: 22px; border-radius: 50%;
  font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  color: white; flex-shrink: 0;
}

/* LISTS */
/* ── Lists — Top cylinder + Bottom content ─────────────────── */
.listwrap {
  height: 100%; display: flex; flex-direction: column; overflow: hidden;
}
/* Top: horizontal 3D cylinder selector */
.lsel-panel {
  height: 110px; flex-shrink: 0;
  background: var(--sidebar-bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  perspective: 900px;
  perspective-origin: 50% 50%;
  overflow: hidden;
  position: relative;
}
.lsel-scene {
  width: 100%;
  height: 80px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.48s cubic-bezier(0.4, 0, 0.2, 1);
}
.lsel-card {
  position: absolute;
  width: 110px;
  height: 80px;
  top: 0; left: 50%;
  margin-left: -55px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px; cursor: pointer;
  backface-visibility: hidden;
  transition: box-shadow 0.3s, opacity 0.3s;
  padding: 8px;
}
.lsel-card.lsel-focus {
  cursor: default;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  border-color: var(--today-ring);
  border-width: 2px;
}
.lsel-icon { font-size: 26px; line-height: 1; }
.lsel-name { font-size: 11px; font-weight: 600; color: var(--text); text-align: center; line-height: 1.2; }
/* Bottom: focused list content */
.lcontent-panel {
  flex: 1; min-width: 0; display: flex; flex-direction: column;
  overflow: hidden;
}
.lcontent-hd {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--header-bg);
}
.lcontent-icon { font-size: 24px; }
.lcontent-name { font-size: 17px; font-weight: 700; flex: 1; }
.lcontent-ct   { font-size: 12px; color: var(--muted); }
.lcontent-bd   { flex: 1; overflow-y: auto; padding: 8px 0; }
.litem { display: flex; align-items: center; gap: 12px; padding: 13px 20px; }
.licheck {
  width: 28px; height: 28px; border-radius: 8px;
  border: 1.5px solid var(--border); flex-shrink: 0;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.13s;
}
.licheck.done { background: #22a06b; border-color: #22a06b; }
.litxt { font-size: 16px; line-height: 1.3; }
.litxt.done { text-decoration: line-through; color: var(--muted); }

/* MEALS */
.mealwrap { height: 100%; overflow-y: auto; padding: 14px 16px; }
.meal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
.meal-day { display: flex; flex-direction: column; gap: 5px; }
.meal-day-lbl {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted);
  text-align: center; padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
.meal-day-lbl.tod-lbl { color: var(--today-ring); border-color: var(--today-ring); }
.mslot {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 8px;
  cursor: pointer; transition: box-shadow 0.12s; min-height: 52px;
}
.mslot:hover { box-shadow: var(--shadow); }
.mslot.tod-slot { border-color: #c5d8f8; background: #f5f8ff; }
.mtype { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
.mname { font-size: 11px; font-weight: 500; line-height: 1.3; }
.mempty { font-size: 10px; color: #ccc; font-style: italic; }

/* FAB */
.fab {
  position: fixed; bottom: 20px; right: 20px;
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--today-ring); color: white; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(44,107,237,.42);
  font-size: 26px; font-weight: 300; line-height: 1;
  z-index: 100; transition: transform 0.14s, box-shadow 0.14s;
}
.fab:hover { transform: scale(1.07); box-shadow: 0 6px 24px rgba(44,107,237,.52); }
.fab:active { transform: scale(0.96); }

/* MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.28);
  display: flex; align-items: center; justify-content: center;
  z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.18s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg); border-radius: 16px;
  width: 340px; max-width: 88vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden;
  transform: translateY(6px) scale(0.98); transition: transform 0.18s;
}
.overlay.open .modal { transform: none; }
.modal-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.modal-ttl { font-size: 14px; font-weight: 600; }
.modal-x {
  width: 26px; height: 26px; border-radius: 6px; border: none;
  background: var(--sidebar-bg); cursor: pointer;
  font-size: 14px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.modal-bd { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
.fld { display: flex; flex-direction: column; gap: 4px; }
.flbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
.fin {
  padding: 8px 11px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px;
  font-family: var(--font); color: var(--text);
  background: var(--bg); outline: none;
  transition: border-color 0.13s; width: 100%;
}
.fin:focus { border-color: var(--today-ring); }
.frow { display: flex; gap: 10px; }
.frow .fld { flex: 1; }
.ppicker { display: flex; gap: 8px; flex-wrap: wrap; }
.ppick {
  width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent;
  transition: transform 0.1s, border-color 0.1s;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: white;
}
.ppick.sel { border-color: #1c1c1a; transform: scale(1.1); }
.modal-ft {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px; align-items: center;
}
.btn { padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 500; font-family: var(--font); cursor: pointer; border: none; }
.btn-s { background: var(--sidebar-bg); color: var(--text); }
.btn-p { background: var(--today-ring); color: white; }
.btn:hover { opacity: 0.85; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Edit / Add event modal — larger and finger-friendly */
#ov .modal {
  width: min(580px, 92vw);
  max-height: 88vh;
  display: flex; flex-direction: column;
}
#ov .modal-hd { padding: 18px 22px; }
#ov .modal-ttl { font-size: 18px; font-weight: 600; }
#ov .modal-x { width: 36px; height: 36px; font-size: 18px; }
#ov .modal-bd { padding: 20px 22px; flex: 1; overflow-y: auto; gap: 16px; }
#ov .modal-ft { padding: 16px 22px; gap: 12px; }
#ov .fld { gap: 6px; }
#ov .flbl { font-size: 12px; }
#ov .fin { padding: 12px 14px; font-size: 15px; border-radius: 10px; }
#ov .frow { gap: 14px; }
#ov .btn { padding: 14px 20px; font-size: 14px; border-radius: 10px; }
#ov .ppick { width: 44px; height: 44px; font-size: 14px; border-width: 3px; }
#ov .ppicker { gap: 10px; }

/* ── Weather View ───────────────────────────────────────────── */
.wx-wrap {
  height: 100%; overflow-y: auto;
  background: var(--bg);
  color: var(--text); display: flex; flex-direction: column;

<script>
const T=new Date();

// Weather state — declared here so render() can reference them on first call

// Family members — edit via Settings screen

function mColor(name){ const m=members.find(m=>m.name===name); return m?m.color:'#888'; }

function colorToBg(hex){

  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lr=Math.round(r+(255-r)*0.82),lg=Math.round(g+(255-g)*0.82),lb=Math.round(b+(255-b)*0.82);

}

const MOS=['January','February','March','April','May','June','July','August','September','October','November','December'];

let evs=[

const fmt=d=>d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
// Convert HH:MM(:SS) stored time to 12-hour display string e.g. "8pm", "9:30am"
function fmt12(t){
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h < 12 ? 'am' : 'pm';
  const h12 = h % 12 || 12;
  return m === 0 ? h12+ampm : h12+':'+String(m).padStart(2,'0')+ampm;
}
const same=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
// who can be a string (legacy) or array — normalise to array
function whoArr(e){ return Array.isArray(e.who) ? e.who : [e.who]; }
// Event is visible if ANY of its people are in the active set
const vev=()=>evs.filter(e=>whoArr(e).some(w=>active.has(w)));
// Primary color = first person's color
// Single-person: use their color. Multi-person: neutral gray so no one "owns" it.
// Reserved group-event color — not available for individual members
const GROUP_BG   = '#dceeff';
const GROUP_TEXT = '#1a6bb5';
const ec=e=>whoArr(e).length>1?GROUP_TEXT:mColor(whoArr(e)[0]);
const eb=e=>whoArr(e).length>1?GROUP_BG:mBg(whoArr(e)[0]);
// For border accents: always use first person's color (gives multi-person bars a meaningful stripe)
const eprimary=e=>mColor(whoArr(e)[0]);

// Striped left accent for multi-person events.
// Uses background-image gradient instead of border-image so border-radius is preserved on all corners.
function multiLeftBorder(ev, width){
  const people = whoArr(ev);
  const w = width || 3;
  const bg = eb(ev);
  if(people.length <= 1){
    // Single person — solid border-left, plain background
    return `border-left:${w}px solid ${mColor(people[0])};background:${bg}`;
  }
  const colors = people.map(p=>mColor(p));
  const pct = 100 / colors.length;
  const stops = colors.map((c,i)=>`${c} ${(i*pct).toFixed(1)}% ${((i+1)*pct).toFixed(1)}%`).join(',');
  const stripe = `linear-gradient(to bottom,${stops}) left / ${w}px 100% no-repeat`;
  const fill   = `linear-gradient(${bg},${bg}) ${w}px 0 / calc(100% - ${w}px) 100% no-repeat`;
  return `border-left:none;background:${stripe}, ${fill};padding-left:${w+2}px`;
}

// Multi-person avatar cluster — shows stacked colored circles when event has >1 person
function multiWhoHtml(ev, size){
  const people = whoArr(ev);
  if(people.length <= 1) return '';
  const sz = size || 10;
  const overlap = Math.round(sz * 0.35);
  const dots = people.map((w,i) =>
    `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${mColor(w)};border:1.5px solid #fff;margin-left:${i===0?0:-overlap}px;flex-shrink:0;z-index:${i}" title="${w}"></div>`
  ).join('');
  return `<div style="display:flex;align-items:center;margin-left:4px;flex-shrink:0">${dots}</div>`;
}

// Person dot(s) for bottom-right of wev pills — shows ALL people (single or multi)
function whoFooter(ev, size){
  const people = whoArr(ev);
  const sz = size || 22;
  const overlap = Math.round(sz * 0.35);
  const fontSize = Math.round(sz * 0.45);
  const dots = people.map((w,i) =>
    `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${mColor(w)};border:1.5px solid rgba(255,255,255,0.8);margin-left:${i===0?0:-overlap}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:${fontSize}px;font-weight:700;color:#fff" title="${w}">${w.charAt(0).toUpperCase()}</div>`
  ).join('');
  return `<div style="display:flex;align-items:center;justify-content:flex-end;margin-top:2px">${dots}</div>`;
}
// Multi-day helpers
function isMultiDay(ev){ return !!(ev.allDay || (ev.endDate && ev.endDate !== ev.date)); }
// Parse 'YYYY-MM-DD' safely in local timezone (avoids UTC-midnight shift bug)
function parseDate(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function evSpansDate(ev, ds){
  if(!ev.endDate || ev.endDate===ev.date) return ev.date===ds;
  return ds >= ev.date && ds <= ev.endDate;
}
function evStartsOn(ev, ds){ return ev.date===ds; }
function evEndsOn(ev, ds){ return (ev.endDate||ev.date)===ds; }

// Returns array of {ev, top, height, timeLabel} for all timed events on a given date
function timedEvLayout(ds){
  const dayEvs = vev().filter(e=>{
    if(!evSpansDate(e,ds)) return false;
    if(e.allDay) return false;          // allDay events go in the all-day bar, not the grid
    if(!isMultiDay(e)) return true;
    return evStartsOn(e,ds) || evEndsOn(e,ds);
  });
  return dayEvs.map(ev=>{
    const multi=isMultiDay(ev);
    let top,ht,timeLabel;
    if(multi && evEndsOn(ev,ds) && !evStartsOn(ev,ds)){
      const eh=parseInt(ev.end.split(':')[0]),em=parseInt(ev.end.split(':')[1]);
      top=0; ht=Math.max(22,(eh*60+em)/60*104);
      timeLabel=`Arrives ${fmt12(ev.end)}`;
    } else {
      const sh=parseInt(ev.time.split(':')[0]),sm=parseInt(ev.time.split(':')[1]);
      top=(sh*60+sm)/60*104;
      if(multi && evStartsOn(ev,ds) && !evEndsOn(ev,ds)){
        // Extend from start time to midnight (hour 24)
        ht = Math.max(22, (24 - sh - sm/60) * 104);
        timeLabel=`Departs ${fmt12(ev.time)}`;
      } else {
        const eh=parseInt(ev.end.split(':')[0]),em=parseInt(ev.end.split(':')[1]);
        const dur=(eh*60+em)-(sh*60+sm);
        ht=Math.max(22,dur/60*104);
        timeLabel=`${fmt12(ev.time)} – ${fmt12(ev.end)}`;
      }
    }
    return {ev, top, ht, timeLabel};
  });
}

// Given array of {top,ht,...}, assign each a {col, totalCols} for side-by-side layout
function assignOverlapCols(items){
  // Sort by top
  const sorted=[...items].sort((a,b)=>a.top-b.top);
  const cols=[]; // each col is array of items placed there
  sorted.forEach(item=>{
    let placed=false;
    for(let c=0;c<cols.length;c++){
      const last=cols[c][cols[c].length-1];
      if(item.top >= last.top+last.ht-2){ cols[c].push(item); item._col=c; placed=true; break; }
    }
    if(!placed){ item._col=cols.length; cols.push([item]); }
  });
  // Second pass: totalCols = max overlapping at any point
  sorted.forEach(item=>{
    let max=1;
    sorted.forEach(other=>{
      if(other===item) return;
      const overlap = item.top < other.top+other.ht && item.top+item.ht > other.top;
      if(overlap) max=Math.max(max, other._col+1, item._col+1);
    });
    item._totalCols=max;
  });
  return sorted;
}

function renderTimedEvs(items, extraRight){
  const laid=assignOverlapCols(items);
  return laid.map(({ev,top,ht,timeLabel,_col,_totalCols})=>{
    const tc=_totalCols||1, c=_col||0;
    const pct=100/tc;
    const left=`${c*pct}%`;
    const right=`calc(${100-(c+1)*pct}% + ${extraRight||2}px)`;
    const borderStyle = multiLeftBorder(ev, 3);
    const titleRow = `<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${ev.title}</div>`;

    let inner;
    if(ht >= 104){
      // Full layout: title + time + location + person footer
      const loc    = ev.loc ? `<div class="wev-loc">${ev.loc}</div>` : '';
      const footer = whoFooter(ev, 22);
      inner = `${titleRow}<div class="wev-t">${timeLabel}</div>${loc}${footer}`;
    } else if(ht >= 60){
      // Medium: title + time + person footer
      const footer = whoFooter(ev, 20);
      inner = `${titleRow}<div class="wev-t">${timeLabel}</div>${footer}`;
    } else {
      // Short: title + person circle right-aligned, single line
      const footer = whoFooter(ev, 18);
      inner = `<div style="display:flex;align-items:center;height:100%;gap:3px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;flex:1">${ev.title}</div>${footer}</div>`;
    }

    return `<div class="wev" onclick="editEvent('${ev.id}')" style="${borderStyle};top:${top}px;height:${ht}px;left:calc(${left} + 2px);right:calc(${right});color:#1c1c1a;display:flex;flex-direction:column">${inner}</div>`;
  }).join('');
}
function toggleM(m){
  const allNames = new Set(members.map(x=>x.name));
  if(active.size === 1 && active.has(m)){
    allNames.forEach(n=>active.add(n));
  } else {
    allNames.forEach(n=>active.delete(n));
    active.add(m);
  }
  rebuildSidebarDots();
  // Capture scroll before render, restore after (beats the scrollToHour setTimeout)
  const scrollBody = document.querySelector('.wbody') || document.querySelector('.daybody');
  const savedScroll = scrollBody ? scrollBody.scrollTop : null;
  render();
  if(savedScroll !== null){
    setTimeout(()=>{
      const restored = document.querySelector('.wbody') || document.querySelector('.daybody');
      if(restored) restored.scrollTop = savedScroll;
    }, 0);
  }
}

function rebuildSidebarDots(){

function rebuildFullSidebarDots(){
  const legend = document.getElementById('member-legend-wrap');
  if(!legend) return;
  legend.innerHTML = '';
  legend.className = 'member-legend';
  members.forEach(m => {
    const d = document.createElement('div');
    d.className = 'mdot' + (active.has(m.name) ? '' : ' off');
    d.style.background = m.color;
    d.dataset.m = m.name;
    d.onclick = () => toggleM(m.name);
    d.innerHTML = `${m.name.charAt(0).toUpperCase()}<span class="mdot-tip">${m.name}</span>`;
    legend.appendChild(d);
  });
}

function getSeason(mo, day){
  // Astronomical seasons — Northern hemisphere
  // Spring: Mar 20, Summer: Jun 21, Autumn: Sep 22, Winter: Dec 21
  const md = (mo + 1) * 100 + day; // mo is 0-indexed, so +1 for calendar month
  if(md >= 320 && md < 621)  return {name:'Spring', icon:'🌸', color:'#c04e8a'};
  if(md >= 621 && md < 922)  return {name:'Summer', icon:'☀️',  color:'#c87d12'};
  if(md >= 922 && md < 1221) return {name:'Autumn', icon:'🍂', color:'#b85520'};
  return {name:'Winter', icon:'❄️', color:'#2c6bed'};
}

function utb(){

  if(sIcon){ sIcon.textContent=season.icon; }

  // Hide season row for non-calendar views, show simple label instead

  if(appV==='tasks'){ el.textContent='Tasks'; if(sEl) sEl.textContent=''; if(sIcon) sIcon.textContent='📋'; return; }
  if(appV==='lists'){ el.textContent='Lists'; if(sEl) sEl.textContent=''; if(sIcon) sIcon.textContent='📝'; return; }
  if(appV==='meals'){ el.textContent='Meal Planner'; if(sEl) sEl.textContent=''; if(sIcon) sIcon.textContent='🍽️'; return; }

  const s=wstart(cur,calV==='workweek');

function wstart(d,ww){
  if(ww) return new Date(d); // 5 Day: start from current day
  const s=new Date(d), day=d.getDay();
  s.setDate(d.getDate()-day);
  return s;
}

function rMonth(){
  const yr=cur.getFullYear(), mo=cur.getMonth();
  const first=new Date(yr,mo,1);
  const startD=new Date(first); startD.setDate(startD.getDate()-first.getDay());

  // Build 6 rows of 7 days
  const rows=[];
  const d=new Date(startD);
  for(let r=0;r<6;r++){
    const row=[];
    for(let c=0;c<7;c++){
      row.push(new Date(d));
      d.setDate(d.getDate()+1);
    }
    rows.push(row);
  }

  // Get all visible multi-day events that appear in this month view range
  const viewStart=fmt(startD);
  const viewEnd=fmt(rows[5][6]);
  const multiEvs=vev().filter(e=>isMultiDay(e) && e.date<=viewEnd && (e.endDate||e.date)>=viewStart);

  // For each row, compute which multi-day events appear and their bar geometry
  // Bar position: left% and width% within the row (0% = left edge of col 0, 100% = right edge of col 6)
  // Start day: leftFrac = (col + timeOfDay/24) / 7
  // End day:   rightFrac = (col + timeOfDay/24) / 7
  // Time fraction: hours+mins out of 24
  function timeFrac(timeStr){ // "HH:MM:SS" or "HH:MM"
    const parts=timeStr.split(':');
    return (parseInt(parts[0])*60+parseInt(parts[1]))/(24*60);
  }

  // DNUM_H = approx pixel height of the day number row inside a cell
  // We position bars at top: DNUM_H + barIndex*(barH+2)
  // We'll use CSS top% within the row height — but we don't know cell height at render time.
  // Instead we use a fixed pixel offset from top of cell, matching dnum height ~30px
  const DNUM_H = 30; // px — matches padding(5) + dnum(24) + gap(1)
  const BAR_H = 22;
  const BAR_GAP = 2;

  let rowsHtml='';

  rows.forEach((rowDays,ri)=>{
    // Which multi-day events overlap this row?
    const rowStart=fmt(rowDays[0]), rowEnd=fmt(rowDays[6]);
    const rowMulti=multiEvs.filter(e=> e.date<=rowEnd && (e.endDate||e.date)>=rowStart);

    // Build cell HTML (no multi-day pills inside cells)
    let cellsHtml='';
    rowDays.forEach(day=>{
      const other=day.getMonth()!==mo, isToday=same(day,T), ds=fmt(day);
      const singleEvs=vev().filter(e=>!isMultiDay(e)&&e.date===ds);
      // Reserve space for multi-day bars — add invisible spacers
      const multiOnThisDay=rowMulti.length;
      let spacers='';
      for(let i=0;i<Math.min(multiOnThisDay,3);i++){
        spacers+=`<div style="height:${BAR_H}px;margin-bottom:${BAR_GAP}px"></div>`;
      }
      const show=singleEvs.slice(0,Math.max(0,3-multiOnThisDay));
      const pills=show.map(e=>`<div class="epill" onclick="event.stopPropagation();editEvent('${e.id}')" style="${multiLeftBorder(e,3)};cursor:pointer;color:#1c1c1a"><div class="edot" style="background:${ec(e)};flex-shrink:0"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">${e.title}</span></div>`).join('');
      const moreCount=(singleEvs.length-show.length);
      const more=moreCount>0?`<div class="emore">+${moreCount} more</div>`:'';
      cellsHtml+=`<div class="mcell${other?' other':''}${isToday?' is-today':''}" onclick="mcc('${ds}')"><div class="dnum">${day.getDate()}</div>${spacers}${pills}${more}</div>`;
    });

    // Build overlay bars for multi-day events
    let overlayHtml='';
    rowMulti.forEach((ev,barIdx)=>{
      // Clamp event to this row
      const evStartInRow = ev.date >= rowStart ? ev.date : rowStart;
      const evEndInRow   = (ev.endDate||ev.date) <= rowEnd ? (ev.endDate||ev.date) : rowEnd;

      // Column index within this row (0-6)
      const colStart = rowDays.findIndex(d=>fmt(d)===evStartInRow);
      const colEnd   = rowDays.findIndex(d=>fmt(d)===evEndInRow);

      // Time fractions — only applied on the actual event start/end dates
      const startFrac = ev.date===evStartInRow ? timeFrac(ev.time) : 0;
      const endFrac   = (ev.endDate||ev.date)===evEndInRow ? timeFrac(ev.end) : 1;

      const leftPct  = (colStart + startFrac) / 7 * 100;
      const rightPct = (colEnd   + endFrac)   / 7 * 100;
      // Enforce minimum width of 0.4 columns so thin start slivers are always visible
      const minWidth = (0.4 / 7 * 100);
      const widthPct = Math.max(minWidth, rightPct - leftPct);

      // Vertical position: below dnum, stacked by barIdx
      const topPx = DNUM_H + barIdx*(BAR_H+BAR_GAP);

      // Show title on first day bar is at least 30% of a cell wide
      const barWidthInStartCell = Math.min(rightPct, (colStart+1)/7*100) - leftPct;
      const oneCellPct = 100/7;
      const startsInRow = ev.date >= rowStart;
      // Find first day in this row where bar covers >= 30% of cell
      let labelDayCol = -1;
      for(let c=colStart; c<=colEnd; c++){
        const cellLeft=c/7*100, cellRight=(c+1)/7*100;
        const overlap=Math.min(rightPct,cellRight)-Math.max(leftPct,cellLeft);
        if(overlap/oneCellPct >= 0.30){ labelDayCol=c; break; }
      }
      const label = (labelDayCol === colStart && startsInRow) ? ev.title
                  : (labelDayCol > colStart && labelDayCol >= 0) ? ev.title
                  : '';

      // Border radius: round left if starts here, round right if ends here
      const rleft  = startsInRow ? '6px' : '0';
      const rright = (ev.endDate||ev.date) <= rowEnd ? '6px' : '0';
      const borderRadius = `${rleft} ${rright} ${rright} ${rleft}`;
      const borderLeftStyle = startsInRow
        ? multiLeftBorder(ev, 3)+';padding-left:5px'
        : 'border-left:none;padding-left:5px';

      const barContent = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${label}</span>${whoFooter(ev,16)}`;
      overlayHtml+=`<div class="mday-bar" onclick="event.stopPropagation();editEvent('${ev.id}')" style="left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;top:${topPx}px;background:${eb(ev)};color:#1c1c1a;border-radius:${borderRadius};${borderLeftStyle};display:flex;align-items:center">${barContent}</div>`;
    });

    rowsHtml+=`<div class="month-row">${cellsHtml}<div class="mday-overlay">${overlayHtml}</div></div>`;
  });

  return `<div class="mwrap">
    <div class="dow-row">${DS.map(d=>`<div class="dow-cell">${d}</div>`).join('')}</div>
    <div class="month-rows-wrap">${rowsHtml}</div>
  </div>`;
}

function rWeek(ww){
  const s=wstart(cur,ww);
  const days=Array.from({length:ww?5:7},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});
  const cols=days.length;

  // Column headers
  let hd=`<div class="wh-sp" style="width:46px"></div>`;
  days.forEach(d=>{
    const isT=same(d,T);
    hd+=`<div class="wh-cell"><div class="wh-dow">${DS[d.getDay()]}</div><div class="wh-date${isT?' tod':''}">${d.getDate()}</div></div>`;
  });

  // All-day / multi-day proportional pill row
  const weekMultiEvs = vev().filter(e=>isMultiDay(e) && e.date<=fmt(days[days.length-1]) && (e.endDate||e.date)>=fmt(days[0]));
  const hasMulti = weekMultiEvs.length > 0;
  let allDayRow = '';
  if(hasMulti){
    const rowStart=fmt(days[0]), rowEnd=fmt(days[days.length-1]);
    function wTimeFrac(t){ const p=t.split(':'); return (parseInt(p[0])*60+parseInt(p[1]))/(24*60); }
    const BAR_H=22, BAR_GAP=2;
    let barsHtml='';
    weekMultiEvs.forEach((ev,barIdx)=>{
      const evStartInRow = ev.date >= rowStart ? ev.date : rowStart;
      const evEndInRow   = (ev.endDate||ev.date) <= rowEnd ? (ev.endDate||ev.date) : rowEnd;
      const colStart = days.findIndex(d=>fmt(d)===evStartInRow);
      const colEnd   = days.findIndex(d=>fmt(d)===evEndInRow);
      const startFrac = ev.date===evStartInRow ? wTimeFrac(ev.time) : 0;
      const endFrac   = (ev.endDate||ev.date)===evEndInRow ? wTimeFrac(ev.end) : 1;
      const leftPct  = (colStart + startFrac) / cols * 100;
      const rightPct = (colEnd   + endFrac)   / cols * 100;
      const widthPct = Math.max(0.4/cols*100, rightPct - leftPct);
      const topPx = barIdx*(BAR_H+BAR_GAP)+3;
      // Title on first cell where bar >= 30% wide
      const oneCellPct = 100/cols;
      let labelCol=-1;
      for(let c=colStart;c<=colEnd;c++){
        const ov=Math.min(rightPct,(c+1)/cols*100)-Math.max(leftPct,c/cols*100);
        if(ov/oneCellPct>=0.30){labelCol=c;break;}
      }
      const startsInRow = ev.date>=rowStart;
      const label = labelCol>=0 ? ev.title : '';
      const rleft = startsInRow?'6px':'0';
      const rright = (ev.endDate||ev.date)<=rowEnd?'6px':'0';
      const bl = startsInRow ? multiLeftBorder(ev,3)+';padding-left:5px' : 'border-left:none;padding-left:5px';
      barsHtml+=`<div onclick="editEvent('${ev.id}')" style="position:absolute;left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;top:${topPx}px;height:${BAR_H}px;background:${eb(ev)};color:#1c1c1a;border-radius:${rleft} ${rright} ${rright} ${rleft};${bl};font-size:11px;font-weight:600;display:flex;align-items:center;cursor:pointer;box-sizing:border-box"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${label}</span>${whoFooter(ev,16)}</div>`;
    });
    const rowH = weekMultiEvs.length*(BAR_H+BAR_GAP)+4;
    allDayRow=`<div style="display:grid;grid-template-columns:46px 1fr;border-bottom:1px solid var(--border);background:var(--header-bg)">
      <div style="border-right:1px solid var(--border);padding:4px 6px;font-size:9px;color:var(--muted);font-weight:600;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:6px">all day</div>
      <div style="position:relative;height:${rowH}px">${barsHtml}</div>
    </div>`;
  }

  // Time grid — hour slot lines + events per column
  let tlbls='';
  for(let h=0;h<24;h++){
    const l=h===0?'12am':h===12?'noon':h<12?h+'am':(h-12)+'pm';
    tlbls+=`<div class="tlbl">${l}</div>`;
  }
  // Build hour-line grid (visual only) and overlay events per column
  const hourLines=Array.from({length:24},()=>'<div class="hslot"></div>').join('');
  const dcHtml=days.map((d,ci)=>{
    const ds=fmt(d);
    const items=timedEvLayout(ds);
    const evHtml=renderTimedEvs(items, 2);
    return `<div class="dcol" id="dc${ci}" data-date="${ds}"><div style="position:relative">${hourLines}${evHtml}</div></div>`;
  }).join('');
  return `<div class="wwrap">
    <div class="whead" style="grid-template-columns:46px repeat(${cols},1fr)">${hd}</div>
    <div id="week-allday-row">${allDayRow}</div>
    <div class="wbody"><div class="tcol">${tlbls}</div><div class="dcols" style="grid-template-columns:repeat(${cols},1fr)" id="dcols">${dcHtml}</div></div>
  </div>`;
}

function rDay(){
  const ds=fmt(cur);
  const allDayEvs=vev().filter(e=>isMultiDay(e)&&evSpansDate(e,ds)&&(e.allDay||(!evStartsOn(e,ds)&&!evEndsOn(e,ds))));
  const allDayBanner=allDayEvs.length?`<div style="padding:4px 8px;border-bottom:1px solid var(--border);background:var(--header-bg)">
    ${allDayEvs.map(ev=>`<div onclick="editEvent('${ev.id}')" style="background:${eb(ev)};color:#1c1c1a;${multiLeftBorder(ev,3)};font-size:11px;font-weight:600;padding:3px 8px 3px 6px;border-radius:0 6px 6px 0;margin-bottom:2px;cursor:pointer;display:flex;align-items:center">${ev.title} · all day${whoFooter(ev,16)}</div>`).join('')}
  </div>`:'';

  let tlbls='';
  for(let h=0;h<24;h++){
    const l=h===0?'12am':h===12?'noon':h<12?h+'am':(h-12)+'pm';
    tlbls+=`<div class="tlbl">${l}</div>`;
  }
  const hourLines=Array.from({length:24},()=>'<div class="hslot"></div>').join('');
  const items=timedEvLayout(ds);
  const evHtml=renderTimedEvs(items, 8);

  return `<div class="daywrap">
    <div class="dayhero"><div class="dayhero-n">${cur.getDate()}</div><div><div class="dayhero-dow">${DF[cur.getDay()]}</div><div class="dayhero-sub">${MOS[cur.getMonth()]} ${cur.getFullYear()}</div></div></div>
    ${allDayBanner}
    <div class="daybody"><div class="tcol">${tlbls}</div><div class="dayinner" id="dayinner"><div style="position:relative">${hourLines}${evHtml}</div></div></div>
  </div>`;
}

function rAgenda(){
  const yr=cur.getFullYear(),mo=cur.getMonth();
  const nd=new Date(yr,mo+1,0).getDate();
  let html='<div class="agwrap">';
  for(let day=1;day<=nd;day++){
    const d=new Date(yr,mo,day),ds=fmt(d),isT=same(d,T);
    const de=vev().filter(e=>evSpansDate(e,ds)).sort((a,b)=>a.time>b.time?1:-1);
    html+=`<div><div class="ag-hdr"><div class="ag-num${isT?' tod':''}">${day}</div><div><div class="ag-dow">${DF[d.getDay()]}</div><div class="ag-mon">${MOS[mo]} ${yr}</div></div></div><div class="ag-evs">`;
    if(!de.length) html+=`<div class="ag-empty">No events</div>`;
    de.forEach(ev=>{
      const multi=isMultiDay(ev);
      const timeStr=multi
        ? (evStartsOn(ev,ds)?`Starts ${fmt12(ev.time)}`:evEndsOn(ev,ds)?`Ends ${fmt12(ev.end)}`:'All day')
        : `${fmt12(ev.time)} – ${fmt12(ev.end)}`;
      const whoBadges = whoArr(ev).map(w=>`<span class="ag-who" style="background:${mBg(w)};color:${mColor(w)}">${w}</span>`).join('');
      html+=`<div class="ag-row" onclick="editEvent('${ev.id}')"><div class="ag-bar" style="background:${eprimary(ev)}"></div><div class="ag-time">${timeStr}</div><div><div class="ag-title">${ev.title}${multi?' 📅':''}</div>${ev.loc?`<div class="ag-sub">${ev.loc}</div>`:''}<div style="display:flex;gap:3px;margin-top:3px">${whoBadges}</div></div></div>`;
    });
    html+=`</div></div>`;
  }
  return html+'</div>';
}

function rTasks(){
  const p=tasks.filter(t=>!t.done), dn=tasks.filter(t=>t.done);
  const row=t=>{
    const people = whoArr(t);
    const badges = people.map(w=>`<div class="twho" style="background:${mColor(w)}" title="${w}">${w.charAt(0)}</div>`).join('');
    return `<div class="task-row"><div class="tck${t.done?' done':''}" onclick="toggleT(${t.id})">${t.done?`<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5 3.5-4" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}</div><div class="ttxt${t.done?' done':''}">${t.title}</div><div class="tdue${t.late?' late':''}">${t.due}</div><div style="display:flex;gap:3px">${badges}</div></div>`;
  };
  return `<div class="taskwrap"><div class="sec-hd">Upcoming (${p.length})</div>${p.map(row).join('')}${dn.length?`<div class="sec-hd" style="margin-top:16px">Completed (${dn.length})</div>${dn.map(row).join('')}`:''}</div>`;
}

function toggleT(id){ const t=tasks.find(t=>t.id===id); if(t) t.done=!t.done; render(); }

let _focusedList = 0;

function rLists(){
  const total = lists.length;
  if(!total) return `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:14px">No lists yet — add one in Settings.</div>`;

  // Horizontal cylinder: cards rotate around Y axis (left to right)
  const ANGLE_STEP = 50;
  const RADIUS     = 200;
  const sceneRotY  = -(_focusedList * ANGLE_STEP);

  const selCards = lists.map((l, i) => {
    const angle   = i * ANGLE_STEP;
    const isFocus = i === _focusedList;
    const dist    = Math.min(Math.abs(i - _focusedList), 3);
    const opacity = isFocus ? 1 : Math.max(0.35, 1 - dist * 0.22);
    const rem     = l.items.filter(it => !it.d).length;
    return `<div class="lsel-card${isFocus?' lsel-focus':''}"
      style="transform:rotateY(${angle}deg) translateZ(${RADIUS}px);opacity:${opacity}"
      onclick="${isFocus?'':'focusList('+i+')'}">
      <div class="lsel-icon">${l.icon}</div>
      <div class="lsel-name">${l.name}</div>
    </div>`;
  }).join('');

  // Right panel — focused list content
  const fl = lists[_focusedList];
  const rem = fl.items.filter(it => !it.d).length;
  const items = fl.items.map((it, idx) => `
    <div class="litem">
      <div class="licheck${it.d?' done':''}" onclick="toggleI(${fl.id},${idx})">
        ${it.d ? `<svg width="13" height="13" viewBox="0 0 8 8"><path d="M1 4l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>` : ''}
      </div>
      <div class="litxt${it.d?' done':''}">${it.t}</div>
    </div>`).join('');

  return `<div class="listwrap">
    <!-- Left: 3D cylinder selector -->
    <div class="lsel-panel">
      <div class="lsel-scene" id="lsel-scene"
        style="transform:rotateY(${sceneRotY}deg)">
        ${selCards}
      </div>
    </div>
    <!-- Right: focused list content -->
    <div class="lcontent-panel">
      <div class="lcontent-hd">
        <div class="lcontent-icon">${fl.icon}</div>
        <div class="lcontent-name">${fl.name}</div>
        <div class="lcontent-ct">${rem} left</div>
      </div>
      <div class="lcontent-bd">${items}</div>
    </div>
  </div>`;
}

function focusList(idx){
  if(idx === _focusedList) return;
  _focusedList = idx;
  // Animate cylinder immediately via DOM, then re-render after spin settles
  const scene = document.getElementById('lsel-scene');
  if(scene){
    const ANGLE_STEP = 55;
    scene.style.transform = `rotateY(${-(idx * 50)}deg)`;
    scene.querySelectorAll('.lsel-card').forEach((c, i) => {
      const isFocus = i === idx;
      const dist = Math.min(Math.abs(i - idx), 3);
      c.style.opacity = isFocus ? 1 : Math.max(0.35, 1 - dist * 0.22);
      c.classList.toggle('lsel-focus', isFocus);
      c.setAttribute('onclick', isFocus ? '' : `focusList(${i})`);
    });
    clearTimeout(window._listRenderTimer);
    window._listRenderTimer = setTimeout(() => render(), 500);
  } else {
    render();
  }
}

function toggleI(lid, idx){
  const l = lists.find(l => l.id === lid);
  if(l){ l.items[idx].d = !l.items[idx].d; render(); }
}

function addList(){
  const iconEl = document.getElementById('new-list-icon');
  const nameEl = document.getElementById('new-list-name');
  const name = nameEl?.value.trim();
  if(!name) return;
  const icon = iconEl?.value.trim() || '🗒️';
  lists.push({ id: Date.now(), name, icon, items: [] });
  _focusedList = lists.length - 1;
  if(nameEl) nameEl.value = '';
  if(iconEl) iconEl.value = '';
  // Re-render settings list rows
  const rows = document.getElementById('list-rows');
  if(rows) rows.innerHTML = lists.map((l,i)=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:18px;flex-shrink:0">${l.icon}</span>

function removeList(idx){
  if(lists.length <= 1) return;
  lists.splice(idx, 1);
  if(_focusedList >= lists.length) _focusedList = lists.length - 1;
  // Re-render settings list rows
  const rows = document.getElementById('list-rows');
  if(rows) rows.innerHTML = lists.map((l,i)=>`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:18px;flex-shrink:0">${l.icon}</span>
      <input class="fin" style="flex:1;font-size:13px;padding:8px 10px" value="${l.name}"
        oninput="lists[${i}].name=this.value">

function scrollToHour(h){
  const body = document.querySelector('.wbody') || document.querySelector('.daybody');
  if(!body) return;
  // Center current time in viewport — scroll so the given hour is ~1/3 from top
  const viewH = body.clientHeight || 400;
  const targetTop = h * 104 - Math.round(viewH / 3);
  body.scrollTop = Math.max(0, targetTop);
}

function drawNow(){
  const n=new Date(), h=n.getHours(), m=n.getMinutes();
  const pct=(h+m/60)/24, top=pct*24*104;
  const clr='#e05b30';
  const line=`<div class="now-line" style="top:${top}px;background:${clr}"><div class="now-dot" style="background:${clr}"></div></div>`;
  // Day view — single column
  const dayInner=document.getElementById('dayinner');
  if(dayInner&&dayInner.firstChild){ dayInner.firstChild.insertAdjacentHTML('beforeend',line); return; }
  // Week/5-day — find column matching today's date
  const todayStr=fmt(n);
  const todayCol=document.querySelector(`.dcol[data-date="${todayStr}"]`);
  if(todayCol&&todayCol.firstChild) todayCol.firstChild.insertAdjacentHTML('beforeend',line);
}

function draftRename(idx, val){
  if(_draft && _draft[idx]) _draft[idx].name = val;
}
function draftSetColor(idx, color){
  if(!_draft || !_draft[idx]) return;
  _draft[idx].color = color;
  _draft[idx].bg = colorToBg(color);
  document.getElementById('content').innerHTML = rSettings();
  const el = document.getElementById('mcp-'+idx);
  if(el) el.style.display = 'block';
}
function draftToggleColorPicker(idx){
  const el = document.getElementById('mcp-'+idx);
  if(el) el.style.display = el.style.display==='none' ? 'block' : 'none';
}
function draftSetNewColor(c){
  window._draftNewColor = c;
  document.querySelectorAll('#new-swatches .cswatch').forEach(s=>{
    s.classList.toggle('sel', s.style.background===c || s.style.backgroundColor===c);
  });
}
function draftAdd(){
  const nameEl = document.getElementById('new-member-name');
  const name = nameEl ? nameEl.value.trim() : '';
  if(!name || !_draft) return;
  if(_draft.find(m=>m.name.toLowerCase()===name.toLowerCase())) return;
  const color = window._draftNewColor || PALETTE[_draft.length % PALETTE.length];
  _draft.push({ name, color, bg: colorToBg(color) });
  window._draftNewColor = PALETTE[0];
  document.getElementById('content').innerHTML = rSettings();
}
function draftDel(idx){
  if(!_draft || _draft.length <= 1) return;
  _draft.splice(idx, 1);
  document.getElementById('content').innerHTML = rSettings();
}

function saveSettings(){
  if(!_draft) { sv('calendar'); return; }
  // Sync names: match by original index for existing members, apply renames
  const originalMembers = members.map(m=>({...m}));
  const keepCount = Math.min(originalMembers.length, _draft.length);
  for(let i=0; i<keepCount; i++){
    const oldName = originalMembers[i].name;
    const newName = (_draft[i].name||'').trim() || oldName;
    _draft[i].name = newName;
    if(oldName !== newName){
      evs.forEach(e=>{ e.who = whoArr(e).map(w=>w===oldName?newName:w); });
      tasks.forEach(t=>{ t.who = whoArr(t).map(w=>w===oldName?newName:w); });
      if(active.has(oldName)){ active.delete(oldName); active.add(newName); }
    }
  }
  // Remove deleted members from active set
  originalMembers.forEach(m=>{
    if(!_draft.find(d=>d.name===m.name)) active.delete(m.name);
  });
  // Add brand-new members to active set
  _draft.forEach(m=>{ if(!originalMembers.find(o=>o.name===m.name)) active.add(m.name); });
  // Commit
  members = _draft.map(m=>({...m}));
  _draft = null;
  window._draftNewColor = undefined;
  rebuildFullSidebarDots();
  sv('calendar');
}

function cancelSettings(){
  _draft = null;
  window._draftNewColor = undefined;
  sv('calendar');
}

function openAdd(){
  if(appV==='tasks') addTask();
  else if(appV==='lists') addListItem();
  else if(appV==='meals') addMealModal();
  else addEvent();
}

  document.getElementById('mttl').textContent='New Event';
  document.getElementById('mbd').innerHTML=`
    <div class="fld"><label class="flbl">Title</label><input class="fin" id="etitle" type="text" placeholder="What's happening?" autofocus></div>

          <div class="fld"><label class="flbl">Start date</label><input class="fin" id="edate2" type="date" value="${ds}"></div>
          <div class="fld"><label class="flbl">End date</label><input class="fin" id="eenddate" type="date" value="${ds}"></div>
        </div>
        <p style="font-size:10px;color:var(--muted);margin-top:4px">Start date overrides the date field above.</p>
      </div>
    </div>
    <div class="fld"><label class="flbl">Location</label><input class="fin" id="eloc2" type="text" placeholder="Optional"></div>

    <div class="fld"><label class="flbl">Who</label>${ppHtml(['Mom'])}</div>`;
  // Wire start time → end time auto-advance after modal renders
  setTimeout(()=>{
    const es = document.getElementById('es');
    const ee = document.getElementById('ee');
    if(!es||!ee) return;
    function syncEnd(){
      const [sh,sm] = es.value.split(':').map(Number);
      ee.min = es.value;
      const [eh,em] = ee.value.split(':').map(Number);
      if(eh*60+em <= sh*60+sm){
        const newMins = sh*60+sm+60;
        const nh = Math.floor(newMins/60)%24;
        const nm = newMins%60;
        ee.value = String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
      }
    }
    es.addEventListener('change', syncEnd);
  }, 0);
  window._save=()=>{
    const t=document.getElementById('etitle').value.trim();
    if(!t) return;
    const multiOpen = document.getElementById('multiday-fields').style.display!=='none';
    const startDate = multiOpen ? (document.getElementById('edate2').value||document.getElementById('edate').value) : document.getElementById('edate').value;
    const endDate = multiOpen ? (document.getElementById('eenddate').value||startDate) : startDate;
    evs.push({
      id:Date.now(), title:t,
      date:startDate, endDate:endDate,
      time:document.getElementById('es').value+':00',
      end:document.getElementById('ee').value+':00',
      who:[...window._selPeople],
      loc: (document.getElementById('eloc2')?.value||'').trim(),
      desc:(document.getElementById('edesc')?.value||'').trim(),
    });
    closeM(); render();
  };
  openM();
}

  a.textContent=open?'▼':'▶';

  if(open){

    const sd=document.getElementById('edate2');

}
