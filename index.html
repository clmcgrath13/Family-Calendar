}

function rAgenda(){
  const yr=cur.getFullYear(),mo=cur.getMonth();
  const nd=new Date(yr,mo+1,0).getDate();
  let html='<div class="agwrap">';
  for(let day=1;day<=nd;day++){
    const d=new Date(yr,mo,day),ds=fmt(d),isT=same(d,T);
    const de=vev().filter(e=>evSpansDate(e,ds)).sort((a,b)=>a.time>b.time?1:-1);
    html+=`<div><div class="ag-hdr"><div class="ag-num${isT?' tod':''}">${day}</div><div><div class="ag-dow">${DF[d.getDay()]}</div><div class="ag-mon">${MOS[mo]} ${yr}</div></div></div><div class="ag-evs">`;
    if(!de.length) html+=`<div class="ag-empty">No events</div>`;
    de.forEach(ev=>{
      const multi=isMultiDay(ev);
      const timeStr=multi
        ? (evStartsOn(ev,ds)?`Starts ${fmt12(ev.time)}`:evEndsOn(ev,ds)?`Ends ${fmt12(ev.end)}`:'All day')
        : `${fmt12(ev.time)} – ${fmt12(ev.end)}`;
      const whoBadges = whoArr(ev).map(w=>`<span class="ag-who" style="background:${mBg(w)};color:${mColor(w)}">${w}</span>`).join('');
      html+=`<div class="ag-row" onclick="editEvent('${ev.id}')"><div class="ag-bar" style="background:${eprimary(ev)}"></div><div class="ag-time">${timeStr}</div><div><div class="ag-title">${ev.title}${multi?' 📅':''}</div>${ev.loc?`<div class="ag-sub">${ev.loc}</div>`:''}<div style="display:flex;gap:3px;margin-top:3px">${whoBadges}</div></div></div>`;
    });
    html+=`</div></div>`;
  }
  return html+'</div>';
}

function rTasks(){
  const d       = taskDate;
  const dow     = new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const isToday = d === fmt(T);

  const taskMembers = members.filter(m => m.name !== 'Zorro');

  function recurLabel(t){
    if(!t.recur) return '';
    const n = t.recurN > 1 ? `Every ${t.recurN} ` : '';
    if(t.recur==='daily')     return n ? `Every ${t.recurN} days` : 'Daily';
    if(t.recur==='weekly')    return n ? `Every ${t.recurN} weeks` : 'Weekly';
    if(t.recur==='monthly')   return n ? `Every ${t.recurN} months` : 'Monthly';
    if(t.recur==='quarterly') return 'Quarterly';
    if(t.recur==='yearly')    return n ? `Every ${t.recurN} years` : 'Yearly';
    if(t.recur==='custom' && t.recurDays?.length)
      return t.recurDays.map(i=>['Su','Mo','Tu','We','Th','Fr','Sa'][i]).join(' ');
    return t.recur;
  }

  // Quarter key: "2026-Q2" — used to track quarterly done state
  function qKey(dateStr){
    const dt = new Date(dateStr+'T12:00:00');
    return `${dt.getFullYear()}-Q${Math.floor(dt.getMonth()/3)+1}`;
  }

  const visibleFor = (t, who) => {
    if(!whoArr(t).includes(who)) return false;
    // Skip explicitly excluded dates
    if(t.skipDates && t.skipDates.includes(d)) return false;
    if(!t.recur){
      if(t.date === d) return true;       // specific date task: show on its date
      if(!t.date){
        // Anytime task: show on today (if not done), OR on any day it was completed
        if((t.doneOn||[]).includes(d)) return true;  // show on completion date
        if((t.doneOn||[]).length === 0) return true;  // not yet done: show on all days (until completed)
        // Done on other date(s): only show on those dates, not today
        return false;
      }
      return false;
    }
    const base = new Date((t.date||fmt(T))+'T12:00:00');
    const cur  = new Date(d+'T12:00:00');
    const n    = t.recurN || 1;
    // Stop recurring from recurEnd date onwards
    if(t.recurEnd && d >= t.recurEnd) return false;

    // Helper: does this recurring task naturally fire on date ds?
    const firesOn = (ds) => {
      const c = new Date(ds+'T12:00:00');
      if(c < base) return false;
      if(t.recur === 'daily'){ const diff=Math.round((c-base)/86400000); return diff>=0&&diff%n===0; }
      if(t.recur === 'weekly'){ const diff=Math.round((c-base)/86400000); return diff>=0&&diff%(n*7)===0; }
      if(t.recur === 'monthly') return c>=base&&c.getDate()===base.getDate()&&((c.getFullYear()-base.getFullYear())*12+c.getMonth()-base.getMonth())%n===0;
      if(t.recur === 'quarterly'){ const qs=new Date(c.getFullYear(),Math.floor(c.getMonth()/3)*3,1); return c>=qs; }
      if(t.recur === 'yearly') return c>=base&&c.getDate()===base.getDate()&&c.getMonth()===base.getMonth()&&(c.getFullYear()-base.getFullYear())%n===0;
      if(t.recur === 'custom'&&t.recurDays?.length) return t.recurDays.includes(c.getDay());
      return false;
    };

    // stayUntilDone: show every day from the most recent fire date until it's completed
    if(t.stayUntilDone){
      if(cur < base) return false;
      // Walk back from d to find the most recent occurrence date
      let mostRecent = null;
      const check = new Date(cur);
      for(let i=0; i<400; i++){  // max 400 days lookback
        const ds = fmt(check);
        if(firesOn(ds)){ mostRecent = ds; break; }
        check.setDate(check.getDate()-1);
        if(check < base) break;
      }
      if(!mostRecent) return false;
      // If completed on or after mostRecent, only show on the completion date(s)
      const completedAfter = (t.doneOn||[]).filter(dd => dd >= mostRecent);
      if(completedAfter.length > 0) return completedAfter.includes(d);
      // Not completed yet — show every day from mostRecent up to today
      return d >= mostRecent && d <= fmt(T);
    }

    if(t.recur === 'daily'){ const diffDays = Math.round((cur - base) / 86400000); return diffDays >= 0 && diffDays % n === 0; }
    if(t.recur === 'weekly'){ const diffDays = Math.round((cur - base) / 86400000); return diffDays >= 0 && diffDays % (n * 7) === 0; }
    if(t.recur === 'monthly'){ return cur >= base && cur.getDate() === base.getDate() && ((cur.getFullYear() - base.getFullYear()) * 12 + cur.getMonth() - base.getMonth()) % n === 0; }
    if(t.recur === 'quarterly'){
      if(cur < base) return false;
      const qStart = new Date(cur.getFullYear(), Math.floor(cur.getMonth()/3)*3, 1);
      return cur >= qStart;
    }
    if(t.recur === 'yearly'){ return cur >= base && cur.getDate() === base.getDate() && cur.getMonth() === base.getMonth() && (cur.getFullYear() - base.getFullYear()) % n === 0; }
    if(t.recur === 'custom' && t.recurDays?.length) return t.recurDays.includes(cur.getDay());
    return false;
  };

  // For recurring tasks, done is tracked per-date in doneOn[]
  // Quarterly tasks use quarter key ("2026-Q2"); other recur use the date string
  function isDoneOn(t, date){
    if(t.recur === 'quarterly') return (t.doneOn||[]).includes(qKey(date));
    return (t.doneOn||[]).includes(date);
  }

  const card = (t, color) => {
    const isDone = isDoneOn(t, d);
    const sub    = recurLabel(t);
    return `<div class="task-card${isDone?' done-card':''}" style="border-left-color:${color}" data-task-id="${t.id}">
      <div class="task-check${isDone?' done':''}" style="${isDone?`background:${color}`:''}"
        onclick="toggleT(${t.id})">
        ${isDone?`<svg width="12" height="12" viewBox="0 0 8 8"><path d="M1 4l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <div class="task-card-body" onclick="toggleT(${t.id})">
        <div class="task-card-title${isDone?' done':''}">${t.title}</div>
        ${sub?`<div class="task-card-sub">${sub}</div>`:''}
      </div>
      <button class="task-menu-btn" onclick="editTask(${t.id})">⋮</button>
    </div>`;
  };

  // Progress ring: 40px wrap, avatar inset:4px → radius 16px, ring at r=19 (3px outside)
  const R = 19, C = 2 * Math.PI * R;
  function progressRing(done, total){
    const pct  = total > 0 ? done / total : 0;
    const dash = (pct * C).toFixed(1);
    const gap  = (C - pct * C).toFixed(1);
    return `<svg class="task-avatar-ring" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="${R}" fill="none" stroke="#e2e2de" stroke-width="2"/>
      <circle cx="20" cy="20" r="${R}" fill="none" stroke="#1a6bb5" stroke-width="2"
        stroke-dasharray="${dash} ${gap}" stroke-linecap="round"
        style="transition:stroke-dasharray 0.4s ease"/>
    </svg>`;
  }

  const isMobile = window.innerWidth <= 600;
  // On mobile: clamp taskMobileCol to valid range
  if(isMobile) taskMobileCol = Math.max(0, Math.min(taskMobileCol, taskMembers.length-1));
  const membersToRender = isMobile ? [taskMembers[taskMobileCol]] : taskMembers;

  const cols = membersToRender.map(m => {
    const myTasks = tasks.filter(t => visibleFor(t, m.name));
    const color   = mColor(m.name);

    const morning   = myTasks.filter(t => t.timeOfDay === 'morning');
    const afternoon = myTasks.filter(t => t.timeOfDay === 'afternoon');
    const evening   = myTasks.filter(t => t.timeOfDay === 'evening');
    const anytime   = myTasks.filter(t => !t.timeOfDay);

    const total = myTasks.length;
    const done  = myTasks.filter(t => isDoneOn(t, d)).length;

    const morningSection   = morning.length   ? `<div class="task-section-lbl">🌅 Morning</div>${morning.map(t => card(t, color)).join('')}`   : '';
    const afternoonSection = afternoon.length ? `<div class="task-section-lbl">☀️ Afternoon</div>${afternoon.map(t => card(t, color)).join('')}` : '';
    const eveningSection   = evening.length   ? `<div class="task-section-lbl">🌙 Evening</div>${evening.map(t => card(t, color)).join('')}`     : '';
    const anytimeSection   = anytime.length   ? `<div class="task-section-lbl">ANY TIME</div>${anytime.map(t => card(t, color)).join('')}`       : '';

    // Mobile: show person name + dot indicator in header
    const dotIndicator = isMobile ? `<div style="display:flex;gap:5px;margin-top:4px">${taskMembers.map((mm,ii)=>`<div style="width:6px;height:6px;border-radius:50%;background:${ii===taskMobileCol?mColor(mm.name):'var(--border)'}"></div>`).join('')}</div>` : '';

    return `<div class="task-col" style="${isMobile?'min-width:100%;width:100%;border-radius:0;border-left:none;border-right:none;border-top:none;':''}">
      <div class="task-col-hd">
        <div class="task-avatar-wrap">
          ${progressRing(done, total)}
          <div class="task-avatar" style="background:${color}">${m.name.charAt(0)}</div>
        </div>
        <div class="task-col-hd-info">
          <div class="task-avatar-name">${m.name}</div>
          <div class="task-progress">${done} of ${total} done</div>
          ${dotIndicator}
        </div>
      </div>
      <div class="task-col-body">
        ${morningSection}${afternoonSection}${eveningSection}${anytimeSection}
      </div>
    </div>`;
  }).join('');

  const dateLbl = isToday ? `Today, ${dow}` : dow;

  return `<div class="taskwrap">
    <div class="task-cols" style="${isMobile?'overflow:hidden;':''}">
      ${cols}
    </div>
  </div>`;
}

// ── iOS-style task drag-to-reorder ────────────────────────────────
// Single global drag state — avoids listener accumulation
const _td = {
  active: false, clone: null, sourceCard: null, sourceId: null,
  gap: null, longTimer: null, offsetX: 0, offsetY: 0, lastY: 0
};

function attachTaskDrag(){
  // Abort any leftover state from previous render
  _tdCleanup(false);

  document.querySelectorAll('.task-card').forEach(card => {
    card.addEventListener('mousedown',  _tdHandleStart, {passive:false});
    card.addEventListener('touchstart', _tdHandleStart, {passive:false});
  });

  // Global move/end — attached once to document
  if(!_td._globalBound){
    document.addEventListener('mousemove',   _tdMove,   {passive:false});
    document.addEventListener('mouseup',     _tdEnd,    {passive:false});
    document.addEventListener('touchmove',   _tdMove,   {passive:false});
    document.addEventListener('touchend',    _tdEnd,    {passive:false});
    document.addEventListener('touchcancel', _tdCancel, {passive:false});
    _td._globalBound = true;
  }
}

function _tdHandleStart(e){
  // Don't intercept taps on the checkbox or menu button
  const skip = e.target.closest('.task-check, .task-menu-btn');
  if(skip) return;

  const touch = e.touches ? e.touches[0] : e;
  const card  = e.currentTarget;
  clearTimeout(_td.longTimer);
  _td.longTimer = setTimeout(()=>{
    e.preventDefault && e.preventDefault();
    _tdBegin(card, touch.clientX, touch.clientY);
  }, 380);
}

function _tdBegin(card, cx, cy){
  if(!card) return;

  _td.active    = true;
  _td.sourceCard = card;
  _td.sourceId   = parseInt(card.dataset.taskId);
  _td.lastY      = cy;

  const rect = card.getBoundingClientRect();
  _td.offsetX = cx - rect.left;
  _td.offsetY = cy - rect.top;

  // Build clone — set individual properties so .task-drag-clone styles + flex layout both apply
  const clone = card.cloneNode(true);
  clone.className = 'task-drag-clone';
  // Position/size via individual props (cssText would wipe the class's flex styles)
  clone.style.width           = rect.width  + 'px';
  clone.style.height          = rect.height + 'px';
  clone.style.left            = rect.left   + 'px';
  clone.style.top             = rect.top    + 'px';
  clone.style.borderLeftColor = card.style.borderLeftColor;
  clone.style.display         = 'flex';
  clone.style.alignItems      = 'center';
  clone.style.gap             = '8px';
  clone.style.padding         = '7px 8px';
  clone.style.boxSizing       = 'border-box';
  document.body.appendChild(clone);
  _td.clone = clone;

  // Gap placeholder same height as card
  const gap = document.createElement('div');
  gap.className = 'task-drag-gap';
  gap.style.setProperty('--gap-h', rect.height + 'px');
  card.after(gap);
  _td.gap = gap;
  requestAnimationFrame(()=> gap.classList.add('open'));

  card.classList.add('drag-lifting');
  if(navigator.vibrate) navigator.vibrate([10]);
}

function _tdMove(e){
  if(!_td.active) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const cx = touch.clientX, cy = touch.clientY;
  _td.lastY = cy;

  // Move clone to follow finger
  _td.clone.style.left = (cx - _td.offsetX) + 'px';
  _td.clone.style.top  = (cy - _td.offsetY) + 'px';

  // Move gap instantly — no timeout, no lag
  _tdUpdateGap(cy);
}

function _tdUpdateGap(cy){
  if(!_td.gap) return;
  const gapParent = _td.gap.parentElement;
  if(!gapParent) return;

  const cards = _tdGetCards().filter(c => c.parentElement === gapParent);

  // Find insertion point — use top 35% of each card so moving up is easier
  let insertBefore = null;
  for(const c of cards){
    const r = c.getBoundingClientRect();
    if(cy < r.top + r.height * 0.35){ insertBefore = c; break; }
  }

  // Only reposition gap if it actually needs to move
  const currentNext = _td.gap.nextElementSibling;
  if(currentNext === insertBefore) return;

  // Move immediately — no animation close/reopen (causes lag and wrong drop)
  if(insertBefore && insertBefore.parentElement === gapParent){
    gapParent.insertBefore(_td.gap, insertBefore);
  } else {
    gapParent.appendChild(_td.gap);
  }
  _td.gap.classList.add('open');
}

function _tdEnd(e){
  clearTimeout(_td.longTimer);
  if(!_td.active) return;

  const sourceId = _td.sourceId;
  const gap      = _td.gap;
  const clone    = _td.clone;

  // Derive drop position from WHERE THE GAP IS — the single source of truth.
  // The gap moves instantly so it always reflects the correct target position.
  let insertBeforeId = null;
  if(gap){
    // Walk siblings after gap to find the next real task card
    let sib = gap.nextElementSibling;
    while(sib){
      if(sib.classList.contains('task-card') && !sib.classList.contains('drag-lifting')){
        insertBeforeId = parseInt(sib.dataset.taskId) || null;
        break;
      }
      sib = sib.nextElementSibling;
    }
  }

  // Settle animation
  if(gap && clone){
    const gr = gap.getBoundingClientRect();
    clone.classList.add('drop-settle');
    clone.style.left = gr.left + 'px';
    clone.style.top  = gr.top  + 'px';
  }

  _td.active = false;

  setTimeout(()=>{
    _tdCleanup(true);
    _tdReorder(sourceId, insertBeforeId);
  }, 200);
}

function _tdCancel(){
  clearTimeout(_td.longTimer);
  _tdCleanup(true);
}

function _tdCleanup(reshow){
  clearTimeout(_td.longTimer);
  _td.active = false;
  if(_td.clone)      { _td.clone.remove();      _td.clone = null; }
  if(_td.gap)        { _td.gap.remove();         _td.gap = null; }
  if(_td.sourceCard && reshow) _td.sourceCard.classList.remove('drag-lifting');
  _td.sourceCard = null;
  _td.sourceId   = null;
}

function _tdGetCards(){
  // All task cards except the source
  return [...document.querySelectorAll('.task-card:not(.drag-lifting)')];
}

function _tdReorder(sourceId, insertBeforeId){
  const srcIdx = tasks.findIndex(t=>t.id===sourceId);
  if(srcIdx === -1){ render(); return; }

  const [moved] = tasks.splice(srcIdx, 1);

  if(insertBeforeId != null){
    const tgtIdx = tasks.findIndex(t=>t.id===insertBeforeId);
    if(tgtIdx !== -1){
      tasks.splice(tgtIdx, 0, moved);
    } else {
      tasks.push(moved);
    }
  } else {
    // null = dropped after all visible cards — find the last card in the same
    // section/column as the source and insert after it
    // Simplest safe behaviour: re-insert at original position if we can't determine better
    // Actually the gap was at the end of the column body, so put it there
    tasks.push(moved);
  }

  render();
  ghScheduleSave();
}

function taskNav(dir){
  const d = new Date(taskDate+'T12:00:00');
  d.setDate(d.getDate()+dir);
  taskDate = fmt(d);
  render();
}
function taskGoToday(){ taskDate = fmt(T); render(); }

function toggleT(id){
  const t = tasks.find(t => t.id === id);
  if(!t) return;

  // All tasks now track completion per-date in doneOn[]
  // This ensures completed tasks only show as done on the day they were completed
  if(!t.doneOn) t.doneOn = [];
  const key = t.recur === 'quarterly'
    ? `${new Date(taskDate+'T12:00:00').getFullYear()}-Q${Math.floor(new Date(taskDate+'T12:00:00').getMonth()/3)+1}`
    : taskDate;
  const idx = t.doneOn.indexOf(key);
  if(idx === -1) t.doneOn.push(key);
  else t.doneOn.splice(idx, 1);

  // Keep t.done in sync for backwards compatibility
  t.done = t.doneOn.length > 0;

  const isNowDone = (t.doneOn||[]).includes(key);

  if(isNowDone){
    const section = t.timeOfDay || 'anytime';
    const d = taskDate;
    const isVisible = (tk, who) => {
      if(!whoArr(tk).includes(who)) return false;
      if(!tk.recur){
        if(tk.date===d) return true;
        if(!tk.date){
          if((tk.doneOn||[]).includes(d)) return true;
          if((tk.doneOn||[]).length === 0) return true;
          return false;
        }
        return false;
      }
      const base = new Date((tk.date||fmt(T))+'T12:00:00');
      const cur  = new Date(d+'T12:00:00');
      const n    = tk.recurN || 1;
      if(tk.recur==='daily'){ const diff=Math.round((cur-base)/86400000); return diff>=0&&diff%n===0; }
      if(tk.recur==='weekly'){ const diff=Math.round((cur-base)/86400000); return diff>=0&&diff%(n*7)===0; }
      if(tk.recur==='monthly') return cur>=base&&cur.getDate()===base.getDate()&&((cur.getFullYear()-base.getFullYear())*12+cur.getMonth()-base.getMonth())%n===0;
      if(tk.recur==='quarterly'){ if(cur<base) return false; const qs=new Date(cur.getFullYear(),Math.floor(cur.getMonth()/3)*3,1); return cur>=qs; }
      if(tk.recur==='yearly') return cur>=base&&cur.getDate()===base.getDate()&&cur.getMonth()===base.getMonth()&&(cur.getFullYear()-base.getFullYear())%n===0;
      if(tk.recur==='custom'&&tk.recurDays?.length) return tk.recurDays.includes(cur.getDay());
      return false;
    };
    const taskDoneKey = (tk, date) => tk.recur==='quarterly'
      ? `${new Date(date+'T12:00:00').getFullYear()}-Q${Math.floor(new Date(date+'T12:00:00').getMonth()/3)+1}`
      : date;
    const taskDone = tk => (tk.doneOn||[]).includes(taskDoneKey(tk,d));
    whoArr(t).forEach(who => {
      const sectionTasks = tasks.filter(tk => isVisible(tk, who) && (tk.timeOfDay||'anytime') === section);
      if(sectionTasks.length > 0 && sectionTasks.every(tk => taskDone(tk))){
        const label = section==='morning' ? '🌅 Morning' : section==='afternoon' ? '☀️ Afternoon' : section==='evening' ? '🌙 Evening' : '';
        showTaskCongrats(who, label);
      }
    });
  }
  render();
  ghScheduleSave();
}

function showTaskCongrats(name, section){
  document.querySelectorAll('.emoji-shower,.task-congrats').forEach(el=>el.remove());

  const emojis = ['🎉','⭐','🌟','✨','🎊','🏆','💪','🎈','🥳','👏','🌈','🦄'];
  const shower = document.createElement('div');
  shower.className = 'emoji-shower';

  for(let i=0; i<40; i++){
    const span = document.createElement('span');
    span.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    span.style.left   = Math.random()*100+'vw';
    span.style.animationDuration = (1.8+Math.random()*2.2)+'s';
    span.style.animationDelay   = (Math.random()*1.5)+'s';
    shower.appendChild(span);
  }
  document.body.appendChild(shower);

  const congrats = document.createElement('div');
  congrats.className = 'task-congrats';
  congrats.innerHTML = `<div class="task-congrats-box">

    <div class="task-congrats-msg">🎉 All tasks complete!</div>
  </div>`;
  document.body.appendChild(congrats);

  setTimeout(()=>{ shower.remove(); congrats.remove(); }, 3600);
}

function toggleLDrop(){

function focusList(idx){

// Commit item from the add bar
function laddCommit(){
  const input = document.getElementById('ladd-input');
  if(!input) return;
  const t = input.value.trim();
  if(!t) return;
  const fl = lists[_focusedList];
  if(!fl) return;
  fl.items.push({t, d:false});
  // Record in history for typeahead (persists even after item is deleted/checked)
  if(!fl._history) fl._history = [];
  const key = t.trim().toLowerCase();
  if(!fl._history.some(h => h.toLowerCase() === key)){
    fl._history.unshift(t.trim()); // most recent first
  }
  listsScheduleSave();
  // Append item to DOM without full re-render (keeps keyboard open)
  const lbody = document.querySelector('.lbody');
  if(lbody){
    // Remove empty message if present
    const empty = lbody.querySelector('[style*="Nothing here"]');
    if(empty) empty.remove();
    const idx = fl.items.length - 1;
    const div = document.createElement('div');
    div.className = 'litem';
    div.id = `litem-${fl.id}-${idx}`;
    div.innerHTML = `
      <div class="licheck" onclick="toggleI(${fl.id},${idx})"></div>
      <div class="litxt">${t}</div>
      <button class="litem-menu" onclick="startInlineEdit(${fl.id},${idx})" title="Edit">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9.5 2.5l2 2-7 7H2.5v-2l7-7z" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="litem-menu" onclick="deleteListItem(${fl.id},${idx})" title="Remove" style="color:#c44;font-size:16px;font-weight:500">✕</button>`;
    lbody.appendChild(div);
    // Scroll new item into view
    div.scrollIntoView({behavior:'smooth', block:'nearest'});
  }
  // Clear input and dropdown, keep focus, re-attach typeahead with updated history
  input.value = '';
  const drop = document.getElementById('ladd-drop');
  if(drop) drop.style.display = 'none';
  attachLaddTypeahead();
  input.focus();
}

// Delete item directly (no confirm needed — swipe to undo is native behavior)
function deleteListItem(lid, idx){
  const l = lists.find(l => l.id === lid);
  if(!l) return;
  const itemName = l.items[idx]?.t || 'this item';

    <p style="font-size:14px;color:var(--text);margin:4px 0 8px">
      Remove <strong>${itemName}</strong> from the list?
    </p>`;

    l.items.splice(idx, 1);
    closeM(); render(); listsScheduleSave();
  };
  setTimeout(()=>{
    const saveBtn = document.querySelector('#ov .modal-ft .btn-p');
    if(saveBtn){ saveBtn.textContent = 'Remove'; saveBtn.style.background = '#dc2626'; saveBtn.style.borderColor = '#dc2626'; }
  }, 0);

// Inline edit: replace litxt div with an input
function startInlineEdit(lid, idx){
  const l = lists.find(l => l.id === lid);
  if(!l) return;
  const itemDiv = document.getElementById(`litem-${lid}-${idx}`);
  if(!itemDiv) return;
  const litxt = itemDiv.querySelector('.litxt');
  if(!litxt) return;
  const original = l.items[idx].t;

  // Replace text with input
  itemDiv.classList.add('editing');
  const inp = document.createElement('input');
  inp.className = 'litem-edit-input';
  inp.type = 'text';
  inp.value = original;
  inp.autocomplete = 'off';
  litxt.replaceWith(inp);
  inp.focus();
  inp.select();

  // Attach typeahead to the inline input
  attachInlineTypeahead(inp);

  function commit(){
    const val = inp.value.trim();
    if(val && val !== original){
      l.items[idx].t = val;
      listsScheduleSave();
    }
    render();
  }
  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter'){ e.preventDefault(); commit(); }
    if(e.key==='Escape'){ render(); } // cancel
  });
  inp.addEventListener('blur', ()=> setTimeout(commit, 150));
}

// Typeahead for the inline edit input (simpler — no wrapping, just a floating list)
function attachInlineTypeahead(inp){
  const allItems = getAllPastItems();
  const drop = document.createElement('div');
  drop.className = 'typeahead-list';
  drop.style.cssText = 'position:fixed;z-index:900;width:280px;display:none';
  document.body.appendChild(drop);

  function position(){
    const r = inp.getBoundingClientRect();
    drop.style.left = r.left+'px';
    drop.style.top  = (r.top - drop.offsetHeight - 4)+'px';
    if(parseFloat(drop.style.top) < 60) drop.style.top = (r.bottom+4)+'px';
  }

  function showSuggestions(query){
    const q = query.trim().toLowerCase();
    const matches = q
      ? allItems.filter(t=>t.toLowerCase().includes(q) && t!==inp.value).slice(0,6)
      : allItems.filter(t=>t!==inp.value).slice(0,5);
    if(!matches.length){ drop.style.display='none'; return; }
    drop.innerHTML = matches.map(t=>`<div class="typeahead-item" data-val="${t.replace(/"/g,'&quot;')}">
      <span class="typeahead-item-icon">${q?'🔍':'🕐'}</span><span>${t}</span></div>`).join('');
    drop.style.display='block';
    position();
    drop.querySelectorAll('.typeahead-item').forEach(el=>{
      el.addEventListener('mousedown', e=>{ e.preventDefault(); inp.value=el.dataset.val; drop.style.display='none'; inp.focus(); });
      el.addEventListener('touchstart', e=>{ e.preventDefault(); inp.value=el.dataset.val; drop.style.display='none'; inp.focus(); },{passive:false});
    });
  }

  inp.addEventListener('input', ()=> showSuggestions(inp.value));
  inp.addEventListener('focus', ()=> showSuggestions(inp.value));
  inp.addEventListener('blur',  ()=> setTimeout(()=>{ drop.remove(); },200));
  showSuggestions(inp.value);
}

// Wire typeahead to the add bar after lists render
// Items from the current list only (for empty-state suggestions)
// Permanently remove an item from a list's _history
function removeFromHistory(listIdx, text){
  document.getElementById('mttl').textContent = 'Delete Suggestion?';
  document.getElementById('mbd').innerHTML = `
    <p style="font-size:14px;color:var(--text);margin:4px 0 8px">
      Permanently delete <strong>${text}</strong> from suggestions?<br>
      <span style="font-size:12px;color:var(--muted)">This cannot be undone.</span>
    </p>`;
  window._save = () => {
    const l = lists[listIdx];
    if(l && l._history){
      l._history = l._history.filter(h => h.toLowerCase() !== text.toLowerCase());
      listsScheduleSave();
    }
    closeM();
    // Re-attach typeahead with updated history
    setTimeout(attachLaddTypeahead, 30);
  };
  setTimeout(()=>{
    const saveBtn = document.querySelector('#ov .modal-ft .btn-p');
    if(saveBtn){ saveBtn.textContent = 'Delete'; saveBtn.style.background = '#dc2626'; saveBtn.style.borderColor = '#dc2626'; }
  }, 0);
  openM();
}

// Backfill _history from existing items for lists that predate the history system
function backfillHistory(){
  lists.forEach(l => {
    if(!l._history) l._history = [];
    // Add any items not already in history
    l.items.forEach(it => {
      const key = it.t.trim().toLowerCase();
      if(key && !l._history.some(h => h.toLowerCase() === key)){
        l._history.push(it.t.trim());
      }
    });
  });
}

function getAllPastItems(){
  const seen = new Set();
  const items = [];
  for(let i = lists.length-1; i >= 0; i--){
    const l = lists[i];
    // Combine _history + current items, history first (preserves recency order)
    const hist = l._history || [];
    const curr = l.items.map(it => it.t);
    const combined = [...hist, ...curr];
    for(const entry of combined){
      const t = (entry?.t || entry || '').trim();
      const key = t.toLowerCase();
      if(t && !seen.has(key)){ seen.add(key); items.push(t); }
    }
  }
  return items;
}

function getCurrentListItems(){
  const fl = lists[_focusedList];
  if(!fl) return [];
  // Combine _history + current items for this list, history first
  const hist = fl._history || [];
  const curr = fl.items.map(it => it.t);
  const combined = [...hist, ...curr];
  const seen = new Set();
  const result = [];
  for(const entry of combined){
    const t = (entry?.t || entry || '').trim();
    const key = t.toLowerCase();
    if(t && !seen.has(key)){ seen.add(key); result.push(t); }
  }
  return result;
}

function attachLaddTypeahead(){
  const input = document.getElementById('ladd-input');
  const drop  = document.getElementById('ladd-drop');
  if(!input || !drop) return;
  const allItems     = getAllPastItems();
  const currentItems = getCurrentListItems();

  function highlight(text, query){
    if(!query) return text;
    const idx = text.toLowerCase().indexOf(query.toLowerCase());
    if(idx === -1) return text;
    return text.slice(0,idx)+`<span class="typeahead-match">${text.slice(idx,idx+query.length)}</span>`+text.slice(idx+query.length);
  }

  function showSuggestions(query){
    const q = query.trim().toLowerCase();
    const pool   = q ? allItems : currentItems;
    const matches = q
      ? pool.filter(t=>t.toLowerCase().includes(q)).slice(0,8)
      : pool.slice(0,5);
    if(!matches.length){ drop.style.display='none'; return; }

    drop.innerHTML = matches.map(t=>`
      <div class="typeahead-item" data-val="${t.replace(/"/g,'&quot;')}" style="justify-content:space-between">
        <span style="display:flex;align-items:center;gap:8px;flex:1;min-width:0">
          <span class="typeahead-item-icon">${q?'🔍':'🕐'}</span>
          <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${highlight(t,q)}</span>
        </span>
        <button class="ta-del-btn" data-text="${t.replace(/"/g,'&quot;')}"
          style="flex-shrink:0;border:none;background:none;color:#c44;padding:0 2px 0 8px;cursor:pointer;line-height:1;display:flex;align-items:center"
          title="Permanently delete from suggestions">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 4h10M5 4V2.5h4V4M5.5 6.5v4M8.5 6.5v4M3 4l.7 7.5h6.6L11 4" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>`).join('');

    drop.style.display='block';

    // Tap/click the row → fill and commit
    drop.querySelectorAll('.typeahead-item').forEach(el=>{
      el.addEventListener('mousedown', e=>{
        if(e.target.classList.contains('ta-del-btn')) return;
        e.preventDefault(); input.value=el.dataset.val; drop.style.display='none'; laddCommit();
      });
      el.addEventListener('touchstart', e=>{
        if(e.target.classList.contains('ta-del-btn')) return;
        e.preventDefault(); input.value=el.dataset.val; drop.style.display='none'; laddCommit();
      },{passive:false});
    });

    // × button → confirm permanent delete
    drop.querySelectorAll('.ta-del-btn').forEach(btn=>{
      btn.addEventListener('mousedown', e=>{ e.preventDefault(); e.stopPropagation(); });
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        drop.style.display='none';
        removeFromHistory(_focusedList, btn.dataset.text);
      });
      btn.addEventListener('touchstart', e=>{
        e.preventDefault(); e.stopPropagation();
        drop.style.display='none';
        removeFromHistory(_focusedList, btn.dataset.text);
      },{passive:false});
    });
  }

  input.addEventListener('focus', ()=> showSuggestions(input.value));
  input.addEventListener('input', ()=> showSuggestions(input.value));
  input.addEventListener('blur',  ()=> setTimeout(()=>{ drop.style.display='none'; },200));
}



function toggleI(lid, idx){
  const l = lists.find(l => l.id === lid);
  if(!l) return;
  const it = l.items[idx];
  it.d = !it.d;
  it.doneDate = it.d ? fmt(T) : null; // record date when checked
  render(); listsScheduleSave();
}

// Remove list items that were checked on a previous day
function purgeCheckedItems(){
  const today = fmt(T);
  let changed = false;
  lists.forEach(l => {
    const before = l.items.length;
    l.items = l.items.filter(it => !(it.d && it.doneDate && it.doneDate < today));
    if(l.items.length !== before) changed = true;
  });
  if(changed) listsScheduleSave();
}

// Returns HTML for the 4-icon picker; selectedKey is the currently selected icon key

      <button type="button" class="list-icon-opt${k===selectedKey?' sel':''}"
        data-icon-key="${k}" title="${LIST_ICON_LABELS[k]}"
        onclick="listIconPickSel(this,'${k}')">
        ${LIST_ICONS[k]}

function listIconPickSel(btn, key){

// Standalone card renderer — used by both rPackages and _pkgUpdateCards
function _pkgRenderCards(pkgList){
  return pkgList.map(p => {
    const steps = ['ordered','shipped','out','delivered'];
    const stepLabels = ['Ordered','Shipped','Out for delivery','Delivered'];
    const activeIdx = Math.max(0, steps.indexOf(p.status));
    const fillPct = ['0','33%','66%','100%'][activeIdx];

    const progressBar = `
      <div class="pkg-progress">
        <div class="pkg-steps">
          <div class="pkg-line-track"></div>
          <div class="pkg-line-fill" style="width:${fillPct}"></div>
          ${steps.map((s,i) => {
            const cls = i < activeIdx ? 'done' : i === activeIdx ? 'active' : 'idle';
            const inner = i < activeIdx
              ? `<svg width="10" height="10" viewBox="0 0 8 8"><path d="M1 4l2 2 4-4" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>`
              : i === activeIdx ? `<div class="pkg-dot-inner"></div>` : '';
            return `<div class="pkg-step"><div class="pkg-dot ${cls}">${inner}</div><div class="pkg-step-lbl${i===activeIdx?' active':''}">${stepLabels[i]}</div></div>`;
          }).join('')}
        </div>
      </div>`;

    const imgSrc = (p.images||[])[0] || null;
    const imageHtml = imgSrc
      ? `<img src="${imgSrc}" style="width:100%;height:100%;object-fit:contain"
           onerror="this.parentElement.innerHTML='<div style=\\'font-size:48px\\'>📦</div>'">`
      : `<div style="font-size:48px">📦</div>`;

    const arrivalHtml = p.status === 'delivered'
      ? `<div class="pkg-arrival">Delivered ${new Date(p.deliveredAt||p.addedAt||Date.now()).toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})}</div>`
      : (() => {
          // Don't show eta if it contains status words that contradict current status
          // e.g. don't show "Delivered today" on a Shipped package
          const etaLow = (p.eta||'').toLowerCase();
          if(!p.eta) return '';
          if(p.status !== 'delivered' && etaLow.startsWith('delivered')) return '';
          if(p.status === 'ordered' && (etaLow.startsWith('arriving') || etaLow.startsWith('expected'))) return p.eta ? `<div class="pkg-arrival">${p.eta}</div>` : '';
          return `<div class="pkg-arrival">${p.eta}</div>`;
        })();

    const infoLines = [
      p.recipient && p.city ? `<div class="pkg-info-row"><strong>${p.recipient} – ${p.city}</strong></div>` : '',
      p.orderNum ? `<div class="pkg-info-row">Order # ${p.orderNum}</div>` : '',
      (p.items?.length)
        ? p.items.map(item => `<div class="pkg-info-row" style="line-height:1.5;white-space:normal;word-break:break-word;padding-left:10px;border-left:2px solid var(--border);margin:2px 0">• ${item}</div>`).join('')
        : (p.label && p.label!=='Package' ? `<div class="pkg-info-row" style="line-height:1.5;white-space:normal;word-break:break-word">${p.label}</div>` : ''),
      p.total ? `<div class="pkg-info-row" style="margin-top:4px">Total: <strong>$${p.total}</strong></div>` : '',
    ].filter(Boolean).join('');

    return `<div class="pkg-card">
      ${progressBar}
      <div class="pkg-card-body">
        <div class="pkg-img-box">${imageHtml}</div>
        ${arrivalHtml}
        <div class="pkg-info">${infoLines}</div>
      </div>
    </div>`;
  }).join('');
}

function pkgTrackingUrl(carrier, tracking){
  if(!tracking) return '';
  const t = encodeURIComponent(tracking);
  const urls = {
    'UPS':    `https://www.ups.com/track?tracknum=${t}`,
    'FedEx':  `https://www.fedex.com/fedextrack/?trknbr=${t}`,

function _pkgRelTime(ts){
  const mins = Math.floor((Date.now()-ts)/60000);
  if(mins < 1)   return 'just now';
  if(mins < 60)  return `${mins}m ago`;
  const hrs = Math.floor(mins/60);
  if(hrs < 24)   return `${hrs}h ago`;
  return `${Math.floor(hrs/24)}d ago`;
}

// Auto-purge delivered packages older than 48h
function pkgPurgeOld(){
  const h48 = 48*3600000;
  const before = packages.length;
  packages = packages.filter(p => {
    if(p.status !== 'delivered') return true;
    if(!p.deliveredAt) return true; // deliveredAt not set yet — keep it
    return (Date.now() - p.deliveredAt) < h48;
  });
  if(packages.length !== before) pkgScheduleSave();
}

const PKG_FILE = 'packages.json';
function pkgApi(){ return `https://api.github.com/repos/${ghOwner()}/${ghRepo()}/contents/${PKG_FILE}`; }
let _pkgSha = null, _pkgSaveTimer = null, _pkgLoaded = false;

function pkgScheduleSave(){
  if(!_pkgLoaded) return;
  clearTimeout(_pkgSaveTimer);
  _pkgSaveTimer = setTimeout(pkgSaveNow, 800);
}

async function pkgSaveNow(){
  if(!ghToken()||!ghOwner()||!ghRepo()) return;
  try {
    const body = { message:'Update packages.json', content: ghEncode(packages) };
    if(_pkgSha) body.sha = _pkgSha;
    const r = await fetch(pkgApi(), {
      method:'PUT',
      headers:{ Authorization:'token '+ghToken(), Accept:'application/vnd.github+json', 'Content-Type':'application/json' },
      body: JSON.stringify(body)
    });
    if(r.ok){ const d=await r.json(); _pkgSha=d.content?.sha||_pkgSha; }
  } catch(e){ console.error('packages.json save failed:',e); }
}

async function clearPackages(){
  if(!confirm('Clear all packages and reset? This cannot be undone.')) return;
  packages = [];
  _gmailLastFull = 0;
  _pkgLoaded = true;
  await pkgSaveNow();
  render();
}

async function pkgLoad(){
  if(!ghToken()||!ghOwner()||!ghRepo()){ _pkgLoaded=true; return; }
  try {
    const r = await fetch(pkgApi()+'?t='+Date.now(), {
      headers:{ Authorization:'token '+ghToken(), Accept:'application/vnd.github+json' }
    });
    if(r.status===404){ _pkgLoaded=true; return; }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();
    _pkgSha = d.sha;
    let loaded;
    try { loaded = JSON.parse(atob(d.content.replace(/\n/g,''))); }
    catch(e){ _pkgLoaded=true; return; }
    if(Array.isArray(loaded)) packages = loaded;
    _pkgLoaded = true;
    pkgPurgeOld();
  } catch(e){ console.error('packages.json load failed:',e); _pkgLoaded=true; }
}

const GMAIL_CLIENT_ID = '697995087846-jb5286il5gl9c0osnvgbtjheu3u844ne.apps.googleusercontent.com';

// Build Gmail query using exact from: addresses
function _gmailQuery(scope){
  const senders = 'from:(auto-confirm@amazon.com OR shipment-tracking@amazon.com OR order-update@amazon.com)';
  const age = scope === 'full' ? 'newer_than:30d' : 'newer_than:2d';
  return `${senders} ${age}`;

function gmailSignIn(){
  if(!window.google?.accounts?.oauth2){
    alert('Google Identity Services not loaded. Please wait a moment and try again.');
    return;
  }
  const client = google.accounts.oauth2.initTokenClient({
    client_id: GMAIL_CLIENT_ID,
    scope: GMAIL_SCOPES,
    callback: async (resp) => {
      if(resp.error){ console.error('Gmail OAuth error:', resp); return; }
      _gmailToken = resp.access_token;
      _gmailTokenExpiry = Date.now() + (resp.expires_in - 60) * 1000;
      // First time: run full 30-day sync. Subsequent: incremental only.
      if(!_gmailLastFull){
        await gmailFullSync();
      } else {
        await gmailIncrementalSync();
      }
      render();
    }
  });
  client.requestAccessToken();
}

function gmailSignOut(){
  if(_gmailToken) google.accounts.oauth2.revoke(_gmailToken);
  _gmailToken = null;
  _gmailError = false;
  render();
}

function gmailIsConnected(){ return !!_gmailToken && Date.now() < _gmailTokenExpiry; }

// ── FULL SYNC (30 days) — runs once, shows detailed progress ──────
async function gmailFullSync(){
  if(!gmailIsConnected() || _gmailSyncing) return;
  _gmailSyncing = true;
  _gmailError   = false;
  _gmailProgress = { step:'Searching your Gmail…', current:0, total:0 };
  _showSyncOverlay();

  try {
    // Step 1: search
    _gmailProgress.step = 'Searching Gmail for shipping emails…';
    _updateSyncOverlay();

    const q = _gmailQuery('full');
    const searchResp = await _gmailFetch(
      `${GMAIL_API}/users/me/messages?maxResults=200&q=${encodeURIComponent(q)}`
    );
    const messages = (searchResp.messages || []).reverse(); // oldest-first so status upgrades in order
    if(!messages.length){
      _gmailProgress.step = 'No shipping emails found.';
      _updateSyncOverlay();
      await _sleep(1000);
      _gmailLastFull = Date.now();
      return;
    }

    // Step 2: fetch details in small batches of 5 to stay within rate limits
    _gmailProgress.total   = messages.length;
    _gmailProgress.current = 0;
    const BATCH = 5;
    const newPackages = [];

    for(let i = 0; i < messages.length; i += BATCH){
      const batch = messages.slice(i, i + BATCH);
      _gmailProgress.step = `Reading email ${i+1}–${Math.min(i+BATCH, messages.length)} of ${messages.length}…`;
      _gmailProgress.current = i;
      _updateSyncOverlay();

      const details = await Promise.all(
        batch.map(msg =>
          _gmailFetch(`${GMAIL_API}/users/me/messages/${msg.id}?format=full`)
            .catch(() => null)
        )
      );
      for(const data of details){
        if(!data) continue;
        const parsed = _parseShippingEmail(data);
        if(parsed){ parsed.forEach(p=>console.log(`[pkg] ${p.status.padEnd(9)} orderNum=${(p.orderNum||"NONE").padEnd(22)} ${p.label.slice(0,50)}`)); newPackages.push(...parsed); }
      }
    }

    // Step 3: merge into a FRESH array — full sync always produces clean state
    // Starting fresh ensures no stale entries from previous broken syncs survive
    _gmailProgress.step = `Found ${newPackages.length} package update(s). Saving…`;
    _gmailProgress.current = messages.length;
    _updateSyncOverlay();

    packages = []; // clear stale data before full sync merge
    _mergePackages(newPackages);
    _gmailLastFull = Date.now();
    _gmailLastSync = Date.now();
    _gmailProgress.step = `✓ Done — ${packages.filter(p=>p.status!=='delivered').length} active packages`;
    _updateSyncOverlay();
    await _sleep(1200);

  } catch(e){
    console.error('Full sync failed:', e);
    _gmailError = true;
    _gmailProgress.step = '❌ Sync failed: ' + (e.message||'unknown error');
    _updateSyncOverlay();
    await _sleep(2000);
  } finally {
    _gmailSyncing = false;
    _hideSyncOverlay();
    if(appV==='packages') render();
  }
}

// ── INCREMENTAL SYNC (last 2 days) — fast, runs automatically ─────
async function gmailIncrementalSync(){
  if(!gmailIsConnected() || _gmailSyncing) return;
  _gmailSyncing = true;
  _gmailError   = false;
  if(appV==='packages') render(); // show yellow button

  try {
    const q = _gmailQuery('incremental');
    const searchResp = await _gmailFetch(
      `${GMAIL_API}/users/me/messages?maxResults=20&q=${encodeURIComponent(q)}`
    );
    const messages = (searchResp.messages || []).reverse();

    if(messages.length){
      const details = await Promise.all(
        messages.map(msg =>
          _gmailFetch(`${GMAIL_API}/users/me/messages/${msg.id}?format=full`)
            .catch(() => null)
        )
      );
      const newPackages = [];
      for(const data of details){
        if(!data) continue;
        const parsed = _parseShippingEmail(data);
        if(parsed) newPackages.push(...parsed);
      }
      _mergePackages(newPackages);
    }

    _gmailLastSync = Date.now();
    _gmailError = false;

  } catch(e){
    console.error('Incremental sync failed:', e);
    _gmailError = true;
  } finally {
    _gmailSyncing = false;
    if(appV==='packages') render();
  }
}

// Public sync button — runs full if never done, incremental otherwise
function gmailSync(){
  if(_gmailLastFull){ gmailIncrementalSync(); }
  else { gmailFullSync(); }
}

function gmailFullSyncManual(){ gmailFullSync(); }

// ── HELPERS ───────────────────────────────────────────────────────
async function _gmailFetch(url){
  const r = await fetch(url, { headers:{ Authorization:`Bearer ${_gmailToken}` }});
  if(!r.ok) throw new Error(`Gmail API ${r.status}: ${url.slice(0,60)}`);
  return r.json();
}

function _sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

function _mergePackages(newPackages){
  let changed = false;
  for(const np of newPackages){
    // Deduplicate by orderNum first (consistent across all 5 Amazon status emails),
    // then tracking number, then msgId as last resort
    const existing = packages.find(p =>
      (p.orderNum && np.orderNum && p.orderNum === np.orderNum) ||
      (p.tracking && np.tracking && p.tracking === np.tracking) ||
      (p.msgId && p.msgId === np.msgId)
    );
    if(!existing){
      packages.push(np);
      changed = true;
    } else {
      // Always upgrade to highest status
      if(_statusRank(np.status) > _statusRank(existing.status)){
        existing.status    = np.status;
        existing.updatedAt = np.updatedAt || Date.now();
        if(np.status==='delivered'){
          existing.deliveredAt = np.deliveredAt || np.addedAt || Date.now();
          existing.eta = ''; // clear stale arrival estimate
        }
        changed = true;
      }
      // Fill in any missing fields from this email
      if(np.images?.length  && !existing.images?.length)  { existing.images    = np.images;    changed = true; }
      if(!existing.eta       && np.eta)                    { existing.eta       = np.eta;       changed = true; }
      if(!existing.recipient && np.recipient)              { existing.recipient = np.recipient; changed = true; }
      if(!existing.city      && np.city)                   { existing.city      = np.city;      changed = true; }
      if(!existing.orderNum  && np.orderNum)               { existing.orderNum  = np.orderNum;  changed = true; }
      if(!existing.tracking  && np.tracking)               { existing.tracking  = np.tracking;  changed = true; }
      if(!existing.items?.length && np.items?.length)      { existing.items     = np.items;     changed = true; }
      if(!existing.total     && np.total)                  { existing.total     = np.total;     changed = true; }
    }
  }
  if(changed){ pkgPurgeOld(); pkgScheduleSave(); }
}

// ── STATUS & EMAIL PARSING ─────────────────────────────────────────
function _statusRank(s){ return {ordered:0,shipped:1,out:2,delivered:3}[s]??0; }

// Decode Gmail base64url payload to HTML string
function _decodePayloadHtml(payload){
  const parts = [];
  function walk(p){
    if(!p) return;
    if(p.mimeType==='text/html' && p.body?.data)
      parts.push(atob(p.body.data.replace(/-/g,'+').replace(/_/g,'/')));
    (p.parts||[]).forEach(walk);
  }
  walk(payload);
  return parts.join('\n');
}

// Parse HTML string into a DOM document (browser-side)
function _toDoc(html){
  const d = document.implementation.createHTMLDocument('');
  d.body.innerHTML = html;
  return d;
}

// Strip HTML tags, collapse whitespace
function _text(el){ return (el?.textContent||'').replace(/\s+/g,' ').trim(); }

// Determine status purely from subject line prefix — Amazon always prefixes with status
function _statusFromSubject(subject){
  const s = subject.toLowerCase();
  if(s.startsWith('delivered'))        return 'delivered';
  if(s.startsWith('out for delivery')) return 'out';
  if(s.startsWith('delivery update'))  return 'out';   // "delivery update" = usually out/arriving soon
  if(s.startsWith('ordered'))          return 'ordered';
  if(s.startsWith('shipped'))          return 'shipped';
  if(s.includes('delivered'))          return 'delivered';
  if(s.includes('out for delivery'))   return 'out';
  if(s.includes('has shipped'))        return 'shipped';
  if(s.includes('order'))              return 'ordered';
  return 'shipped'; // safe default
}

// ── MAIN PARSER ───────────────────────────────────────────────────
function _parseShippingEmail(msgData){
  const headers = msgData.payload?.headers || [];
  const subject = headers.find(h=>h.name==='Subject')?.value || '';
  const from    = headers.find(h=>h.name==='From')?.value || '';
  const date    = headers.find(h=>h.name==='Date')?.value || '';
  const msgDate = date ? new Date(date).getTime() : Date.now();
  const fromLow = from.toLowerCase();

  if(!SHIPPING_SENDERS.some(d => fromLow.includes(d))) return null;

  const html = _decodePayloadHtml(msgData.payload);
  if(!html) return null;

  const doc    = _toDoc(html);
  const status = _statusFromSubject(subject);

  // Find all distinct order numbers in the email
  const orderNums = _findAllOrderNums(doc);

  if(orderNums.length <= 1){
    // Single shipment email — parse whole body as one block
    const pkg = _parseBlock(doc.body, doc, status, msgDate, subject, from, msgData.id, orderNums[0]||'');
    return pkg ? [pkg] : null;
  }

  // Multi-shipment order confirmation — split by finding each order number's section.
  // Strategy: find the order number elements, then extract a slice of the DOM between them.
  const results = [];
  const seen = new Set();

  for(const num of orderNums){
    if(seen.has(num)) continue;
    seen.add(num);
    // Find a block for this order number by locating a container that has ONLY this order number
    const block = _findSingleOrderBlock(num, doc);
    const pkg = _parseBlock(block, doc, status, msgDate, subject, from, msgData.id, num);
    if(pkg) results.push(pkg);
  }

  return results.length ? results : null;
}

// Return array of distinct order numbers found in doc
function _findAllOrderNums(doc){
  const seen = new Set();
  const re = /\b(\d{3}-\d{7}-\d{7})\b/g;
  const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
  let node;
  while((node = walker.nextNode())){
    re.lastIndex = 0;
    let m;
    while((m = re.exec(node.textContent)) !== null) seen.add(m[1]);
  }
  return [...seen];
}

// For multi-shipment emails: find the tightest element that contains ONLY one order number
function _findSingleOrderBlock(orderNum, doc){
  // Find the text node containing this order number
  const re = new RegExp(`\\b${orderNum.replace(/-/g,'\\-')}\\b`);
  const walker = doc.createTreeWalker(doc.body, NodeFilter.SHOW_TEXT);
  let node;
  while((node = walker.nextNode())){
    if(re.test(node.textContent)){
      // Walk up to find tightest ancestor containing only this order number
      let cur = node.parentElement;
      let best = cur;
      for(let i=0; i<20; i++){
        if(!cur || cur === doc.body) break;
        const allNums = new Set();
        const w2 = doc.createTreeWalker(cur, NodeFilter.SHOW_TEXT);
        let n2;
        while((n2 = w2.nextNode())){
          const r2 = /\b(\d{3}-\d{7}-\d{7})\b/g;
          let m;
          while((m = r2.exec(n2.textContent)) !== null) allNums.add(m[1]);
        }
        if(allNums.size > 1) break; // contains other orders — stop
        if(allNums.has(orderNum)) best = cur;
        cur = cur.parentElement;
      }
      return best;
    }
  }
  return doc.body;
}

// Parse a single shipment block element into a package object
function _parseBlock(block, doc, status, msgDate, subject, from, msgId, knownOrderNum){
  if(!block) return null;

  // ── ORDER NUMBER ──────────────────────────────────────────────
  const blockText = _text(block);
  const orderNum  = knownOrderNum || (blockText.match(/\b(\d{3}-\d{7}-\d{7})\b/)||[])[1] || '';

  // ── ARRIVAL / ETA ─────────────────────────────────────────────
  let eta = '';
  const ownerDoc = block.ownerDocument || doc;

  // Walk all text nodes in the block looking for arrival text
  const textWalker = ownerDoc.createTreeWalker(block, NodeFilter.SHOW_TEXT);
  let tnode;
  while((tnode = textWalker.nextNode()) && !eta){
    const t = tnode.textContent.trim();
    if(!t) continue;
    if(/^(arriving|arrived|expected|delivering|delivered|now expected)\b/i.test(t) && t.length < 80){
      eta = t.replace(/\s+/g,' ').trim();
    }
  }

  // Fallback: bold elements with arrival text
  if(!eta){
    for(const b of block.querySelectorAll('b,strong')){
      const t = _text(b);
      if(/^(arriving|expected|delivering|delivered today|now expected)\b/i.test(t) && t.length < 80){
        eta = t; break;
      }
    }
  }

  // ── RECIPIENT & CITY ──────────────────────────────────────────
  // "Christopher - KINNELON, NEW JERSEY"  (name - CITY, STATE)
  let recipient = '', city = '';
  const recipMatch = blockText.match(/\b([A-Z][a-z]+(?:\s+[A-Z][a-z]+)*)\s*[-–]\s*([A-Z][A-Z][A-Z\s]+,\s+[A-Z\s]{2,})\b/);
  if(recipMatch){
    recipient = recipMatch[1].trim();
    city      = recipMatch[2].trim().replace(/\s+/g,' ').replace(/O$/, ''); // trim stray chars
  }

  // ── ITEMS ─────────────────────────────────────────────────────
  const items = [];
  const skipNames = /^(view|track|shop|visit|manage|sign\s*in|help|buy again|return|your orders|your account|add delivery|continue|learn more|unsubscribe|privacy)/i;
  for(const a of block.querySelectorAll('a[href]')){
    const href = a.getAttribute('href') || '';
    const name = _text(a).replace(/\s+/g,' ').trim();
    // Accept links to amazon.com (any path — redirect URLs are common in emails)
    if(!href.includes('amazon.com') && !href.includes('amazon.co')) continue;
    if(name.length < 8) continue;
    if(skipNames.test(name)) continue;
    if(/^\d{3}-\d{7}-\d{7}$/.test(name)) continue;
    if(/^\$[\d,]+\.\d{2}$/.test(name)) continue; // skip price-only links
    if(items.includes(name)) continue;
    items.push(name);
    if(items.length >= 10) break;
  }

  // ── LABEL ─────────────────────────────────────────────────────
  const label = items.length ? items[0].slice(0, 100) : _cleanSubjectLabel(subject, from);

  // ── TOTAL ─────────────────────────────────────────────────────
  const totalMatch = blockText.match(/(?:grand\s+total|total)[:\s]*\$?\s*([\d,]+\.\d{2})/i);
  const total = totalMatch ? totalMatch[1] : '';

  // ── IMAGE ─────────────────────────────────────────────────────
  let image = '';
  for(const img of block.querySelectorAll('img[src]')){
    const src   = img.getAttribute('src') || '';
    const lower = src.toLowerCase();
    if(!src.startsWith('http')) continue;
    if(lower.includes('spacer')||lower.includes('pixel')||lower.includes('logo')||
       lower.includes('banner')||lower.includes('transparent')||lower.includes('icon')) continue;
    if(lower.includes('delivery-photo')||lower.includes('package-photo')) continue;
    const w = parseInt(img.getAttribute('width') ||'0');
    const h = parseInt(img.getAttribute('height')||'0');
    if((w > 0 && w > 300)||(h > 0 && h > 300)) continue;
    if((w > 0 && w <  30)||(h > 0 && h <  30)) continue;
    const isProductCDN = lower.includes('images-na.ssl-images-amazon') ||
                         lower.includes('m.media-amazon') ||
                         lower.includes('ssl-images-amazon');
    if(isProductCDN){ image = `https://wsrv.nl/?url=${encodeURIComponent(src)}&w=200&h=200&fit=contain&output=webp`; break; }
    if(!image && w >= 40) image = `https://wsrv.nl/?url=${encodeURIComponent(src)}&w=200&h=200&fit=contain&output=webp`;
  }

  if(!orderNum && !items.length && !label) return null;

  return {
    id: Date.now() + Math.random(),
    label,
    carrier:     'Amazon',
    tracking:    '',
    status,
    // Never store eta that contradicts the status — prevents stale "Delivered" text on shipped cards
    eta:         (status === 'delivered' || /^delivered/i.test(eta)) ? '' : eta,
    recipient,
    city,
    orderNum,
    items,
    images:      image ? [image] : [],
    total,
    addedAt:     msgDate,
    updatedAt:   msgDate,
    deliveredAt: status === 'delivered' ? msgDate : null,
    fromEmail:   true,
    msgId,
  };
}

// Clean up subject line to use as fallback label
function _cleanSubjectLabel(subject, from){
  let label = subject
    .replace(/^(delivered|shipped|out\s+for\s+delivery|ordered|delivery\s+update)\s*:\s*/i,'')
    .replace(/^\d+x?\s+[""]?/,'')
    .replace(/[""].*$/,'')   // strip everything after closing quote
    .replace(/\s+and\s+\d+\s+more\s+items?\s*$/i,'')
    .trim();
  if(!label || label.length < 4){
    const m = from.match(/^([^<@\n]+)/);
    label = m ? m[1].trim().replace(/"/g,'') : 'Package';
  }
  return label.slice(0,100);
}

function _detectCarrierFromSender(from){
  const f = from.toLowerCase();
  if(f.includes('amazon')) return 'Amazon';
  if(f.includes('ups'))    return 'UPS';
  if(f.includes('fedex'))  return 'FedEx';
  if(f.includes('usps'))   return 'USPS';
  if(f.includes('dhl'))    return 'DHL';
  if(f.includes('ontrac')) return 'OnTrac';
  return 'Other';
}

function rMeals(){
  const weekDates = getLunchWeekDates();
  const todayStr  = fmt(T);
  const KIDS      = ['Collin','Ava'];
  const isMobile  = window.innerWidth <= 600;

  // Mobile: show one day at a time (the current lunchWeekOffset day = today + offset days)
  if(isMobile){
    // On mobile, lunchWeekOffset acts as day offset from today
    const d = new Date(T);
    d.setDate(T.getDate() + lunchWeekOffset);
    const ds      = fmt(d);
    const isToday = ds === todayStr;
    const mon     = MOS[d.getMonth()];
    const dow     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][d.getDay()];
    const dateLbl = `${dow} ${mon} ${d.getDate()}`;

    const rows = KIDS.map(kid => {
      const color = mColor(kid);
      const entry = (lunches[kid]||{})[ds];
      const cellContent = entry
        ? `<div class="lunch-cell-dot" style="background:${entry.type==='school'?'#2c6bed':color}"></div>
           <div class="lunch-cell-name" style="font-size:16px">${entry.type==='school'?'🏫':'🏠'} ${entry.name}</div>`
        : `<div class="lunch-cell-plus" style="font-size:36px">+</div>`;
      return `<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)">
        <div style="width:70px;text-align:right;font-size:16px;font-weight:700;color:${color};flex-shrink:0">${kid}</div>
        <div class="lunch-cell${isToday?' today':''} ${entry?'':'empty'}"
          onclick="openLunchPicker('${ds}','${kid}')"
          style="flex:1;min-height:64px">
          ${cellContent}
        </div>
      </div>`;
    }).join('');

    return `<div class="lunchwrap">
      <div class="lunch-grid" style="padding:12px">
        <div style="text-align:center;font-size:18px;font-weight:600;padding-bottom:12px;border-bottom:2px solid ${isToday?'var(--today-ring)':'var(--border)'};color:${isToday?'var(--today-ring)':'var(--text)'}">
          ${dateLbl}${isToday?' <span style="font-size:12px;font-weight:500;background:var(--today-ring);color:white;padding:2px 7px;border-radius:99px;vertical-align:middle">Today</span>':''}
        </div>
        <div style="margin-top:8px">${rows}</div>
      </div>
    </div>`;
  }

  // Day headers: Mon Apr 7
  const hdrs = weekDates.map(d => {
    const ds      = fmt(d);
    const isToday = ds === todayStr;
    const mon     = MOS[d.getMonth()];
    return `<div class="lunch-day-hdr${isToday?' today':''}">
      <span class="lunch-day-dow">${['Mon','Tue','Wed','Thu','Fri'][weekDates.indexOf(d)]}</span>
      <span class="lunch-day-num">${mon} ${d.getDate()}</span>
    </div>`;
  }).join('');

  // One row per kid
  const rows = KIDS.map(kid => {
    const color = mColor(kid);
    const cells = weekDates.map(d => {
      const ds      = fmt(d);
      const entry   = (lunches[kid] || {})[ds];
      const isToday = ds === todayStr;
      if(entry){
        const dotColor = entry.type==='school' ? '#2c6bed' : color;
        const typeIcon = entry.type==='school' ? '🏫' : '🏠';
        return `<div class="lunch-cell${isToday?' today':''}" onclick="openLunchPicker('${ds}','${kid}')">
          <div class="lunch-cell-dot" style="background:${dotColor}"></div>
          <div class="lunch-cell-name">${typeIcon} ${entry.name}</div>
        </div>`;
      }
      return `<div class="lunch-cell empty${isToday?' today':''}" onclick="openLunchPicker('${ds}','${kid}')">
        <div class="lunch-cell-plus">+</div>
      </div>`;
    }).join('');

    return `<div class="lunch-row">
      <div class="lunch-row-lbl" style="color:${color}">${kid}</div>
      ${cells}
    </div>`;
  }).join('');

  return `<div class="lunchwrap">
    <div class="lunch-grid">
      <div class="lunch-grid-days"><div></div>${hdrs}</div>
      ${rows}
    </div>
  </div>`;
}

function getLunchWeekDates(){
  // Get Mon–Fri for the given week offset from current week
  const now = new Date(T);
  const dow = now.getDay(); // 0=Sun
  const mon = new Date(now);
  mon.setDate(now.getDate() - (dow===0?6:dow-1) + lunchWeekOffset*7);
  return Array.from({length:5},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}

async function fetchSchoolMenu(dateStr){
  if(_schoolMenuCache[dateStr] !== undefined) return _schoolMenuCache[dateStr];
  try {
    const r = await fetch(NUTRISLICE_PROXY+'?action=lunch&date='+dateStr);
    const data = await r.json();
    const day = (data.days||[]).find(d=>d.date===dateStr);
    const items = (day?.menu_items||[])
      .filter(i=>i.food && i.food.name)
      .map(i=>({name:i.food.name, category:i.food.food_category||''}));
    _schoolMenuCache[dateStr] = items;
    return items;
  } catch(e) {
    _schoolMenuCache[dateStr] = [];
    return [];
  }
}

function logLunch(kid, dateStr, name, type){

function scrollToHour(h){
  const body = document.querySelector('.wbody') || document.querySelector('.daybody');
  if(!body) return;
  const viewH = body.clientHeight || 400;
  body.scrollTop = Math.max(0, h * 104 - Math.round(viewH / 3));
}

function scrollToNow(){
  const body = document.querySelector('.wbody') || document.querySelector('.daybody');
  if(!body) return;
  const nowH    = new Date().getHours() + new Date().getMinutes()/60;
  const targetH = Math.min(nowH, 21.5);
  body.scrollTop = Math.max(0, targetH * 104 - body.clientHeight / 2);
}

function drawNow(){
  const n=new Date(), h=n.getHours(), m=n.getMinutes();
  const pct=(h+m/60)/24, top=pct*24*104;
  const clr='#e05b30';
  const line=`<div class="now-line" style="top:${top}px;background:${clr}"><div class="now-dot" style="background:${clr}"></div></div>`;
  // Day view — single column
  const dayInner=document.getElementById('dayinner');
  if(dayInner&&dayInner.firstChild){ dayInner.firstChild.insertAdjacentHTML('beforeend',line); return; }
  // Week/5-day — find column matching today's date
  const todayStr=fmt(n);
  const todayCol=document.querySelector(`.dcol[data-date="${todayStr}"]`);
  if(todayCol&&todayCol.firstChild) todayCol.firstChild.insertAdjacentHTML('beforeend',line);
}

function mcc(ds){
  if(calV !== 'month') return;

  // Remove any existing peek
  const existing = document.getElementById('day-peek-overlay');
  if(existing) existing.remove();

  const d   = new Date(ds+'T12:00:00');
  const lbl = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // Gather all events for this day
  const active = new Set(members.map(m=>m.name));
  const dayEvs = evs.filter(e => {
    const w = whoArr(e);
    return (w.length===0 || w.some(n => active.has(n))) &&
      (isMultiDay(e) ? e.date<=ds && (e.endDate||e.date)>=ds : e.date===ds);
  }).sort((a,b) => {
    if(a.allDay && !b.allDay) return -1;
    if(!a.allDay && b.allDay) return 1;
    return (a.time||'').localeCompare(b.time||'');
  });

  const evHtml = dayEvs.length ? dayEvs.map(e => {
    const color = whoArr(e).length===1 ? mColor(whoArr(e)[0]) : GROUP_TEXT;
    const timeStr = e.allDay ? 'All day' : (e.time ? fmt12(e.time)+(e.end?'–'+fmt12(e.end):'') : '');
    return `<div class="day-peek-ev" onclick="peekEditEvent('${e.id}')">
      <div class="day-peek-dot" style="background:${color}"></div>
      <div class="day-peek-ev-info">
        <div class="day-peek-ev-title">${e.title}</div>
        ${timeStr?`<div class="day-peek-ev-time">${timeStr}</div>`:''}
      </div>
    </div>`;
  }).join('') : `<div class="day-peek-empty">No events</div>`;

  const overlay = document.createElement('div');
  overlay.id = 'day-peek-overlay';
  overlay.className = 'day-peek-overlay';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `
    <div class="day-peek" onclick="event.stopPropagation()">
      <div class="day-peek-hd">
        <span class="day-peek-title" onclick="peekGoDay('${ds}')">${lbl}</span>
        <button class="day-peek-close" onclick="document.getElementById('day-peek-overlay').remove()">✕</button>
      </div>
      <div class="day-peek-body">${evHtml}</div>
    </div>`;
  document.body.appendChild(overlay);
}

function saveSettings(){
  if(!_draft) { sv('calendar'); return; }
  // Sync names: match by original index for existing members, apply renames
  const originalMembers = members.map(m=>({...m}));
  const keepCount = Math.min(originalMembers.length, _draft.length);
  for(let i=0; i<keepCount; i++){
    const oldName = originalMembers[i].name;
    const newName = (_draft[i].name||'').trim() || oldName;
    _draft[i].name = newName;
    if(oldName !== newName){
      evs.forEach(e=>{ e.who = whoArr(e).map(w=>w===oldName?newName:w); });
      tasks.forEach(t=>{ t.who = whoArr(t).map(w=>w===oldName?newName:w); });
      if(active.has(oldName)){ active.delete(oldName); active.add(newName); }
    }
  }
  // Remove deleted members from active set
  originalMembers.forEach(m=>{
    if(!_draft.find(d=>d.name===m.name)) active.delete(m.name);
  });
  // Add brand-new members to active set
  _draft.forEach(m=>{ if(!originalMembers.find(o=>o.name===m.name)) active.add(m.name); });
  // Commit
  members = _draft.map(m=>({...m}));
  _draft = null;
  window._draftNewColor = undefined;
  rebuildFullSidebarDots();
  sv('calendar');
}

function cancelSettings(){
  _draft = null;
  window._draftNewColor = undefined;
  sv('calendar');
}

      ee.min = es.value;
      const [eh,em] = ee.value.split(':').map(Number);
      if(eh*60+em <= sh*60+sm){
        const newMins = sh*60+sm+60;
        const nh = Math.floor(newMins/60)%24;
        const nm = newMins%60;
        ee.value = String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
      }
    }
    es.addEventListener('change', syncEnd);
  }, 0);
  window._save=()=>{
    const t=document.getElementById('etitle').value.trim();
    if(!t) return;
    const multiOpen = document.getElementById('multiday-fields').style.display!=='none';
    const startDate = multiOpen ? (document.getElementById('edate2').value||document.getElementById('edate').value) : document.getElementById('edate').value;
    const endDate = multiOpen ? (document.getElementById('eenddate').value||startDate) : startDate;

    // Validate person assigned
    if(!window._selPeople || window._selPeople.length === 0){
      const req = document.getElementById('who-required');
      if(req) req.style.display = 'inline';
      // Show assign popup
      showAssignPopup({
        title:t, startDate, endDate,
        time:document.getElementById('es').value+':00',
        end:document.getElementById('ee').value+':00',
        loc:(document.getElementById('eloc2')?.value||'').trim(),
        desc:(document.getElementById('edesc')?.value||'').trim(),
      });
      return;
    }

    evs.push({
      id:Date.now(), title:t,
      date:startDate, endDate:endDate,
      time:document.getElementById('es').value+':00',
      end:document.getElementById('ee').value+':00',
      who:[...window._selPeople],
      loc: (document.getElementById('eloc2')?.value||'').trim(),
      desc:(document.getElementById('edesc')?.value||'').trim(),
    });
    closeM(); render();
  };
  openM();
}

function toggleMultiDay(){
  const f=document.getElementById('multiday-fields');
  const a=document.getElementById('multiday-arrow');
  const open=f.style.display==='none';
  f.style.display=open?'block':'none';
  a.textContent=open?'▼':'▶';
  // Sync the date field into the multi-day start date when expanding
  if(open){
    const d=document.getElementById('edate').value;
    const sd=document.getElementById('edate2');
    const ed=document.getElementById('eenddate');
    if(sd&&d) sd.value=d;
    if(ed&&d) ed.value=d;
    // Keep end date in sync with start
    if(sd&&ed) sd.addEventListener('change',()=>{ if(ed.value<sd.value) ed.value=sd.value; });
  }
}

function showAssignPopup(pendingData){
  document.querySelectorAll('.assign-popup-overlay').forEach(el=>el.remove());

  const overlay = document.createElement('div');
  overlay.className = 'assign-popup-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  let tempPeople = [];

  const pickable = members.filter(m=>m.name!=='Zorro');
  const peopleHtml = pickable.map(m =>
    `<div class="ppick" id="ap-${m.name}"
      style="background:${m.bg};color:${m.color};border:2px solid ${m.color}"
      data-name="${m.name}"
      onclick="apToggle(this,'${m.name}')">${m.name.charAt(0)}</div>`
  ).join('');

  overlay.innerHTML = `<div class="assign-popup">
    <div class="assign-popup-hd">
      <div class="assign-popup-title">⚠️ Who is this for?</div>
      <div class="assign-popup-sub">"${pendingData.title}" needs at least one person assigned.</div>
    </div>
    <div class="assign-popup-body">
      <div class="assign-popup-who" id="ap-people">${peopleHtml}</div>
      <button class="assign-popup-btn" id="ap-save">Assign &amp; Save</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);

  // Toggle selection
  window.apToggle = (el, name) => {
    const idx = tempPeople.indexOf(name);
    if(idx > -1){
      tempPeople.splice(idx, 1);
      el.style.background = members.find(m=>m.name===name).bg;
      el.style.color      = members.find(m=>m.name===name).color;
      el.style.fontWeight = '500';
    } else {
      tempPeople.push(name);
      el.style.background = members.find(m=>m.name===name).color;
      el.style.color      = 'white';
      el.style.fontWeight = '700';
    }
  };

  // Save button
  overlay.querySelector('#ap-save').onclick = () => {
    if(tempPeople.length === 0) return;
    overlay.remove();
    window._selPeople = tempPeople;

    if(pendingData._isTask){
      tasks.push({
        id:Date.now(), title:pendingData.title, done:false, doneOn:[],
        date:pendingData.date, recur:pendingData.recur,
        recurN:pendingData.recurN||1, recurDays:pendingData.recurDays||[],
        timeOfDay:pendingData.timeOfDay||'',
        stayUntilDone:pendingData.stayUntilDone||false,
        who:[...tempPeople],
      });
      closeM(); render(); ghScheduleSave();
    } else {
      evs.push({
        id:Date.now(), title:pendingData.title,
        date:pendingData.startDate, endDate:pendingData.endDate,
        time:pendingData.time, end:pendingData.end,
        who:[...tempPeople],
        loc:pendingData.loc||'', desc:pendingData.desc||'',
      });
      closeM(); render();
    }
  };
}

// Prompt: edit/delete just this occurrence, or all remaining
function showTaskScopePrompt(action, t, newData){
  document.querySelectorAll('.scope-prompt-overlay').forEach(el=>el.remove());

  const isDelete = action === 'delete';
  const overlay  = document.createElement('div');
  overlay.className = 'assign-popup-overlay scope-prompt-overlay';
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  const d = new Date(taskDate+'T12:00:00');
  const dateLbl = d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

  overlay.innerHTML = `<div class="assign-popup">
    <div class="assign-popup-hd">
      <div class="assign-popup-title">${isDelete?'Delete':'Edit'} "${t.title}"</div>
      <div class="assign-popup-sub">Choose which occurrences to ${isDelete?'delete':'update'}.</div>
    </div>
    <div class="assign-popup-body" style="display:flex;flex-direction:column;gap:10px">
      <button class="lunch-opt" id="scope-this" style="border-color:var(--border)">
        <span class="lunch-opt-icon">${isDelete?'🗑️':'✏️'}</span>
        <div class="lunch-opt-name">
          <div style="font-weight:700">${isDelete?'Delete':'Edit'} this occurrence</div>
          <div style="font-size:11px;color:var(--muted)">${dateLbl} only</div>
        </div>
      </button>
      <button class="lunch-opt" id="scope-all" style="border-color:#f5c5c5;${isDelete?'color:#c44':''}">
        <span class="lunch-opt-icon">${isDelete?'🗑️':'✏️'}</span>
        <div class="lunch-opt-name">
          <div style="font-weight:700">${isDelete?'Delete':'Edit'} all remaining</div>
          <div style="font-size:11px;color:var(--muted)">${dateLbl} and all future occurrences</div>
        </div>
      </button>
      <button class="btn btn-s" id="scope-cancel" style="margin-top:2px">Cancel</button>
    </div>
  </div>`;

  document.body.appendChild(overlay);

  overlay.querySelector('#scope-cancel').onclick = () => overlay.remove();

  overlay.querySelector('#scope-this').onclick = () => {
    overlay.remove();
    if(isDelete){
      // Add this date to skipDates so visibleFor skips it
      if(!t.skipDates) t.skipDates = [];
      if(!t.skipDates.includes(taskDate)) t.skipDates.push(taskDate);
    } else {
      // Create a one-off exception task for this date
      // Skip this date on the original
      if(!t.skipDates) t.skipDates = [];
      if(!t.skipDates.includes(taskDate)) t.skipDates.push(taskDate);
      // Add one-off copy with edits applied
      tasks.push({
        ...t,
        id: Date.now(),
        recur: '',
        recurN: 1,
        recurDays: [],
        stayUntilDone: false,
        skipDates: [],
        doneOn: [],
        done: false,
        date: taskDate,
        ...newData,
        recur: '',
      });
    }
    render(); ghScheduleSave();
  };

  overlay.querySelector('#scope-all').onclick = () => {
    overlay.remove();
    if(isDelete){
      // If taskDate is the first occurrence, delete entirely
      // Otherwise, set an endDate so it stops at the day before taskDate
      if(taskDate <= (t.date||'9999')){
        tasks = tasks.filter(tk => tk.id !== t.id);
      } else {
        t.recurEnd = taskDate; // stop recurring from this date onwards
      }
    } else {
      // Apply all edits to the task, keep recur but update from taskDate
      Object.assign(t, newData);
      t.date = taskDate; // restart from this occurrence
      t.doneOn = (t.doneOn||[]).filter(d => d < taskDate); // clear future completions
    }
    render(); ghScheduleSave();
  };
}


// ── List item typeahead ───────────────────────────────────────────
// Collects all past items across all lists, deduped, most recent first
// Attach typeahead to an input element inside a container (modal forms)
// inputId: id of the <input>
function attachTypeahead(inputId){
  setTimeout(()=>{
    const input = document.getElementById(inputId);
    if(!input) return;

    // Wrap input in a relative-positioned div
    const wrap = document.createElement('div');
    wrap.className = 'typeahead-wrap';
    input.parentNode.insertBefore(wrap, input);
    wrap.appendChild(input);

    // Dropdown element
    const drop = document.createElement('div');
    drop.className = 'typeahead-list';
    drop.style.display = 'none';
    wrap.appendChild(drop);

    const allItems = getAllPastItems();

    function highlight(text, query){
      if(!query) return text;
      const idx = text.toLowerCase().indexOf(query.toLowerCase());
      if(idx === -1) return text;
      return text.slice(0,idx)
        + `<span class="typeahead-match">${text.slice(idx,idx+query.length)}</span>`
        + text.slice(idx+query.length);
    }

    function showSuggestions(query){
      const q = query.trim().toLowerCase();
      let matches;
      if(!q){
        matches = allItems.slice(0,5);
      } else {
        matches = allItems.filter(t => t.toLowerCase().includes(q)).slice(0,8);
      }
      if(!matches.length){ drop.style.display='none'; return; }
      drop.innerHTML = matches.map(t=>`
        <div class="typeahead-item" data-val="${t.replace(/"/g,'&quot;')}">
          <span class="typeahead-item-icon">${q?'🔍':'🕐'}</span>
          <span>${highlight(t, q)}</span>
        </div>`).join('');
      drop.style.display = 'block';
      // Wire clicks
      drop.querySelectorAll('.typeahead-item').forEach(el=>{
        el.addEventListener('mousedown', e=>{
          e.preventDefault(); // don't blur input
          input.value = el.dataset.val;
          drop.style.display = 'none';
          input.focus();
        });
        el.addEventListener('touchstart', e=>{
          e.preventDefault();
          input.value = el.dataset.val;
          drop.style.display = 'none';
          input.focus();
        }, {passive:false});
      });
    }

    input.addEventListener('focus', ()=> showSuggestions(input.value));
    input.addEventListener('input', ()=> showSuggestions(input.value));
    input.addEventListener('blur',  ()=> setTimeout(()=>{ drop.style.display='none'; }, 150));
    // Show on focus if field already has content (edit mode)
    if(input.value) showSuggestions(input.value);
  }, 50); // wait for modal to render
}
// ── End typeahead ─────────────────────────────────────────────────
