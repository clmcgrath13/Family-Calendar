<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Family Calendar</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
<script src="https://script.google.com/macros/s/AKfycbxI2nDM9s-S9-1U_jz_YfkCCUywxDgKrzjtCX0ZvXgbHUfq52W28e05_hfcn8FDDyKEFg/exec"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar-w: 88px;
  --bg: #ffffff;
  --sidebar-bg: #f0f0ee;
  --border: #e2e2de;
  --text: #1c1c1a;
  --muted: #92928d;
  --header-bg: #fafaf8;
  --font: 'DM Sans', sans-serif;
  --shadow: 0 2px 16px rgba(0,0,0,0.09);
  --today-ring: #2c6bed;
  --kids: #22a06b;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  width: 100vw;
  display: flex;
  overflow: hidden;
  font-size: 13px;
}

.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 14px 0;
  gap: 2px;
  flex-shrink: 0;
  z-index: 20;
  height: 100vh;
  overflow: hidden;
}


.nav-btn {
  width: 72px; height: 58px;
  border-radius: 12px;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--muted);
  transition: background 0.13s, color 0.13s;
}
.nav-btn:hover { background: rgba(0,0,0,0.04); }
.nav-btn.active { background: #fff; color: var(--today-ring); box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.nav-btn svg { width: 20px; height: 20px; }
.nav-lbl { font-size: 10px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }

.member-legend {
  margin-top: auto;
  display: flex; flex-direction: column;
  gap: 7px; align-items: center;
  padding-top: 10px;
}
.mdot {
  width: 40px; height: 40px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700;
  color: white;
  cursor: pointer;
  transition: transform 0.12s, opacity 0.12s;
  position: relative;
}
.mdot:hover { transform: scale(1.12); }
.mdot.off { opacity: 0.28; }
.mdot-tip {
  position: absolute; left: 34px;
  background: #1c1c1a; color: white;
  font-size: 10px; font-weight: 500;
  padding: 3px 8px; border-radius: 5px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.15s; z-index: 99;
}
.mdot:hover .mdot-tip { opacity: 1; }

.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

.topbar {
  height: 72px;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 14px; gap: 15px;
  flex-shrink: 0;
}
.tb-left { display: flex; flex-direction: row; align-items: center; gap: 15px; }
.tb-season { font-size: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; display: flex; align-items: center; gap: 5px; color: var(--muted); }
.tb-season-icon { font-size: 18px; line-height: 1; }
.tb-title { font-size: 26px; font-weight: 400; line-height: 1; font-family: 'DM Serif Display', serif; letter-spacing: -0.01em; }
.tb-space { flex: 1; }

/* View dropdown — custom (native select opens upward on Kindle) */
.vdrop-wrap {
  position: relative; flex-shrink: 0;
}
.vdrop-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 0 14px; height: 44px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg); color: var(--text);
  font-family: var(--font);
  white-space: nowrap; min-width: 90px;
  justify-content: space-between;
  transition: background 0.12s;
}
.vdrop-btn:hover { background: var(--sidebar-bg); }
.vdrop-btn svg { flex-shrink: 0; transition: transform 0.2s; }
.vdrop-btn.open svg { transform: rotate(180deg); }
.vdrop-menu {
  position: absolute; top: calc(100% + 6px); left: 0;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: var(--shadow);
  overflow: hidden; z-index: 500;
  min-width: 100%;
  opacity: 0; pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.vdrop-menu.open {
  opacity: 1; pointer-events: all;
  transform: translateY(0);
}
.vdrop-item {
  display: flex; align-items: center;
  padding: 14px 18px;
  font-size: 14px; font-weight: 500;
  cursor: pointer; color: var(--text);
  transition: background 0.1s;
  white-space: nowrap;
}
.vdrop-item:hover { background: var(--sidebar-bg); }
.vdrop-item.active {
  color: var(--today-ring); font-weight: 700;
  background: #f0f6ff;
}

.arr-btn {
  width: 44px; height: 44px;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--bg); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--text); transition: background 0.11s; flex-shrink: 0;
}
.arr-btn:hover { background: var(--sidebar-bg); }

.today-btn {
  padding: 0 16px; height: 44px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg);
  font-size: 13px; font-weight: 500;
  cursor: pointer; color: var(--text);
  transition: background 0.11s; white-space: nowrap;
  display: inline-flex; align-items: center;
}
.today-btn:hover { background: var(--sidebar-bg); }

.content { flex: 1; overflow: auto; position: relative; }

/* MONTH */
.mwrap { display: flex; flex-direction: column; height: 100%; }
.dow-row {
  display: grid; grid-template-columns: repeat(7,1fr);
  border-bottom: 1px solid var(--border);
  background: var(--header-bg); flex-shrink: 0;
}
.dow-cell {
  text-align: center; padding: 6px 0;
  font-size: 10px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted);
}
.mcells { display: grid; grid-template-columns: repeat(7,1fr); flex: 1; }
.mcell {
  border-right: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  padding: 5px 6px; cursor: pointer;
  transition: background 0.1s; overflow: hidden;
}
.mcell:hover { background: #f6f6f3; }
.mcell:nth-child(7n) { border-right: none; }
.mcell.other { background: #fafaf8; }
.mcell.other .dnum { color: #ccc; }
.mcell.is-today { background: #fffbf0; }

/* Month view wrapper with overlay support */
.month-rows-wrap { flex: 1; display: flex; flex-direction: column; }
.month-row {
  position: relative;
  display: grid;
  grid-template-columns: repeat(7,1fr);
  flex: 1;
}
/* Multi-day event overlay layer sits on top of cells */
.mday-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 2;
}
.mday-bar {
  position: absolute;
  height: 22px;
  font-size: 11px; font-weight: 600;
  display: flex; align-items: center;
  padding: 0 5px 0 6px;
  border-radius: 6px;
  white-space: nowrap; overflow: visible;
  pointer-events: all; cursor: pointer;
  box-sizing: border-box;
  min-width: 8px;
  border-left: 3px solid;
}
.dnum {
  font-size: 12px; font-weight: 500;
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin-bottom: 3px;
}
.is-today .dnum { background: var(--today-ring); color: #fff; font-weight: 600; }
.epill {
  font-size: 12px; font-weight: 500;
  padding: 3px 7px 3px 6px; border-radius: 6px;
  margin-bottom: 3px; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
  overflow: visible;
}
.edot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.emore { font-size: 9px; color: var(--muted); font-weight: 500; }

/* WEEK */
.wwrap { display: flex; flex-direction: column; height: 100%; position: relative; }
.whead {
  display: grid; border-bottom: 1px solid var(--border);
  background: var(--header-bg); flex-shrink: 0;
}
.wh-sp { border-right: 1px solid var(--border); }
.wh-cell {
  padding: 8px 6px; text-align: center;
  border-right: 1px solid var(--border);
}
.wh-cell:last-child { border-right: none; }
.wh-dow { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
.wh-date {
  font-size: 18px; font-weight: 300;
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; margin: 3px auto 0;
}
.wh-date.tod { background: var(--today-ring); color: #fff; font-weight: 600; }

.wbody { flex: 1; overflow-y: auto; display: flex; }
.tcol { width: 46px; flex-shrink: 0; border-right: 1px solid var(--border); }
.tlbl {
  height: 104px; display: flex;
  align-items: flex-start; justify-content: flex-end;
  padding: 2px 7px 0 0;
  font-size: 9px; color: var(--muted); font-weight: 600;
}
.dcols { flex: 1; display: grid; }
.dcol { border-right: 1px solid var(--border); position: relative; }
.dcol:last-child { border-right: none; }
.hslot { height: 104px; border-bottom: 1px solid #f0f0ec; position: relative; }
.hslot:last-child { border-bottom: none; }
.wev {
  position: absolute; left: 2px; right: 2px;
  border-radius: 12px; padding: 5px 7px;
  font-size: 15px; font-weight: 600;
  overflow: hidden; cursor: pointer; z-index: 2;
  line-height: 1.3;
}
.wev-t { font-size: 13px; font-weight: 400; color: rgba(0,0,0,0.55); }
.wev-loc { font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.45); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.now-line {
  position: absolute; left: 0; right: 0;
  height: 2px; z-index: 5; pointer-events: none;
}
.now-dot {
  position: absolute; left: -4px; top: -4px;
  width: 10px; height: 10px; border-radius: 50%;
}

/* DAY */
.daywrap { display: flex; flex-direction: column; height: 100%; }
.dayhero {
  padding: 12px 18px 10px;
  border-bottom: 1px solid var(--border);
  background: var(--header-bg);
  display: flex; align-items: baseline; gap: 10px; flex-shrink: 0;
}
.dayhero-n { font-family: 'DM Serif Display', serif; font-size: 38px; line-height: 1; }
.dayhero-dow { font-size: 14px; font-weight: 500; }
.dayhero-sub { font-size: 11px; color: var(--muted); }
.daybody { flex: 1; overflow-y: auto; display: flex; }
.dayinner { flex: 1; position: relative; }

/* AGENDA */
.agwrap { height: 100%; overflow-y: auto; }
.ag-hdr {
  position: sticky; top: 0;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex; align-items: center; gap: 10px; z-index: 5;
}
.ag-num {
  font-size: 20px; font-weight: 500;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; flex-shrink: 0;
}
.ag-num.tod { background: var(--today-ring); color: #fff; }
.ag-dow { font-size: 12px; font-weight: 500; }
.ag-mon { font-size: 10px; color: var(--muted); }
.ag-evs { padding: 4px 16px; }
.ag-row {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 8px 0; border-bottom: 1px solid var(--border); cursor: pointer;
}
.ag-row:last-child { border-bottom: none; }
.ag-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 32px; flex-shrink: 0; }
.ag-time { font-size: 10px; color: var(--muted); font-weight: 600; min-width: 80px; padding-top: 2px; }
.ag-title { font-size: 12px; font-weight: 500; }
.ag-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
.ag-who { display: inline-block; font-size: 9px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-top: 3px; }
.ag-empty { font-size: 11px; color: var(--muted); font-style: italic; padding: 8px 0; }

/* TASKS */
.taskwrap { height:100%; display:flex; flex-direction:column; overflow:hidden; background:var(--sidebar-bg); }
.task-cols {
  flex:1; display:flex; overflow-x:auto; overflow-y:hidden;
  gap:8px; padding:8px;
}
.task-col {
  flex:1; min-width:160px; max-width:280px;
  display:flex; flex-direction:column;
  background:var(--bg); border:1px solid var(--border);
  border-radius:12px; overflow:hidden;
}
/* Compact inline header */
.task-col-hd {
  padding:8px 10px;
  display:flex; align-items:center; gap:8px;
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.task-avatar-wrap {
  position:relative; width:40px; height:40px; flex-shrink:0;
}
.task-avatar-ring {
  position:absolute; inset:0;
  transform:rotate(-90deg);
}
.task-avatar {
  position:absolute; inset:4px;
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; font-weight:700; color:white;
}
.task-col-hd-info { flex:1; min-width:0; }
.task-avatar-name { font-size:12px; font-weight:700; line-height:1.3; }
.task-progress { font-size:10px; color:var(--muted); }
/* Thin section divider */
.task-section-lbl {
  display:flex; align-items:center; gap:6px;
  margin:6px 4px 3px; font-size:8px; font-weight:800;
  text-transform:uppercase; letter-spacing:0.1em; color:var(--muted);
}
.task-section-lbl::after {
  content:''; flex:1; height:1px; background:var(--border);
}
.task-col-body { flex:1; overflow-y:auto; padding:4px 6px; }
/* Cards: current style but tighter */
.task-card {
  display:flex; align-items:center; gap:8px;
  padding:7px 8px; background:var(--bg);
  border:1px solid var(--border); border-radius:8px;
  margin-bottom:4px; cursor:pointer;
  border-left-width:3px;
  transition:box-shadow 0.12s;
}
.task-card:active { box-shadow:var(--shadow); }
.task-card.done-card { opacity:0.5; }
.task-check {
  width:20px; height:20px; border-radius:50%;
  border:2px solid var(--border); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.13s;
}
.task-check.done { border-color:transparent; }
.task-card-body { flex:1; min-width:0; }
.task-card-title { font-size:12px; font-weight:500; line-height:1.3; }
.task-card-title.done { text-decoration:line-through; color:var(--muted); }
.task-card-sub { font-size:10px; color:var(--muted); margin-top:1px; }
.task-menu-btn {
  width:26px; height:26px; border-radius:6px; border:none;
  background:transparent; color:var(--muted); font-size:15px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  flex-shrink:0; transition:background 0.1s;
}
.task-menu-btn:hover { background:var(--sidebar-bg); }
/* toggle switch */
.tog-wrap { display:flex; align-items:center; gap:10px; }
.tog { position:relative; width:44px; height:24px; flex-shrink:0; }
.tog input { opacity:0; width:0; height:0; }
.tog-slider {
  position:absolute; inset:0; background:#ccc; border-radius:24px;
  cursor:pointer; transition:background 0.2s;
}
.tog-slider:before {
  content:''; position:absolute;
  width:18px; height:18px; left:3px; top:3px;
  background:#fff; border-radius:50%; transition:transform 0.2s;
}
.tog input:checked + .tog-slider { background:#22a06b; }
.tog input:checked + .tog-slider:before { transform:translateX(20px); }
/* day-of-week picker */
.dow-picker { display:flex; gap:6px; flex-wrap:wrap; }
.dow-btn {
  width:38px; height:38px; border-radius:50%;
  border:1px solid var(--border); background:var(--bg);
  font-size:11px; font-weight:700; cursor:pointer;
  color:var(--muted); transition:all 0.13s; font-family:var(--font);
}
.dow-btn.sel { background:var(--today-ring); color:#fff; border-color:var(--today-ring); }
.task-anytime-lbl {
  font-size:9px; font-weight:700; text-transform:uppercase;
  letter-spacing:0.08em; color:var(--muted);
  padding:8px 4px 4px;
}

/* Emoji shower overlay */
@keyframes emojifall {
  0%   { transform:translateY(-60px) rotate(0deg); opacity:1; }
  80%  { opacity:1; }
  100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
}
.emoji-shower { position:fixed; inset:0; pointer-events:none; z-index:9000; overflow:hidden; }
.emoji-shower span {
  position:absolute; top:0; font-size:28px; line-height:1;
  animation:emojifall linear forwards;
}
.task-congrats {
  position:fixed; inset:0; z-index:9001;
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
}
.task-congrats-box {
  background:rgba(30,30,30,0.72); border-radius:20px;
  padding:32px 48px; text-align:center;
  backdrop-filter:blur(6px);
  animation:fadeInOut 3.5s ease forwards;
}
.task-congrats-name { font-size:18px; font-weight:700; color:#fff; opacity:0.8; margin-bottom:6px; }
.task-congrats-msg  { font-size:26px; font-weight:800; color:#fff; line-height:1.2; }
@keyframes fadeInOut {
  0%   { opacity:0; transform:scale(0.85); }
  15%  { opacity:1; transform:scale(1); }
  70%  { opacity:1; transform:scale(1); }
  100% { opacity:0; transform:scale(0.95); }
}

/* LISTS */
/* ── Lists ───────────────────────────────────────────────────── */
.listwrap {
  height: 100%; display: flex; flex-direction: column; overflow: hidden;
}
.lhdr {
  display: flex; align-items: center; gap: 0;
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  background: var(--header-bg); flex-shrink: 0; position: relative;
}
.lhdr-btn {
  display: flex; align-items: center; gap: 8px;
  border: none; background: transparent; cursor: pointer;
  font-family: var(--font); padding: 6px 8px; border-radius: 8px;
  transition: background 0.12s;
}
.lhdr-btn:hover { background: var(--sidebar-bg); }
.lhdr-icon { font-size: 22px; line-height: 1; }
.lhdr-name { font-size: 19px; font-weight: 700; color: var(--text); }
.lhdr-chevron { font-size: 12px; color: var(--muted); margin-left: 2px; transition: transform 0.2s; }
.lhdr-chevron.open { transform: rotate(180deg); }
.lhdr-ct { font-size: 12px; color: var(--muted); margin-left: 4px; }
/* List dropdown */
.ldrop {
  position: absolute; top: calc(100% + 4px); left: 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; box-shadow: var(--shadow);
  z-index: 400; min-width: 220px;
  opacity: 0; pointer-events: none;
  transform: translateY(-6px);
  transition: opacity 0.15s ease, transform 0.15s ease;
  overflow: hidden;
}
.ldrop.open { opacity: 1; pointer-events: all; transform: translateY(0); }
.ldrop-item {
  display: flex; align-items: center; gap: 10px;
  padding: 13px 14px; cursor: pointer;
  transition: background 0.1s; border-bottom: 1px solid var(--border);
}
.ldrop-item:last-child { border-bottom: none; }
.ldrop-item:hover { background: var(--sidebar-bg); }
.ldrop-item.active { background: #f0f6ff; }
.ldrop-item-icon { font-size: 18px; flex-shrink: 0; }
.ldrop-item-name { font-size: 14px; font-weight: 500; flex: 1; }
.ldrop-item-menu {
  width: 30px; height: 30px; border-radius: 7px; border: none;
  background: transparent; color: var(--muted); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.1s;
}
.ldrop-item-menu:hover { background: var(--border); }
/* List content */
.lbody { flex: 1; overflow-y: auto; }
.litem {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; border-bottom: 1px solid var(--border);
}
.litem:last-child { border-bottom: none; }
.licheck {
  width: 26px; height: 26px; border-radius: 7px;
  border: 1.5px solid var(--border); flex-shrink: 0;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.13s;
}
.licheck.done { background: #22a06b; border-color: #22a06b; }
.litxt { font-size: 15px; line-height: 1.3; flex: 1; }
.litxt.done { text-decoration: line-through; color: var(--muted); }
.litem-menu {
  width: 30px; height: 30px; border-radius: 7px; border: none;
  background: transparent; color: var(--muted); font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.1s;
}
.litem-menu:hover { background: var(--sidebar-bg); }

/* MEALS */
.mealwrap { height: 100%; overflow-y: auto; padding: 14px 16px; }
.meal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
.meal-day { display: flex; flex-direction: column; gap: 5px; }
.meal-day-lbl {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.07em; color: var(--muted);
  text-align: center; padding-bottom: 5px; border-bottom: 1px solid var(--border);
}
.meal-day-lbl.tod-lbl { color: var(--today-ring); border-color: var(--today-ring); }
.mslot {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 8px;
  cursor: pointer; transition: box-shadow 0.12s; min-height: 52px;
}
.mslot:hover { box-shadow: var(--shadow); }
.mslot.tod-slot { border-color: #c5d8f8; background: #f5f8ff; }
.mtype { font-size: 8px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--muted); margin-bottom: 3px; }
.mname { font-size: 11px; font-weight: 500; line-height: 1.3; }
.mempty { font-size: 10px; color: #ccc; font-style: italic; }

/* FAB */
.fab {
  position: fixed; bottom: 20px; right: 20px;
  width: 50px; height: 50px; border-radius: 50%;
  background: var(--today-ring); color: white; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 18px rgba(44,107,237,.42);
  font-size: 26px; font-weight: 300; line-height: 1;
  z-index: 100; transition: transform 0.14s, box-shadow 0.14s;
}
.fab:hover { transform: scale(1.07); box-shadow: 0 6px 24px rgba(44,107,237,.52); }
.fab:active { transform: scale(0.96); }

/* DAY PEEK (month-view day popup) */
.day-peek-overlay {
  position:fixed; inset:0; z-index:550;
  background:rgba(0,0,0,0.18);
  display:flex; align-items:center; justify-content:center;
}
.day-peek {
  background:var(--bg); border-radius:16px;
  width:320px; max-width:88vw; max-height:70vh;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
  display:flex; flex-direction:column; overflow:hidden;
  animation:peekIn 0.15s ease;
}
@keyframes peekIn {
  from { transform:scale(0.94) translateY(6px); opacity:0; }
  to   { transform:none; opacity:1; }
}
.day-peek-hd {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 10px; border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.day-peek-title {
  font-size:16px; font-weight:600; cursor:pointer; color:var(--today-ring);
  text-decoration:none;
}
.day-peek-title:hover { text-decoration:underline; }
.day-peek-close {
  width:28px; height:28px; border-radius:7px; border:none;
  background:var(--sidebar-bg); cursor:pointer; font-size:14px;
  color:var(--muted); display:flex; align-items:center; justify-content:center;
}
.day-peek-body { overflow-y:auto; padding:8px 0; flex:1; }
.day-peek-empty {
  padding:24px 16px; text-align:center; color:var(--muted); font-size:13px;
}
.day-peek-ev {
  display:flex; align-items:center; gap:10px;
  padding:10px 16px; cursor:pointer; transition:background 0.1s;
  border-bottom:1px solid var(--border);
}
.day-peek-ev:last-child { border-bottom:none; }
.day-peek-ev:hover { background:var(--sidebar-bg); }
.day-peek-dot {
  width:10px; height:10px; border-radius:50%; flex-shrink:0;
}
.day-peek-ev-info { flex:1; min-width:0; }
.day-peek-ev-title { font-size:13px; font-weight:500; }
.day-peek-ev-time { font-size:11px; color:var(--muted); margin-top:1px; }

/* MODAL */
.overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.28);
  display: flex; align-items: center; justify-content: center;
  z-index: 600; opacity: 0; pointer-events: none; transition: opacity 0.18s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg); border-radius: 16px;
  width: 340px; max-width: 88vw;
  box-shadow: 0 20px 60px rgba(0,0,0,0.18); overflow: hidden;
  transform: translateY(6px) scale(0.98); transition: transform 0.18s;
}
.overlay.open .modal { transform: none; }
.modal-hd {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border);
}
.modal-ttl { font-size: 14px; font-weight: 600; }
.modal-x {
  width: 26px; height: 26px; border-radius: 6px; border: none;
  background: var(--sidebar-bg); cursor: pointer;
  font-size: 14px; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
}
.modal-bd { padding: 18px; display: flex; flex-direction: column; gap: 12px; }
.fld { display: flex; flex-direction: column; gap: 4px; }
.flbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--muted); }
.fin {
  padding: 8px 11px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 13px;
  font-family: var(--font); color: var(--text);
  background: var(--bg); outline: none;
  transition: border-color 0.13s; width: 100%;
}
.fin:focus { border-color: var(--today-ring); }
.frow { display: flex; gap: 10px; }
.frow .fld { flex: 1; }
.ppicker { display: flex; gap: 8px; flex-wrap: wrap; }
.ppick {
  width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; border: 3px solid transparent;
  transition: transform 0.1s, border-color 0.1s;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: white;
}
.ppick.sel { border-color: #1c1c1a; transform: scale(1.1); }
.modal-ft {
  padding: 12px 18px; border-top: 1px solid var(--border);
  display: flex; justify-content: flex-end; gap: 8px; align-items: center;
}
.btn { padding: 7px 16px; border-radius: 7px; font-size: 12px; font-weight: 500; font-family: var(--font); cursor: pointer; border: none; }
.btn-s { background: var(--sidebar-bg); color: var(--text); }
.btn-p { background: var(--today-ring); color: white; }
.btn:hover { opacity: 0.85; }

::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Edit / Add event modal — larger and finger-friendly */
#ov .modal {
  width: min(580px, 92vw);
  max-height: 88vh;
  display: flex; flex-direction: column;
}
#ov .modal-hd { padding: 18px 22px; }
#ov .modal-ttl { font-size: 18px; font-weight: 600; }
#ov .modal-x { width: 36px; height: 36px; font-size: 18px; }
#ov .modal-bd { padding: 20px 22px; flex: 1; overflow-y: auto; gap: 16px; }
#ov .modal-ft { padding: 16px 22px; gap: 12px; }
#ov .fld { gap: 6px; }
#ov .flbl { font-size: 12px; }
#ov .fin { padding: 12px 14px; font-size: 15px; border-radius: 10px; }
#ov .frow { gap: 14px; }
#ov .btn { padding: 14px 20px; font-size: 14px; border-radius: 10px; }
#ov .ppick { width: 44px; height: 44px; font-size: 14px; border-width: 3px; }
#ov .ppicker { gap: 10px; }

/* ── Weather View ───────────────────────────────────────────── */
.wx-wrap {
  height: 100%; overflow-y: auto;
  background: var(--bg);
  color: var(--text); display: flex; flex-direction: column;
  font-family: var(--font);
}
.wx-header {
  padding: 20px 24px 12px;
  display: flex; flex-direction: column; gap: 4px;
  border-bottom: 1px solid var(--border);
  background: var(--header-bg);
}
.wx-date    { font-size: 12px; color: var(--muted); font-weight: 500; }
.wx-main    { display: flex; align-items: center; gap: 16px; }
.wx-temp    { font-size: 52px; font-weight: 300; line-height: 1; color: var(--text); }
.wx-hilo    { font-size: 15px; color: var(--muted); }
.wx-icon    { font-size: 48px; line-height: 1; }
.wx-desc    { font-size: 14px; color: var(--muted); margin-top: 2px; }
.wx-section {
  margin: 16px 16px 0;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 16px;
}
.wx-section-title {
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted); margin-bottom: 10px;
}
/* Temp curve SVG container */
.wx-curve { width: 100%; height: 120px; margin-bottom: 6px; }
/* Stats grid */
.wx-stats {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.wx-stat {
  background: var(--header-bg);
  border: 1px solid var(--border);
  border-radius: 12px; padding: 12px 14px;
}
.wx-stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.wx-stat-val { font-size: 22px; font-weight: 600; color: var(--text); }
.wx-stat-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.wx-loading  { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--muted); font-size: 15px; }
.wx-btn-active { background: #dceeff !important; color: #1a6bb5 !important; }

/* ── Weather Strip (week/5-day overlay) ─────────────────────── */
.wx-strip {
  position: absolute;
  left: 0; right: 0;
  background: var(--header-bg);
  border-bottom: 1px solid var(--border);
  border-top: 1px solid var(--border);
  display: flex;
  overflow: hidden;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.08);
}
.wx-strip-tcol {
  width: 46px; flex-shrink: 0;
  display: flex; flex-direction: column;
  justify-content: flex-end;
  padding: 0 4px 18px 0;
  gap: 0;
}
.wx-strip-tscale {
  display: flex; flex-direction: column;
  justify-content: space-between;
  height: 100%;
  align-items: flex-end;
}
.wx-strip-tlbl {
  font-size: 8px; color: var(--muted);
  font-weight: 600; white-space: nowrap;
  line-height: 1;
}
.wx-strip-cols {
  flex: 1; display: grid; position: relative;
}
.wx-strip-col {
  display: flex; flex-direction: column;
  border-left: 1px solid var(--border);
  position: relative; overflow: visible;
}
.wx-strip-icons {
  display: flex; align-items: center; justify-content: space-around;
  padding: 4px 2px 0;
  flex-shrink: 0;
}
.wx-strip-icon { font-size: 12px; line-height: 1; }
.wx-strip-graph { flex: 1; position: relative; min-height: 0; }
.wx-strip-timelabels {
  position: relative;
  height: 14px;
  flex-shrink: 0;
}
.wx-strip-timelabel {
  position: absolute;
  font-size: 8px; color: var(--muted);
  font-weight: 600; transform: translateX(-50%);
}
.wx-strip-hilo {
  position: absolute; font-size: 8px; font-weight: 700;
  color: var(--text); pointer-events: none;
}
.wx-strip-loading {
  display: flex; align-items: center; justify-content: center;
  width: 100%; color: var(--muted); font-size: 12px; gap: 8px;
}

/* Google Calendar Sync */
.sync-btn {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 7px;
  border: 1px solid var(--border); background: var(--bg);
  font-size: 11px; font-weight: 500; font-family: var(--font);
  cursor: pointer; color: var(--text); white-space: nowrap;
  transition: background 0.12s;
}
.sync-btn:hover { background: var(--sidebar-bg); }
.sync-btn svg { width: 14px; height: 14px; flex-shrink: 0; }
.sync-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--border); flex-shrink: 0;
}
.sync-dot.connected { background: #22a06b; }
.sync-dot.syncing { background: #c87d12; animation: pulse 1s infinite; }
.sync-dot.error { background: #e05b30; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* SETTINGS */
.setwrap { height: 100%; overflow-y: auto; padding: 20px 24px; }
.set-section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.08em; color: var(--muted);
  margin-bottom: 12px; margin-top: 0;
}
.set-cols { display: flex; gap: 20px; align-items: flex-start; }
.set-col-left { flex: 1; min-width: 0; }
.set-col-right { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 16px; }
.set-card { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.member-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 8px;
}
.member-row-swatch {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 700; color: white;
  flex-shrink: 0;
}
.member-row-name { flex: 1; font-size: 13px; font-weight: 500; }
.member-row-del {
  width: 44px; height: 44px; border-radius: 10px; border: none;
  background: #fdeaea; color: #c44; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: background 0.12s; flex-shrink: 0;
}
.member-row-del:hover { background: #f8c8c8; }
.add-member-row {
  display: flex; gap: 8px; align-items: flex-end; margin-top: 10px;
}
.add-member-row .fin { flex: 1; }
.color-swatches {
  display: flex; gap: 8px; flex-wrap: wrap; margin: 8px 0 4px;
}
.cswatch {
  width: 32px; height: 32px; border-radius: 50%;
  cursor: pointer; border: 2px solid transparent;
  transition: transform 0.1s, border-color 0.1s;
}
.cswatch.sel { border-color: #1c1c1a; transform: scale(1.15); }

<script>
const T=new Date();
let cur=new Date(T), appV='calendar', calV='threeday';

// Weather state — declared here so render() can reference them on first call
const WX_LAT  = 41.0034;
const WX_LON  = -74.3429;
const WX_CITY = 'Butler, NJ';
let weatherMode = false;
let wxCache     = {};
let wxFetching  = false;
let wxError     = false;

// Family members — edit via Settings screen
let members = [
  {name:'Collin',color:'#22a06b', bg:'#e2f5ee'},
  {name:'Ava',   color:'#7c52c8', bg:'#f0ebfc'},
  {name:'Dad',   color:'#0ea5b0', bg:'#e0f5f7'},
  {name:'Mom',   color:'#d44b8a', bg:'#fceef6'},
  {name:'Zorro', color:'#c87d12', bg:'#fdf3e0'},
];
let active=new Set(members.map(m=>m.name));

const PALETTE=[
  '#d44b8a','#22a06b','#7c52c8',
  '#c87d12','#e05b30','#0ea5b0','#6b7280',

function colorToBg(hex){
  // lighten hex to a pastel bg
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  const lr=Math.round(r+(255-r)*0.82),lg=Math.round(g+(255-g)*0.82),lb=Math.round(b+(255-b)*0.82);

}

function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
// Convert HH:MM(:SS) stored time to 12-hour display string e.g. "8pm", "9:30am"
function fmt12(t){
  if(!t) return '';
  const [h,m] = t.split(':').map(Number);
  const ampm = h < 12 ? 'am' : 'pm';
  const h12 = h % 12 || 12;
  return m === 0 ? h12+ampm : h12+':'+String(m).padStart(2,'0')+ampm;
}

function whoArr(e){ return Array.isArray(e.who) ? e.who : [e.who]; }

// Primary color = first person's color
// Single-person: use their color. Multi-person: neutral gray so no one "owns" it.
// Reserved group-event color — not available for individual members
const GROUP_BG   = '#dceeff';
const GROUP_TEXT = '#1a6bb5';
const ec=e=>whoArr(e).length>1?GROUP_TEXT:mColor(whoArr(e)[0]);
const eb=e=>whoArr(e).length>1?GROUP_BG:mBg(whoArr(e)[0]);
// For border accents: always use first person's color (gives multi-person bars a meaningful stripe)
const eprimary=e=>mColor(whoArr(e)[0]);

// Striped left accent for multi-person events.
// Uses background-image gradient instead of border-image so border-radius is preserved on all corners.
function multiLeftBorder(ev, width){
  const people = whoArr(ev);
  const w = width || 3;
  const bg = eb(ev);
  if(people.length <= 1){
    // Single person — solid border-left, plain background
    return `border-left:${w}px solid ${mColor(people[0])};background:${bg}`;
  }
  const colors = people.map(p=>mColor(p));
  const pct = 100 / colors.length;
  const stops = colors.map((c,i)=>`${c} ${(i*pct).toFixed(1)}% ${((i+1)*pct).toFixed(1)}%`).join(',');
  const stripe = `linear-gradient(to bottom,${stops}) left / ${w}px 100% no-repeat`;
  const fill   = `linear-gradient(${bg},${bg}) ${w}px 0 / calc(100% - ${w}px) 100% no-repeat`;
  return `border-left:none;background:${stripe}, ${fill};padding-left:${w+2}px`;
}

// Multi-person avatar cluster — shows stacked colored circles when event has >1 person
function multiWhoHtml(ev, size){
  const people = whoArr(ev);
  if(people.length <= 1) return '';

  const overlap = Math.round(sz * 0.35);
  const dots = people.map((w,i) =>

  ).join('');
  return `<div style="display:flex;align-items:center;margin-left:4px;flex-shrink:0">${dots}</div>`;
}

// Person dot(s) for bottom-right of wev pills — shows ALL people (single or multi)
function whoFooter(ev, size){
  const people = whoArr(ev);
  const sz = size || 22;
  const overlap = Math.round(sz * 0.35);
  const fontSize = Math.round(sz * 0.45);
  const dots = people.map((w,i) =>
    `<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${mColor(w)};border:1.5px solid rgba(255,255,255,0.8);margin-left:${i===0?0:-overlap}px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:${fontSize}px;font-weight:700;color:#fff" title="${w}">${w.charAt(0).toUpperCase()}</div>`
  ).join('');
  return `<div style="display:flex;align-items:center;justify-content:flex-end;margin-top:2px">${dots}</div>`;

// Multi-day helpers
function isMultiDay(ev){ return !!(ev.allDay || (ev.endDate && ev.endDate !== ev.date)); }
// Parse 'YYYY-MM-DD' safely in local timezone (avoids UTC-midnight shift bug)
function parseDate(s){ const p=s.split('-'); return new Date(+p[0],+p[1]-1,+p[2]); }
function evSpansDate(ev, ds){
  if(!ev.endDate || ev.endDate===ev.date) return ev.date===ds;
  return ds >= ev.date && ds <= ev.endDate;
}
function evStartsOn(ev, ds){ return ev.date===ds; }
function evEndsOn(ev, ds){ return (ev.endDate||ev.date)===ds; }

// Returns array of {ev, top, height, timeLabel} for all timed events on a given date
function timedEvLayout(ds){
  const dayEvs = vev().filter(e=>{
    if(!evSpansDate(e,ds)) return false;
    if(e.allDay) return false;          // allDay events go in the all-day bar, not the grid
    if(!isMultiDay(e)) return true;
    return evStartsOn(e,ds) || evEndsOn(e,ds);
  });
  return dayEvs.map(ev=>{
    const multi=isMultiDay(ev);
    let top,ht,timeLabel;
    if(multi && evEndsOn(ev,ds) && !evStartsOn(ev,ds)){
      const eh=parseInt(ev.end.split(':')[0]),em=parseInt(ev.end.split(':')[1]);
      top=0; ht=Math.max(22,(eh*60+em)/60*104);
      timeLabel=`Arrives ${fmt12(ev.end)}`;
    } else {
      const sh=parseInt(ev.time.split(':')[0]),sm=parseInt(ev.time.split(':')[1]);
      top=(sh*60+sm)/60*104;
      if(multi && evStartsOn(ev,ds) && !evEndsOn(ev,ds)){
        // Extend from start time to midnight (hour 24)
        ht = Math.max(22, (24 - sh - sm/60) * 104);
        timeLabel=`Departs ${fmt12(ev.time)}`;
      } else {
        const eh=parseInt(ev.end.split(':')[0]),em=parseInt(ev.end.split(':')[1]);
        const dur=(eh*60+em)-(sh*60+sm);
        ht=Math.max(22,dur/60*104);
        timeLabel=`${fmt12(ev.time)} – ${fmt12(ev.end)}`;
      }
    }
    return {ev, top, ht, timeLabel};
  });
}

// Given array of {top,ht,...}, assign each a {col, totalCols} for side-by-side layout
function assignOverlapCols(items){
  // Sort by top
  const sorted=[...items].sort((a,b)=>a.top-b.top);
  const cols=[]; // each col is array of items placed there
  sorted.forEach(item=>{
    let placed=false;
    for(let c=0;c<cols.length;c++){
      const last=cols[c][cols[c].length-1];
      if(item.top >= last.top+last.ht-2){ cols[c].push(item); item._col=c; placed=true; break; }
    }
    if(!placed){ item._col=cols.length; cols.push([item]); }
  });
  // Second pass: totalCols = max overlapping at any point
  sorted.forEach(item=>{
    let max=1;
    sorted.forEach(other=>{
      if(other===item) return;
      const overlap = item.top < other.top+other.ht && item.top+item.ht > other.top;
      if(overlap) max=Math.max(max, other._col+1, item._col+1);
    });
    item._totalCols=max;
  });
  return sorted;
}

function renderTimedEvs(items, extraRight){
  const laid=assignOverlapCols(items);
  return laid.map(({ev,top,ht,timeLabel,_col,_totalCols})=>{
    const tc=_totalCols||1, c=_col||0;
    const pct=100/tc;
    const left=`${c*pct}%`;
    const right=`calc(${100-(c+1)*pct}% + ${extraRight||2}px)`;
    const borderStyle = multiLeftBorder(ev, 3);
    const titleRow = `<div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600">${ev.title}</div>`;

    let inner;
    if(ht >= 104){
      // Full layout: title + time + location + person footer
      const loc    = ev.loc ? `<div class="wev-loc">${ev.loc}</div>` : '';
      const footer = whoFooter(ev, 22);
      inner = `${titleRow}<div class="wev-t">${timeLabel}</div>${loc}${footer}`;
    } else if(ht >= 60){
      // Medium: title + time + person footer
      const footer = whoFooter(ev, 20);
      inner = `${titleRow}<div class="wev-t">${timeLabel}</div>${footer}`;
    } else {
      // Short: title + person circle right-aligned, single line
      const footer = whoFooter(ev, 18);
      inner = `<div style="display:flex;align-items:center;height:100%;gap:3px"><div style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:600;flex:1">${ev.title}</div>${footer}</div>`;
    }

    return `<div class="wev" onclick="editEvent('${ev.id}')" style="${borderStyle};top:${top}px;height:${ht}px;left:calc(${left} + 2px);right:calc(${right});color:#1c1c1a;display:flex;flex-direction:column">${inner}</div>`;
  }).join('');
}
function toggleM(m){
  const allNames = new Set(members.map(x=>x.name));
  if(active.size === 1 && active.has(m)){
    allNames.forEach(n=>active.add(n));

    allNames.forEach(n=>active.delete(n));
    active.add(m);
  }
  rebuildSidebarDots();
  // Capture scroll before render, restore after (beats the scrollToHour setTimeout)
  const scrollBody = document.querySelector('.wbody') || document.querySelector('.daybody');
  const savedScroll = scrollBody ? scrollBody.scrollTop : null;
  render();
  if(savedScroll !== null){
    setTimeout(()=>{
      const restored = document.querySelector('.wbody') || document.querySelector('.daybody');
      if(restored) restored.scrollTop = savedScroll;
    }, 0);
  }
}

function getSeason(mo, day){
  // Astronomical seasons — Northern hemisphere
  // Spring: Mar 20, Summer: Jun 21, Autumn: Sep 22, Winter: Dec 21
  const md = (mo + 1) * 100 + day; // mo is 0-indexed, so +1 for calendar month
  if(md >= 320 && md < 621)  return {name:'Spring', icon:'🌸', color:'#c04e8a'};
  if(md >= 621 && md < 922)  return {name:'Summer', icon:'☀️',  color:'#c87d12'};
  if(md >= 922 && md < 1221) return {name:'Autumn', icon:'🍂', color:'#b85520'};
  return {name:'Winter', icon:'❄️', color:'#2c6bed'};
}

function updateNowBar(){
  const now    = new Date();
  const dateEl = document.getElementById('tb-now-date');
  const timeEl = document.getElementById('tb-now-time');
  const wxBtn  = document.getElementById('wx-btn');
  const sznEl  = document.getElementById('tb-now-season');
  if(!dateEl || !timeEl) return;

  // Tasks not on today: show task date only, no time/season
  const onTasksNotToday = appV === 'tasks' && taskDate !== fmt(now);
  if(onTasksNotToday){
    const d = new Date(taskDate+'T12:00:00');
    dateEl.textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    timeEl.textContent = '';
    if(sznEl) sznEl.textContent = '';
    return;
  }

  dateEl.textContent = now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  timeEl.textContent = now.toLocaleTimeString([],{hour:'numeric',minute:'2-digit'});

  if(sznEl){
    const s = getSeason(now.getMonth(), now.getDate());
    sznEl.textContent = s.name;
    sznEl.style.color = s.color;
  }

  // Populate weather button
  const todayStr = fmt(now);
  const wx = wxCache[todayStr];
  if(wxBtn && wx){
    let temp, code;
    if(wx.hours && wx.hours.length){
      const nowMins = now.getHours()*60 + now.getMinutes();
      const closest = wx.hours.reduce((best,h)=>{
        const [hh,mm]=h.time.split(':').map(Number);
        const diff=Math.abs(hh*60+mm-nowMins);
        return diff<best.diff?{h,diff}:best;
      },{h:wx.hours[0],diff:Infinity}).h;
      temp=closest.temp; code=closest.code;
    } else {
      temp=wx.hi; code=wx.code;
    }
    const isNight=(()=>{
      if(wx.sunrise&&wx.sunset){
        const rise=new Date(wx.sunrise).getTime(), set=new Date(wx.sunset).getTime();
        return now.getTime()<rise||now.getTime()>set;
      }
      return now.getHours()<6||now.getHours()>=20;
    })();
    const icon = isNight
      ? (code===0?'🌙':code<=2?'🌛':code<=3?'☁️':'🌑')
      : wxIcon(code).icon;
    wxBtn.innerHTML = '<span style="line-height:1">'+icon+'</span><span> '+temp+'°</span>';
  } else if(wxBtn) {
    wxBtn.innerHTML = '';
  }
}

function wstart(d,ww){
  if(ww) return new Date(d); // 5 Day: start from current day
  const s=new Date(d), day=d.getDay();
  s.setDate(d.getDate()-day);
  return s;
}

function render(preserveScroll){
  utb();
  const c=document.getElementById('content');
  const isTimeView = calV==='week'||calV==='workweek'||calV==='threeday'||calV==='day';
  // Auto-disable weatherMode if we navigate away from a time-grid view
  if(weatherMode && (!isTimeView || appV!=='calendar')) weatherMode = false;
  if(appV==='settings'){ c.innerHTML=rSettings(); return; }
  if(appV==='tasks'){ c.innerHTML=rTasks(); return; }
  if(appV==='lists'){ c.innerHTML=rLists(); return; }
  if(appV==='meals'){ c.innerHTML=rMeals(); return; }
  if(calV==='month'){ c.innerHTML=rMonth(); return; }
  // Weather mode intercepts time-grid views
  if(weatherMode && isTimeView){
    if(calV==='day'){
      const saved = preserveScroll ? (document.querySelector('.daybody')?.scrollTop ?? null) : null;
      c.innerHTML = `<div style="display:flex;height:100%;overflow:hidden">
        <div style="flex:1;min-width:0;overflow:hidden;border-right:1px solid var(--border)">${rDay()}</div>
        <div style="flex:1;min-width:0;overflow-y:auto">${rWeatherDay(fmt(cur))}</div>
      </div>`;
      setTimeout(()=>{ drawNow(); saved!==null ? (document.querySelector('.daybody').scrollTop=saved) : scrollToNow(); }, 0);
      return;
    }
    // Week/5day/3day: render normal calendar then inject weather strip after
    const wxDays = calV==='threeday'?3:calV==='workweek'?5:7;
    const saved = preserveScroll ? (document.querySelector('.wbody')?.scrollTop ?? null) : null;
    c.innerHTML = rWeek(wxDays);
    setTimeout(()=>{
      drawNow();
      injectWeatherStrip(wxDays);
      if(saved!==null) document.querySelector('.wbody').scrollTop = saved;
      else scrollToNow();
    }, 0);
    return;
  }
  if(calV==='week'||calV==='workweek'||calV==='threeday'){
    const nDays = calV==='threeday'?3:calV==='workweek'?5:7;
    const saved = preserveScroll ? (document.querySelector('.wbody')?.scrollTop ?? null) : null;
    c.innerHTML=rWeek(nDays);
    setTimeout(()=>{ drawNow(); saved!==null ? (document.querySelector('.wbody').scrollTop=saved) : scrollToNow(); },0);
    return;
  }
  if(calV==='day'){
    const saved = preserveScroll ? (document.querySelector('.daybody')?.scrollTop ?? null) : null;
    c.innerHTML=rDay();
    setTimeout(()=>{ drawNow(); saved!==null ? (document.querySelector('.daybody').scrollTop=saved) : scrollToNow(); },0);
    return;
  }
  if(calV==='agenda'){ c.innerHTML=rAgenda(); return; }
}

function rMonth(){
  const yr=cur.getFullYear(), mo=cur.getMonth();
  const first=new Date(yr,mo,1);
  const startD=new Date(first); startD.setDate(startD.getDate()-first.getDay());

  // Build 6 rows of 7 days
  const rows=[];
  const d=new Date(startD);
  for(let r=0;r<6;r++){
    const row=[];
    for(let c=0;c<7;c++){
      row.push(new Date(d));
      d.setDate(d.getDate()+1);
    }
    rows.push(row);
  }

  // Get all visible multi-day events that appear in this month view range
  const viewStart=fmt(startD);
  const viewEnd=fmt(rows[5][6]);
  const multiEvs=vev().filter(e=>isMultiDay(e) && e.date<=viewEnd && (e.endDate||e.date)>=viewStart);

  // For each row, compute which multi-day events appear and their bar geometry
  // Bar position: left% and width% within the row (0% = left edge of col 0, 100% = right edge of col 6)
  // Start day: leftFrac = (col + timeOfDay/24) / 7
  // End day:   rightFrac = (col + timeOfDay/24) / 7
  // Time fraction: hours+mins out of 24
  function timeFrac(timeStr){ // "HH:MM:SS" or "HH:MM"
    const parts=timeStr.split(':');
    return (parseInt(parts[0])*60+parseInt(parts[1]))/(24*60);
  }

  // DNUM_H = approx pixel height of the day number row inside a cell
  // We position bars at top: DNUM_H + barIndex*(barH+2)
  // We'll use CSS top% within the row height — but we don't know cell height at render time.
  // Instead we use a fixed pixel offset from top of cell, matching dnum height ~30px
  const DNUM_H = 30; // px — matches padding(5) + dnum(24) + gap(1)
  const BAR_H = 22;
  const BAR_GAP = 2;

  let rowsHtml='';

  rows.forEach((rowDays,ri)=>{
    // Which multi-day events overlap this row?
    const rowStart=fmt(rowDays[0]), rowEnd=fmt(rowDays[6]);
    const rowMulti=multiEvs.filter(e=> e.date<=rowEnd && (e.endDate||e.date)>=rowStart);

    // Build cell HTML (no multi-day pills inside cells)
    let cellsHtml='';
    rowDays.forEach(day=>{
      const other=day.getMonth()!==mo, isToday=same(day,T), ds=fmt(day);
      const singleEvs=vev().filter(e=>!isMultiDay(e)&&e.date===ds);
      // Reserve space for multi-day bars — add invisible spacers
      const multiOnThisDay=rowMulti.length;
      let spacers='';
      for(let i=0;i<Math.min(multiOnThisDay,3);i++){
        spacers+=`<div style="height:${BAR_H}px;margin-bottom:${BAR_GAP}px"></div>`;
      }
      const show=singleEvs.slice(0,Math.max(0,3-multiOnThisDay));
      const pills=show.map(e=>`<div class="epill" onclick="event.stopPropagation();editEvent('${e.id}')" style="${multiLeftBorder(e,3)};cursor:pointer;color:#1c1c1a"><div class="edot" style="background:${ec(e)};flex-shrink:0"></div><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">${e.title}</span></div>`).join('');
      const moreCount=(singleEvs.length-show.length);
      const more=moreCount>0?`<div class="emore">+${moreCount} more</div>`:'';
      cellsHtml+=`<div class="mcell${other?' other':''}${isToday?' is-today':''}" onclick="mcc('${ds}')"><div class="dnum">${day.getDate()}</div>${spacers}${pills}${more}</div>`;
    });

    // Build overlay bars for multi-day events
    let overlayHtml='';
    rowMulti.forEach((ev,barIdx)=>{
      // Clamp event to this row
      const evStartInRow = ev.date >= rowStart ? ev.date : rowStart;
      const evEndInRow   = (ev.endDate||ev.date) <= rowEnd ? (ev.endDate||ev.date) : rowEnd;

      // Column index within this row (0-6)
      const colStart = rowDays.findIndex(d=>fmt(d)===evStartInRow);
      const colEnd   = rowDays.findIndex(d=>fmt(d)===evEndInRow);

      // Time fractions — only applied on the actual event start/end dates
      const startFrac = ev.date===evStartInRow ? timeFrac(ev.time) : 0;
      const endFrac   = (ev.endDate||ev.date)===evEndInRow ? timeFrac(ev.end) : 1;

      const leftPct  = (colStart + startFrac) / 7 * 100;
      const rightPct = (colEnd   + endFrac)   / 7 * 100;
      // Enforce minimum width of 0.4 columns so thin start slivers are always visible
      const minWidth = (0.4 / 7 * 100);
      const widthPct = Math.max(minWidth, rightPct - leftPct);

      // Vertical position: below dnum, stacked by barIdx
      const topPx = DNUM_H + barIdx*(BAR_H+BAR_GAP);

      // Show title on first day bar is at least 30% of a cell wide
      const barWidthInStartCell = Math.min(rightPct, (colStart+1)/7*100) - leftPct;
      const oneCellPct = 100/7;
      const startsInRow = ev.date >= rowStart;
      // Find first day in this row where bar covers >= 30% of cell
      let labelDayCol = -1;
      for(let c=colStart; c<=colEnd; c++){
        const cellLeft=c/7*100, cellRight=(c+1)/7*100;
        const overlap=Math.min(rightPct,cellRight)-Math.max(leftPct,cellLeft);
        if(overlap/oneCellPct >= 0.30){ labelDayCol=c; break; }
      }
      const label = (labelDayCol === colStart && startsInRow) ? ev.title
                  : (labelDayCol > colStart && labelDayCol >= 0) ? ev.title
                  : '';

      // Border radius: round left if starts here, round right if ends here
      const rleft  = startsInRow ? '6px' : '0';
      const rright = (ev.endDate||ev.date) <= rowEnd ? '6px' : '0';
      const borderRadius = `${rleft} ${rright} ${rright} ${rleft}`;
      const borderLeftStyle = startsInRow
        ? multiLeftBorder(ev, 3)+';padding-left:5px'
        : 'border-left:none;padding-left:5px';

      const barContent = `<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${label}</span>${whoFooter(ev,16)}`;
      overlayHtml+=`<div class="mday-bar" onclick="event.stopPropagation();editEvent('${ev.id}')" style="left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;top:${topPx}px;background:${eb(ev)};color:#1c1c1a;border-radius:${borderRadius};${borderLeftStyle};display:flex;align-items:center">${barContent}</div>`;
    });

    rowsHtml+=`<div class="month-row">${cellsHtml}<div class="mday-overlay">${overlayHtml}</div></div>`;
  });

  return `<div class="mwrap">
    <div class="dow-row">${DS.map(d=>`<div class="dow-cell">${d}</div>`).join('')}</div>
    <div class="month-rows-wrap">${rowsHtml}</div>
  </div>`;
}

function rWeek(numDays){
  const ww = numDays !== 7; // non-7 = starts from cur, not Sunday
  const s=wstart(cur, ww);
  const days=Array.from({length:numDays},(_,i)=>{const d=new Date(s);d.setDate(s.getDate()+i);return d;});
  const cols=days.length;

  // Column headers
  let hd=`<div class="wh-sp" style="width:46px"></div>`;
  days.forEach(d=>{
    const isT=same(d,T);
    hd+=`<div class="wh-cell"><div class="wh-dow">${DS[d.getDay()]}</div><div class="wh-date${isT?' tod':''}">${d.getDate()}</div></div>`;
  });

  // All-day / multi-day proportional pill row
  const weekMultiEvs = vev().filter(e=>isMultiDay(e) && e.date<=fmt(days[days.length-1]) && (e.endDate||e.date)>=fmt(days[0]));
  const hasMulti = weekMultiEvs.length > 0;
  let allDayRow = '';
  if(hasMulti){
    const rowStart=fmt(days[0]), rowEnd=fmt(days[days.length-1]);
    function wTimeFrac(t){ const p=t.split(':'); return (parseInt(p[0])*60+parseInt(p[1]))/(24*60); }
    const BAR_H=22, BAR_GAP=2;
    let barsHtml='';
    weekMultiEvs.forEach((ev,barIdx)=>{
      const evStartInRow = ev.date >= rowStart ? ev.date : rowStart;
      const evEndInRow   = (ev.endDate||ev.date) <= rowEnd ? (ev.endDate||ev.date) : rowEnd;
      const colStart = days.findIndex(d=>fmt(d)===evStartInRow);
      const colEnd   = days.findIndex(d=>fmt(d)===evEndInRow);
      const startFrac = ev.date===evStartInRow ? wTimeFrac(ev.time) : 0;
      const endFrac   = (ev.endDate||ev.date)===evEndInRow ? wTimeFrac(ev.end) : 1;
      const leftPct  = (colStart + startFrac) / cols * 100;
      const rightPct = (colEnd   + endFrac)   / cols * 100;
      const widthPct = Math.max(0.4/cols*100, rightPct - leftPct);
      const topPx = barIdx*(BAR_H+BAR_GAP)+3;
      // Title on first cell where bar >= 30% wide
      const oneCellPct = 100/cols;
      let labelCol=-1;
      for(let c=colStart;c<=colEnd;c++){
        const ov=Math.min(rightPct,(c+1)/cols*100)-Math.max(leftPct,c/cols*100);
        if(ov/oneCellPct>=0.30){labelCol=c;break;}
      }
      const startsInRow = ev.date>=rowStart;
      const label = labelCol>=0 ? ev.title : '';
      const rleft = startsInRow?'6px':'0';
      const rright = (ev.endDate||ev.date)<=rowEnd?'6px':'0';
      const bl = startsInRow ? multiLeftBorder(ev,3)+';padding-left:5px' : 'border-left:none;padding-left:5px';
      barsHtml+=`<div onclick="editEvent('${ev.id}')" style="position:absolute;left:${leftPct.toFixed(2)}%;width:${widthPct.toFixed(2)}%;top:${topPx}px;height:${BAR_H}px;background:${eb(ev)};color:#1c1c1a;border-radius:${rleft} ${rright} ${rright} ${rleft};${bl};font-size:11px;font-weight:600;display:flex;align-items:center;cursor:pointer;box-sizing:border-box"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">${label}</span>${whoFooter(ev,16)}</div>`;
    });
    const rowH = weekMultiEvs.length*(BAR_H+BAR_GAP)+4;
    allDayRow=`<div style="display:grid;grid-template-columns:46px 1fr;border-bottom:1px solid var(--border);background:var(--header-bg)">
      <div style="border-right:1px solid var(--border);padding:4px 6px;font-size:9px;color:var(--muted);font-weight:600;display:flex;align-items:flex-start;justify-content:flex-end;padding-top:6px">all day</div>
      <div style="position:relative;height:${rowH}px">${barsHtml}</div>
    </div>`;
  }

  // Time grid — hour slot lines + events per column
  let tlbls='';
  for(let h=0;h<24;h++){
    const l=h===0?'12am':h===12?'noon':h<12?h+'am':(h-12)+'pm';
    tlbls+=`<div class="tlbl">${l}</div>`;
  }
  // Build hour-line grid (visual only) and overlay events per column
  const hourLines=Array.from({length:24},()=>'<div class="hslot"></div>').join('');
  const dcHtml=days.map((d,ci)=>{
    const ds=fmt(d);
    const items=timedEvLayout(ds);
    const evHtml=renderTimedEvs(items, 2);
    return `<div class="dcol" id="dc${ci}" data-date="${ds}"><div style="position:relative">${hourLines}${evHtml}</div></div>`;
  }).join('');
  return `<div class="wwrap">
    <div class="whead" style="grid-template-columns:46px repeat(${cols},1fr)">${hd}</div>
    <div id="week-allday-row">${allDayRow}</div>
    <div class="wbody"><div class="tcol">${tlbls}</div><div class="dcols" style="grid-template-columns:repeat(${cols},1fr)" id="dcols">${dcHtml}</div></div>
  </div>`;
}

function rDay(){
  const ds=fmt(cur);
  const allDayEvs=vev().filter(e=>isMultiDay(e)&&evSpansDate(e,ds)&&(e.allDay||(!evStartsOn(e,ds)&&!evEndsOn(e,ds))));
  const allDayBanner=allDayEvs.length?`<div style="padding:4px 8px;border-bottom:1px solid var(--border);background:var(--header-bg)">
    ${allDayEvs.map(ev=>`<div onclick="editEvent('${ev.id}')" style="background:${eb(ev)};color:#1c1c1a;${multiLeftBorder(ev,3)};font-size:11px;font-weight:600;padding:3px 8px 3px 6px;border-radius:0 6px 6px 0;margin-bottom:2px;cursor:pointer;display:flex;align-items:center">${ev.title} · all day${whoFooter(ev,16)}</div>`).join('')}
  </div>`:'';

  let tlbls='';
  for(let h=0;h<24;h++){
    const l=h===0?'12am':h===12?'noon':h<12?h+'am':(h-12)+'pm';
    tlbls+=`<div class="tlbl">${l}</div>`;
  }
  const hourLines=Array.from({length:24},()=>'<div class="hslot"></div>').join('');
  const items=timedEvLayout(ds);
  const evHtml=renderTimedEvs(items, 8);

  return `<div class="daywrap">
    <div class="dayhero"><div class="dayhero-n">${cur.getDate()}</div><div><div class="dayhero-dow">${DF[cur.getDay()]}</div><div class="dayhero-sub">${MOS[cur.getMonth()]} ${cur.getFullYear()}</div></div></div>
    ${allDayBanner}
    <div class="daybody"><div class="tcol">${tlbls}</div><div class="dayinner" id="dayinner"><div style="position:relative">${hourLines}${evHtml}</div></div></div>
  </div>`;
}

function rAgenda(){
  const yr=cur.getFullYear(),mo=cur.getMonth();
  const nd=new Date(yr,mo+1,0).getDate();
  let html='<div class="agwrap">';
  for(let day=1;day<=nd;day++){
    const d=new Date(yr,mo,day),ds=fmt(d),isT=same(d,T);
    const de=vev().filter(e=>evSpansDate(e,ds)).sort((a,b)=>a.time>b.time?1:-1);
    html+=`<div><div class="ag-hdr"><div class="ag-num${isT?' tod':''}">${day}</div><div><div class="ag-dow">${DF[d.getDay()]}</div><div class="ag-mon">${MOS[mo]} ${yr}</div></div></div><div class="ag-evs">`;
    if(!de.length) html+=`<div class="ag-empty">No events</div>`;
    de.forEach(ev=>{
      const multi=isMultiDay(ev);
      const timeStr=multi
        ? (evStartsOn(ev,ds)?`Starts ${fmt12(ev.time)}`:evEndsOn(ev,ds)?`Ends ${fmt12(ev.end)}`:'All day')
        : `${fmt12(ev.time)} – ${fmt12(ev.end)}`;
      const whoBadges = whoArr(ev).map(w=>`<span class="ag-who" style="background:${mBg(w)};color:${mColor(w)}">${w}</span>`).join('');
      html+=`<div class="ag-row" onclick="editEvent('${ev.id}')"><div class="ag-bar" style="background:${eprimary(ev)}"></div><div class="ag-time">${timeStr}</div><div><div class="ag-title">${ev.title}${multi?' 📅':''}</div>${ev.loc?`<div class="ag-sub">${ev.loc}</div>`:''}<div style="display:flex;gap:3px;margin-top:3px">${whoBadges}</div></div></div>`;
    });
    html+=`</div></div>`;
  }
  return html+'</div>';
}

function rTasks(){
  const d       = taskDate;
  const dow     = new Date(d+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const isToday = d === fmt(T);

  const taskMembers = members.filter(m => m.name !== 'Zorro');

  function recurLabel(t){
    if(!t.recur) return '';
    const n = t.recurN > 1 ? `Every ${t.recurN} ` : '';
    if(t.recur==='daily')     return n ? `Every ${t.recurN} days` : 'Daily';
    if(t.recur==='weekly')    return n ? `Every ${t.recurN} weeks` : 'Weekly';
    if(t.recur==='monthly')   return n ? `Every ${t.recurN} months` : 'Monthly';
    if(t.recur==='quarterly') return 'Quarterly';
    if(t.recur==='yearly')    return n ? `Every ${t.recurN} years` : 'Yearly';
    if(t.recur==='custom' && t.recurDays?.length)
      return t.recurDays.map(i=>['Su','Mo','Tu','We','Th','Fr','Sa'][i]).join(' ');
    return t.recur;
  }

  // Quarter key: "2026-Q2" — used to track quarterly done state
  function qKey(dateStr){
    const dt = new Date(dateStr+'T12:00:00');
    return `${dt.getFullYear()}-Q${Math.floor(dt.getMonth()/3)+1}`;
  }

  const visibleFor = (t, who) => {
    if(!whoArr(t).includes(who)) return false;
    if(!t.recur){
      if(t.date === d) return true;
      if(!t.date) return true; // anytime
      return false;
    }
    const base = new Date((t.date||fmt(T))+'T12:00:00');
    const cur  = new Date(d+'T12:00:00');
    const n    = t.recurN || 1;
    if(t.recur === 'daily'){
      const diffDays = Math.round((cur - base) / 86400000);
      return diffDays >= 0 && diffDays % n === 0;
    }
    if(t.recur === 'weekly'){
      const diffDays = Math.round((cur - base) / 86400000);
      return diffDays >= 0 && diffDays % (n * 7) === 0;
    }
    if(t.recur === 'monthly'){
      return cur >= base && cur.getDate() === base.getDate() &&
        ((cur.getFullYear() - base.getFullYear()) * 12 + cur.getMonth() - base.getMonth()) % n === 0;
    }
    if(t.recur === 'quarterly'){
      // Visible for the entire quarter (Jan–Mar, Apr–Jun, Jul–Sep, Oct–Dec)
      if(cur < base) return false;
      const qStart = new Date(cur.getFullYear(), Math.floor(cur.getMonth()/3)*3, 1);
      return cur >= qStart;
    }
    if(t.recur === 'yearly'){
      return cur >= base && cur.getDate() === base.getDate() &&
        cur.getMonth() === base.getMonth() &&
        (cur.getFullYear() - base.getFullYear()) % n === 0;
    }
    if(t.recur === 'custom' && t.recurDays?.length)
      return t.recurDays.includes(cur.getDay());
    return false;
  };

  // For recurring tasks, done is tracked per-date in doneOn[]
  // Quarterly tasks use quarter key ("2026-Q2"); other recur use the date string
  function isDoneOn(t, date){
    if(!t.recur) return t.done;
    if(t.recur === 'quarterly') return (t.doneOn||[]).includes(qKey(date));
    return (t.doneOn||[]).includes(date);
  }

  const card = (t, color) => {
    const isDone = isDoneOn(t, d);
    const sub    = recurLabel(t);
    return `<div class="task-card${isDone?' done-card':''}" style="border-left-color:${color}">
      <div class="task-check${isDone?' done':''}" style="${isDone?`background:${color}`:''}"
        onclick="toggleT(${t.id})">
        ${isDone?`<svg width="12" height="12" viewBox="0 0 8 8"><path d="M1 4l2 2 4-4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`:''}
      </div>
      <div class="task-card-body" onclick="toggleT(${t.id})">
        <div class="task-card-title${isDone?' done':''}">${t.title}</div>
        ${sub?`<div class="task-card-sub">${sub}</div>`:''}
      </div>
      <button class="task-menu-btn" onclick="editTask(${t.id})">⋮</button>
    </div>`;
  };

  // Progress ring: 40px wrap, avatar inset:4px → radius 16px, ring at r=19 (3px outside)
  const R = 19, C = 2 * Math.PI * R;
  function progressRing(done, total){
    const pct  = total > 0 ? done / total : 0;
    const dash = (pct * C).toFixed(1);
    const gap  = (C - pct * C).toFixed(1);
    return `<svg class="task-avatar-ring" viewBox="0 0 40 40">
      <circle cx="20" cy="20" r="${R}" fill="none" stroke="#e2e2de" stroke-width="2"/>
      <circle cx="20" cy="20" r="${R}" fill="none" stroke="#1a6bb5" stroke-width="2"
        stroke-dasharray="${dash} ${gap}" stroke-linecap="round"
        style="transition:stroke-dasharray 0.4s ease"/>
    </svg>`;
  }

  const cols = taskMembers.map(m => {
    const myTasks = tasks.filter(t => visibleFor(t, m.name));
    const color   = mColor(m.name);

    const morning   = myTasks.filter(t => t.timeOfDay === 'morning');
    const afternoon = myTasks.filter(t => t.timeOfDay === 'afternoon');
    const evening   = myTasks.filter(t => t.timeOfDay === 'evening');
    const anytime   = myTasks.filter(t => !t.timeOfDay);

    const total = myTasks.length;
    const done  = myTasks.filter(t => isDoneOn(t, d)).length;

    const morningSection   = morning.length   ? `<div class="task-section-lbl">🌅 Morning</div>${morning.map(t => card(t, color)).join('')}`   : '';
    const afternoonSection = afternoon.length ? `<div class="task-section-lbl">☀️ Afternoon</div>${afternoon.map(t => card(t, color)).join('')}` : '';
    const eveningSection   = evening.length   ? `<div class="task-section-lbl">🌙 Evening</div>${evening.map(t => card(t, color)).join('')}`     : '';
    const anytimeSection   = anytime.length   ? `<div class="task-section-lbl">ANY TIME</div>${anytime.map(t => card(t, color)).join('')}`       : '';

    return `<div class="task-col">
      <div class="task-col-hd">

function toggleT(id){
  const t = tasks.find(t => t.id === id);
  if(!t) return;

  // Recurring tasks track completion per-date; one-off tasks use plain boolean
  if(t.recur){
    if(!t.doneOn) t.doneOn = [];
    const key = t.recur === 'quarterly'
      ? `${new Date(taskDate+'T12:00:00').getFullYear()}-Q${Math.floor(new Date(taskDate+'T12:00:00').getMonth()/3)+1}`
      : taskDate;
    const idx = t.doneOn.indexOf(key);
    if(idx === -1) t.doneOn.push(key);
    else t.doneOn.splice(idx, 1);
  } else {
    t.done = !t.done;
  }

  const isNowDone = t.recur
    ? (() => { const key = t.recur==='quarterly' ? `${new Date(taskDate+'T12:00:00').getFullYear()}-Q${Math.floor(new Date(taskDate+'T12:00:00').getMonth()/3)+1}` : taskDate; return (t.doneOn||[]).includes(key); })()
    : t.done;

  if(isNowDone){
    const section = t.timeOfDay || 'anytime';
    const d = taskDate;
    const isVisible = (tk, who) => {
      if(!whoArr(tk).includes(who)) return false;
      if(!tk.recur){
        if(tk.date===d) return true;
        if(!tk.date) return true;
        return false;
      }
      const base = new Date((tk.date||fmt(T))+'T12:00:00');
      const cur  = new Date(d+'T12:00:00');
      const n    = tk.recurN || 1;
      if(tk.recur==='daily'){ const diff=Math.round((cur-base)/86400000); return diff>=0&&diff%n===0; }
      if(tk.recur==='weekly'){ const diff=Math.round((cur-base)/86400000); return diff>=0&&diff%(n*7)===0; }
      if(tk.recur==='monthly') return cur>=base&&cur.getDate()===base.getDate()&&((cur.getFullYear()-base.getFullYear())*12+cur.getMonth()-base.getMonth())%n===0;
      if(tk.recur==='quarterly'){ if(cur<base) return false; const qs=new Date(cur.getFullYear(),Math.floor(cur.getMonth()/3)*3,1); return cur>=qs; }
      if(tk.recur==='yearly') return cur>=base&&cur.getDate()===base.getDate()&&cur.getMonth()===base.getMonth()&&(cur.getFullYear()-base.getFullYear())%n===0;
      if(tk.recur==='custom'&&tk.recurDays?.length) return tk.recurDays.includes(cur.getDay());
      return false;
    };
    const taskDoneKey = (tk, date) => tk.recur==='quarterly'
      ? `${new Date(date+'T12:00:00').getFullYear()}-Q${Math.floor(new Date(date+'T12:00:00').getMonth()/3)+1}`
      : date;
    const taskDone = tk => tk.recur ? (tk.doneOn||[]).includes(taskDoneKey(tk,d)) : tk.done;
    whoArr(t).forEach(who => {
      const sectionTasks = tasks.filter(tk => isVisible(tk, who) && (tk.timeOfDay||'anytime') === section);
      if(sectionTasks.length > 0 && sectionTasks.every(tk => taskDone(tk))){
        const label = section==='morning' ? '🌅 Morning' : section==='afternoon' ? '☀️ Afternoon' : section==='evening' ? '🌙 Evening' : '';
        showTaskCongrats(who, label);
      }
    });
  }
  render();
  ghScheduleSave();
}

  const emojis = ['🎉','⭐','🌟','✨','🎊','🏆','💪','🎈','🥳','👏','🌈','🦄'];
  const shower = document.createElement('div');

  for(let i=0; i<40; i++){

  const line=`<div class="now-line" style="top:${top}px;background:${clr}"><div class="now-dot" style="background:${clr}"></div></div>`;
  // Day view — single column
  const dayInner=document.getElementById('dayinner');
  if(dayInner&&dayInner.firstChild){ dayInner.firstChild.insertAdjacentHTML('beforeend',line); return; }

function mcc(ds){
  if(calV !== 'month') return;

  // Remove any existing peek
  const existing = document.getElementById('day-peek-overlay');
  if(existing) existing.remove();

  const d   = new Date(ds+'T12:00:00');
  const lbl = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});

  // Gather all events for this day
  const active = new Set(members.map(m=>m.name));
  const dayEvs = evs.filter(e =>
    whoArr(e).some(w => active.has(w)) &&
    (isMultiDay(e) ? e.date<=ds && (e.endDate||e.date)>=ds : e.date===ds)
  ).sort((a,b) => {
    if(a.allDay && !b.allDay) return -1;
    if(!a.allDay && b.allDay) return 1;
    return (a.time||'').localeCompare(b.time||'');
  });

  const evHtml = dayEvs.length ? dayEvs.map(e => {
    const color = whoArr(e).length>1 ? '#1a6bb5' : mColor(whoArr(e)[0]);
    const timeStr = e.allDay ? 'All day' : (e.time ? fmt12(e.time)+(e.end?'–'+fmt12(e.end):'') : '');
    return `<div class="day-peek-ev" onclick="peekEditEvent('${e.id}')">
      <div class="day-peek-dot" style="background:${color}"></div>
      <div class="day-peek-ev-info">
        <div class="day-peek-ev-title">${e.title}</div>
        ${timeStr?`<div class="day-peek-ev-time">${timeStr}</div>`:''}
      </div>
    </div>`;
  }).join('') : `<div class="day-peek-empty">No events</div>`;

  const overlay = document.createElement('div');
  overlay.id = 'day-peek-overlay';
  overlay.className = 'day-peek-overlay';
  overlay.onclick = () => overlay.remove();
  overlay.innerHTML = `
    <div class="day-peek" onclick="event.stopPropagation()">
      <div class="day-peek-hd">
        <span class="day-peek-title" onclick="peekGoDay('${ds}')">${lbl}</span>
        <button class="day-peek-close" onclick="document.getElementById('day-peek-overlay').remove()">✕</button>
      </div>
      <div class="day-peek-body">${evHtml}</div>
    </div>`;
  document.body.appendChild(overlay);
}

function saveSettings(){
  if(!_draft) { sv('calendar'); return; }
  // Sync names: match by original index for existing members, apply renames
  const originalMembers = members.map(m=>({...m}));
  const keepCount = Math.min(originalMembers.length, _draft.length);
  for(let i=0; i<keepCount; i++){
    const oldName = originalMembers[i].name;
    const newName = (_draft[i].name||'').trim() || oldName;
    _draft[i].name = newName;
    if(oldName !== newName){
      evs.forEach(e=>{ e.who = whoArr(e).map(w=>w===oldName?newName:w); });
      tasks.forEach(t=>{ t.who = whoArr(t).map(w=>w===oldName?newName:w); });
      if(active.has(oldName)){ active.delete(oldName); active.add(newName); }
    }
  }
  // Remove deleted members from active set
  originalMembers.forEach(m=>{
    if(!_draft.find(d=>d.name===m.name)) active.delete(m.name);
  });
  // Add brand-new members to active set
  _draft.forEach(m=>{ if(!originalMembers.find(o=>o.name===m.name)) active.add(m.name); });
  // Commit
  members = _draft.map(m=>({...m}));
  _draft = null;
  window._draftNewColor = undefined;
  rebuildFullSidebarDots();
  sv('calendar');
}

function cancelSettings(){
  _draft = null;
  window._draftNewColor = undefined;
  sv('calendar');
}

  // Wire start time → end time auto-advance after modal renders
  setTimeout(()=>{

    const ee = document.getElementById('ee');
    if(!es||!ee) return;
    function syncEnd(){
      const [sh,sm] = es.value.split(':').map(Number);
      ee.min = es.value;
      const [eh,em] = ee.value.split(':').map(Number);
      if(eh*60+em <= sh*60+sm){
        const newMins = sh*60+sm+60;
        const nh = Math.floor(newMins/60)%24;
        const nm = newMins%60;
        ee.value = String(nh).padStart(2,'0')+':'+String(nm).padStart(2,'0');
      }
    }
    es.addEventListener('change', syncEnd);
  }, 0);
  window._save=()=>{
    const t=document.getElementById('etitle').value.trim();
    if(!t) return;
    const multiOpen = document.getElementById('multiday-fields').style.display!=='none';

function toggleMultiDay(){
  const f=document.getElementById('multiday-fields');
  const a=document.getElementById('multiday-arrow');
  const open=f.style.display==='none';
  f.style.display=open?'block':'none';
  a.textContent=open?'▼':'▶';
  // Sync the date field into the multi-day start date when expanding
  if(open){
    const d=document.getElementById('edate').value;
    const sd=document.getElementById('edate2');
    const ed=document.getElementById('eenddate');
    if(sd&&d) sd.value=d;
    if(ed&&d) ed.value=d;

  }
}
