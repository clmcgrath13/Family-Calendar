    document.getElementById('vdrop-menu')?.classList.remove('open');
    document.getElementById('vdrop-btn')?.classList.remove('open');
  }
});

// ─── WEATHER ────────────────────────────────────────────────────────────────
// (WX_LAT, WX_LON, WX_CITY, weatherMode, wxCache, wxFetching declared at top of script)

// WMO weather code → emoji + description
function wxIcon(code){
  if(code===0)  return {icon:'☀️',  desc:'Clear'};
  if(code===1)  return {icon:'🌤️', desc:'Mostly clear'};
  if(code===2)  return {icon:'⛅',  desc:'Partly cloudy'};
  if(code===3)  return {icon:'🌥️', desc:'Overcast'};
  if(code<=49)  return {icon:'🌫️', desc:'Foggy'};
  if(code<=57)  return {icon:'🌦️', desc:'Drizzle'};
  if(code<=67)  return {icon:'🌧️', desc:'Rain'};
  if(code<=77)  return {icon:'❄️',  desc:'Snow'};
  if(code<=82)  return {icon:'🌦️', desc:'Showers'};
  if(code<=84)  return {icon:'🌨️', desc:'Snow showers'};
  if(code<=99)  return {icon:'⛈️', desc:'Thunderstorm'};
  return {icon:'🌡️', desc:'Unknown'};
}

async function fetchWeather(dateStr){
  if(wxCache[dateStr]) return wxCache[dateStr];
  if(wxFetching) return null;
  wxFetching = true;
  wxError    = false;
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${WX_LAT}&longitude=${WX_LON}`
      + `&hourly=temperature_2m,precipitation_probability,weathercode,windspeed_10m,relativehumidity_2m`
      + `&daily=temperature_2m_max,temperature_2m_min,weathercode,precipitation_probability_max,sunrise,sunset`
      + `&temperature_unit=fahrenheit&windspeed_unit=mph`
      + `&timezone=America%2FNew_York&forecast_days=14`;
    const resp = await fetch(url);
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const data = await resp.json();
    data.daily.time.forEach((d, di) => {
      const hourIdxs = data.hourly.time
        .map((t,i) => t.startsWith(d) ? i : -1)
        .filter(i => i >= 0);
      wxCache[d] = {
        date    : d,
        hi      : Math.round(data.daily.temperature_2m_max[di]),
        lo      : Math.round(data.daily.temperature_2m_min[di]),
        code    : data.daily.weathercode[di],
        precip  : data.daily.precipitation_probability_max[di],
        sunrise : data.daily.sunrise?.[di] || null,
        sunset  : data.daily.sunset?.[di]  || null,
        hours   : hourIdxs.map(i => ({
          time    : data.hourly.time[i].slice(11,16),
          temp    : Math.round(data.hourly.temperature_2m[i]),
          prec    : data.hourly.precipitation_probability[i],
          code    : data.hourly.weathercode[i],
          wind    : Math.round(data.hourly.windspeed_10m[i]),
          humidity: data.hourly.relativehumidity_2m[i],
        })),
      };
    });
    updateNowBar(); // refresh header weather display now that cache is populated
    return wxCache[dateStr] || null;
  } catch(e) {
    console.error('Weather fetch failed:', e);
    wxError = true;
    return null;
  } finally {
    wxFetching = false;
  }
}

function retryWeather(){
  wxError = false;
  wxCache = {};
  render();
}

function rWeatherDay(dateStr){
  const wx = wxCache[dateStr];

  if(!wx && wxError){
    return `<div class="wx-wrap"><div class="wx-loading" style="flex-direction:column;gap:16px">
      <div style="font-size:32px">⚠️</div>
      <div>Couldn't load weather data.</div>
      <div style="font-size:13px;color:var(--muted)">Check your internet connection.</div>
      <button onclick="retryWeather()" style="margin-top:8px;padding:12px 24px;border-radius:10px;border:1px solid var(--border);background:var(--header-bg);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:var(--font)">
        Try Again
      </button>
    </div></div>`;
  }

  if(!wx){
    fetchWeather(dateStr).then(d => { if(d) render(); else render(); });
    return `<div class="wx-wrap"><div class="wx-loading" style="flex-direction:column;gap:12px">
      <div style="font-size:32px">🌤️</div>
      <div>Loading weather for ${WX_CITY}…</div>
    </div></div>`;
  }

  const w      = wxIcon(wx.code);
  const now    = new Date();
  const isToday = dateStr === fmt(now);
  const curHour = isToday
    ? wx.hours.find(h => parseInt(h.time) >= now.getHours()) || wx.hours[wx.hours.length-1]
    : null;
  const curTemp = curHour ? curHour.temp : wx.hi;
  const curCode = curHour ? wxIcon(curHour.code) : w;
  const dateLabel = new Date(dateStr+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

  // SVG dimensions — use viewBox so it scales to container width
  const VW = 800, ICON_H = 28, GRAPH_H = 110, TIME_H = 18;
  const VH = ICON_H + GRAPH_H + TIME_H;
  const PAD_L = 8, PAD_R = 8;
  const hours = wx.hours; // 24 hourly entries
  const n = hours.length;

  const temps = hours.map(h => h.temp);
  const minT  = Math.min(...temps) - 4;
  const maxT  = Math.max(...temps) + 4;
  const toX   = i => PAD_L + (i / (n - 1)) * (VW - PAD_L - PAD_R);
  const toY   = t => ICON_H + GRAPH_H - ((t - minT) / (maxT - minT)) * GRAPH_H;

  // Temp curve points
  const linePoints = hours.map((h,i) => `${toX(i).toFixed(1)},${toY(h.temp).toFixed(1)}`).join(' ');
  const fillPoints = linePoints
    + ` ${toX(n-1).toFixed(1)},${(ICON_H+GRAPH_H).toFixed(1)} ${toX(0).toFixed(1)},${(ICON_H+GRAPH_H).toFixed(1)}`;

  // Grid lines
  const gridLines = [];
  for(let t = Math.ceil(minT/10)*10; t <= maxT; t += 10){
    const y = toY(t).toFixed(1);
    gridLines.push(`<line x1="${PAD_L}" y1="${y}" x2="${VW-PAD_R}" y2="${y}" stroke="#e2e2de" stroke-width="1"/>`);
  }

  // Precip bars — in front of temp fill
  const barW = Math.max(1, (VW - PAD_L - PAD_R) / n - 1);
  const precipBars = hours.map((h,i) => {
    if((h.prec||0) < 5) return '';
    const barH = (h.prec / 100) * GRAPH_H;
    const bx   = (toX(i) - barW/2).toFixed(1);
    const by   = (ICON_H + GRAPH_H - barH).toFixed(1);
    return `<rect x="${bx}" y="${by}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" fill="#93c5fd" opacity="0.55" rx="1"/>`;
  }).join('');

  // Current time line
  const nowLine = isToday && curHour
    ? (() => { const i = hours.indexOf(curHour); const x = toX(i).toFixed(1); return `<line x1="${x}" y1="${ICON_H}" x2="${x}" y2="${ICON_H+GRAPH_H}" stroke="#2c6bed" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>`; })()
    : '';

  // H/L markers
  const maxH = hours.reduce((a,b)=>a.temp>b.temp?a:b);
  const minH = hours.reduce((a,b)=>a.temp<b.temp?a:b);
  const hiX  = toX(hours.indexOf(maxH)).toFixed(1);
  const hiY  = (toY(maxH.temp) - 10).toFixed(1);
  const loX  = toX(hours.indexOf(minH)).toFixed(1);
  const loY  = (toY(minH.temp) + 14).toFixed(1);
  const hlMarkers = `
    <circle cx="${hiX}" cy="${(toY(maxH.temp)).toFixed(1)}" r="3" fill="#2c6bed"/>
    <text x="${hiX}" y="${hiY}" text-anchor="middle" font-size="10" font-weight="700" fill="#1c1c1a">${maxH.temp}°</text>
    <circle cx="${loX}" cy="${(toY(minH.temp)).toFixed(1)}" r="3" fill="#2c6bed"/>
    <text x="${loX}" y="${loY}" text-anchor="middle" font-size="10" font-weight="700" fill="#6b7280">${minH.temp}°</text>`;

  // Weather icons — every 3 hours, positioned above curve
  const iconSvg = hours.filter((_,i)=>i%3===0).map(h => {
    const i  = hours.indexOf(h);
    const x  = toX(i).toFixed(1);
    const ic = wxIcon(h.code);
    return `<text x="${x}" y="${ICON_H - 6}" text-anchor="middle" font-size="16">${ic.icon}</text>`;
  }).join('');

  // Time labels at 0%, 25%, 50%, 75% — 12A, 6A, 12P, 6P
  const timeLabelY = (ICON_H + GRAPH_H + TIME_H - 2).toFixed(1);
  const timeLabels = [
    {label:'12A', pct:0},
    {label:'6A',  pct:0.25},
    {label:'12P', pct:0.5},
    {label:'6P',  pct:0.75},
  ].map(({label, pct}) => {
    const x   = (PAD_L + pct * (VW - PAD_L - PAD_R)).toFixed(1);
    const anchor = pct === 0 ? 'start' : 'middle';
    return `<text x="${x}" y="${timeLabelY}" text-anchor="${anchor}" font-size="10" font-weight="600" fill="#92928d">${label}</text>`;
  }).join('');

  const svg = `<svg viewBox="0 0 ${VW} ${VH}" preserveAspectRatio="none"
    style="width:100%;height:${VH}px;display:block;flex-shrink:0">
    ${gridLines.join('')}
    <polygon points="${fillPoints}" fill="#2c6bed" opacity="0.08"/>
    <polyline points="${linePoints}" fill="none" stroke="#2c6bed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${precipBars}
    ${hlMarkers}
    ${nowLine}
    ${iconSvg}
    ${timeLabels}
  </svg>`;

  // Stats
  const avgHumidity = Math.round(wx.hours.reduce((s,h)=>s+h.humidity,0)/wx.hours.length);
  const maxWind     = Math.max(...wx.hours.map(h=>h.wind));
  const avgWind     = Math.round(wx.hours.reduce((s,h)=>s+h.wind,0)/wx.hours.length);

  return `<div class="wx-wrap">
    <div class="wx-header">
      <div class="wx-date">📍 ${WX_CITY} · ${dateLabel}</div>
      <div class="wx-main">
        <div class="wx-icon">${curCode.icon}</div>
        <div>
          <div style="display:flex;align-items:baseline;gap:10px">
            <div class="wx-temp">${curTemp}°</div>
            <div class="wx-hilo">H:${wx.hi}° L:${wx.lo}°</div>
          </div>
          <div class="wx-desc">${curCode.desc}</div>
        </div>
      </div>
    </div>
    <div class="wx-section">
      <div class="wx-section-title">Hourly Forecast</div>
      ${svg}
    </div>
    <div style="margin:0 16px 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <div class="wx-stat">
        <div class="wx-stat-lbl">💧 Precipitation</div>
        <div class="wx-stat-val">${wx.precip}%</div>
        <div class="wx-stat-sub">chance today</div>
      </div>
      <div class="wx-stat">
        <div class="wx-stat-lbl">💨 Wind</div>
        <div class="wx-stat-val">${avgWind} mph</div>
        <div class="wx-stat-sub">max ${maxWind} mph</div>
      </div>
      <div class="wx-stat">
        <div class="wx-stat-lbl">💦 Humidity</div>
        <div class="wx-stat-val">${avgHumidity}%</div>
        <div class="wx-stat-sub">average</div>
      </div>
      <div class="wx-stat">
        <div class="wx-stat-lbl">🌡️ Range</div>
        <div class="wx-stat-val">${wx.hi}° / ${wx.lo}°</div>
        <div class="wx-stat-sub">high / low</div>
      </div>
    </div>
  </div>`;
}

function toggleWeather(){
  weatherMode = !weatherMode;
  render(true);
}

function injectWeatherStrip(numDays){
  const wwrap = document.querySelector('.wwrap');
  if(!wwrap) return;

  // Remove any existing strip
  const old = document.getElementById('wx-strip');
  if(old) old.remove();

  // Get date range
  const ww = numDays !== 7;
  const s  = wstart(cur, ww);
  const today = fmt(T);
  const dates = Array.from({length: numDays}, (_,i) => {
    const d = new Date(s); d.setDate(s.getDate()+i); return fmt(d);
  });

  // Only require cache for today + future dates — past dates have no forecast data
  const futureDates  = dates.filter(d => d >= today);
  const anyMissing   = futureDates.some(d => !wxCache[d]);
  if(anyMissing){
    // Fetch starting from today (not the start of the week which may be in the past)
    const fetchFrom = futureDates[0] || today;
    if(!wxFetching && !wxError) fetchWeather(fetchFrom).then(() => { if(weatherMode) injectWeatherStrip(numDays); });
    const strip = document.createElement('div');
    strip.id = 'wx-strip';
    strip.className = 'wx-strip';
    const whead = wwrap.querySelector('.whead');
    const topPx = whead ? whead.offsetHeight : 0;
    strip.style.top = topPx + 'px';
    strip.style.height = '80px';
    strip.innerHTML = `<div class="wx-strip-loading">🌤️ Loading weather…</div>`;
    wwrap.appendChild(strip);
    return;
  }

  // Gather all hours across all days for unified scale
  const allTemps = futureDates.flatMap(d => (wxCache[d]?.hours||[]).map(h=>h.temp));
  if(!allTemps.length) return;
  const globalMin = Math.floor(Math.min(...allTemps)/10)*10;
  const globalMax = Math.ceil(Math.max(...allTemps)/10)*10 + 5;

  // Strip dimensions
  const STRIP_H    = Math.round(wwrap.clientHeight * 0.25);
  const ICON_H     = 20; // px for icon row
  const TIME_H     = 16; // px for time labels
  const GRAPH_H    = STRIP_H - ICON_H - TIME_H;
  const SCALE_W    = 46; // matches .tcol width
  const totalW     = wwrap.clientWidth - SCALE_W;
  const colW       = totalW / numDays;
  const hoursPerDay = 24;

  // Build unified SVG across all days
  // Each day spans colW px, hours are evenly spaced within that
  const toX = (dayIdx, hourIdx) => dayIdx * colW + (hourIdx / (hoursPerDay-1)) * colW;
  const toY = t => GRAPH_H - ((t - globalMin) / (globalMax - globalMin)) * GRAPH_H;

  // Collect all points in order
  let allPoints = [];
  dates.forEach((d, di) => {
    const dayHours = wxCache[d]?.hours || [];
    dayHours.forEach((h, hi) => {
      if(hi < hoursPerDay) allPoints.push({ x: toX(di, hi), y: toY(h.temp), temp: h.temp, code: h.code, prec: h.prec||0 });
    });
  });

  if(allPoints.length < 2) return;

  // Precipitation bars — hourly prec% as semi-transparent cyan bars behind temp curve
  // Each bar width = colW / hoursPerDay, height proportional to prec% of GRAPH_H
  const barW = Math.max(1, colW / hoursPerDay - 1);
  const precipBars = allPoints.map(p => {
    if(p.prec < 5) return ''; // skip negligible
    const barH = (p.prec / 100) * GRAPH_H;
    const bx   = (p.x - barW/2).toFixed(1);
    const by   = (GRAPH_H - barH).toFixed(1);
    return `<rect x="${bx}" y="${by}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" fill="#93c5fd" opacity="0.55" rx="1"/>`;
  }).join('');

  // SVG polyline points
  const linePoints = allPoints.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');
  const fillPoints = linePoints
    + ` ${allPoints[allPoints.length-1].x.toFixed(1)},${GRAPH_H} 0,${GRAPH_H}`;

  // H/L markers per day
  let hlMarkers = '';
  dates.forEach((d, di) => {
    const wx = wxCache[d];
    if(!wx) return;
    const dayHours = wx.hours;
    const maxH = dayHours.reduce((a,b) => a.temp>b.temp?a:b, dayHours[0]);
    const minH = dayHours.reduce((a,b) => a.temp<b.temp?a:b, dayHours[0]);
    const maxIdx = dayHours.indexOf(maxH);
    const minIdx = dayHours.indexOf(minH);
    const hx = toX(di, maxIdx).toFixed(1);
    const hy = (toY(maxH.temp)-12).toFixed(1);
    const lx = toX(di, minIdx).toFixed(1);
    const ly = (toY(minH.temp)+3).toFixed(1);
    hlMarkers += `<circle cx="${hx}" cy="${(parseFloat(hy)+10).toFixed(1)}" r="3" fill="#2c6bed"/>`;
    hlMarkers += `<text x="${hx}" y="${hy}" text-anchor="middle" font-size="9" font-weight="700" fill="#1c1c1a">${maxH.temp}°</text>`;
    hlMarkers += `<circle cx="${lx}" cy="${(parseFloat(ly)-5).toFixed(1)}" r="3" fill="#2c6bed"/>`;
    hlMarkers += `<text x="${lx}" y="${(parseFloat(ly)+8).toFixed(1)}" text-anchor="middle" font-size="9" font-weight="700" fill="#6b7280">${minH.temp}°</text>`;
  });

  // Vertical day dividers on graph
  let dividers = '';
  for(let di=1; di<numDays; di++){
    const x = (di * colW).toFixed(1);
    dividers += `<line x1="${x}" y1="0" x2="${x}" y2="${GRAPH_H}" stroke="#e2e2de" stroke-width="1"/>`;
  }

  // Temp scale lines (horizontal grid)
  let gridLines = '';
  for(let t=globalMin; t<=globalMax; t+=10){
    const y = toY(t).toFixed(1);
    gridLines += `<line x1="0" y1="${y}" x2="${totalW}" y2="${y}" stroke="#e2e2de" stroke-width="1"/>`;
  }

  const svg = `<svg width="${totalW}" height="${GRAPH_H}" viewBox="0 0 ${totalW} ${GRAPH_H}" style="display:block;overflow:visible">
    <defs>
      <linearGradient id="wxsg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#2c6bed" stop-opacity="0.18"/>
        <stop offset="100%" stop-color="#2c6bed" stop-opacity="0.04"/>
      </linearGradient>
    </defs>
    ${gridLines}
    ${dividers}
    <polygon points="${fillPoints}" fill="url(#wxsg)"/>
    <polyline points="${linePoints}" fill="none" stroke="#2c6bed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${precipBars}
    ${hlMarkers}
  </svg>`;

  // Icon row — one icon per 3 hours per day
  const iconCols = dates.map(d => {
    const hrs = (wxCache[d]?.hours||[]).filter((_,i)=>i%4===0);
    const icons = hrs.map(h=>wxIcon(h.code).icon);
    return `<div class="wx-strip-icons" style="width:${colW}px;flex-shrink:0">${icons.map(ic=>`<span class="wx-strip-icon">${ic}</span>`).join('')}</div>`;
  }).join('');

  // Time labels — 12AM, 6AM, 12PM, 6PM per day
  const timeLabels = dates.map(() =>
    `<div class="wx-strip-timelabels" style="width:${colW}px">
      <span class="wx-strip-timelabel" style="left:0%;transform:translateX(0)">12A</span>
      <span class="wx-strip-timelabel" style="left:25%">6A</span>
      <span class="wx-strip-timelabel" style="left:50%">12P</span>
      <span class="wx-strip-timelabel" style="left:75%">6P</span>
    </div>`).join('');

  // Temperature scale on left
  const scaleSteps = [];
  for(let t=globalMax; t>=globalMin; t-=10) scaleSteps.push(t);
  const scaleTicks = scaleSteps.map(t =>
    `<div class="wx-strip-tlbl">${t}°</div>`
  ).join('');

  const strip = document.createElement('div');
  strip.id = 'wx-strip';
  strip.className = 'wx-strip';
  const whead = wwrap.querySelector('.whead');
  const topPx = whead ? whead.offsetHeight : 0;
  strip.style.top = topPx + 'px';
  strip.style.height = STRIP_H+'px';
  strip.innerHTML = `
    <div class="wx-strip-tcol" style="height:${STRIP_H}px">
      <div class="wx-strip-tscale" style="height:${GRAPH_H}px;margin-top:${ICON_H}px">
        ${scaleTicks}
      </div>
    </div>
    <div style="flex:1;display:flex;flex-direction:column;overflow:hidden">
      <div style="display:flex;flex-shrink:0">${iconCols}</div>
      <div style="flex-shrink:0;overflow:hidden">${svg}</div>
      <div style="display:flex;flex-shrink:0">${timeLabels}</div>
    </div>`;

  wwrap.appendChild(strip);
}

// ─── GOOGLE CALENDAR SYNC ───────────────────────────────────────────────────
// Uses a read-only API key from config.js — no OAuth, no popups, works everywhere
// config.js must set: window.GCAL_API_KEY = 'your-key'
//                     window.GCAL_CALENDAR_ID = 'your-email@gmail.com' (optional, defaults to primary)

const GCAL_API_KEY     = window.GCAL_API_KEY     || '';
const GCAL_CALENDAR_ID = window.GCAL_CALENDAR_ID || 'primary';
const GCAL_API         = 'https://www.googleapis.com/calendar/v3';

// Tag → member mapping for bracket tags like [Collin], [Ava], [Amanda], [All]
function buildTagMap(){
  const map = {};
  members.forEach(m=>{ map[m.name.toLowerCase()] = [m.name]; });
  map['collin']  = ['Collin'];
  map['colin']   = ['Collin'];
  map['ava']     = ['Ava'];
  map['zorro']   = ['Zorro'];
  map['amanda']  = ['Mom'];
  map['all']     = members.map(m=>m.name);
  map['family']  = members.map(m=>m.name);
  return map;
}

function parseGcalWho(title, desc){
  const tagMap = buildTagMap();
  const text = (title||'') + ' ' + (desc||'');
  const match = text.match(/\[([^\]]+)\]/i);
  if(match){
    const key = match[1].toLowerCase().trim();
    if(tagMap[key]) return tagMap[key];
  }
  return [members[0]?.name || 'Mom'];
}

function cleanGcalTitle(title){
  return (title||'').replace(/\[[^\]]+\]\s*/g,'').trim() || '(No title)';
}

function gcalToLocal(gev){
  const id = 'gcal_'+gev.id;
  const isAllDay = !!(gev.start?.date && !gev.start?.dateTime);
  let date, endDate, time, end;
  if(isAllDay){
    date = gev.start.date;
    const ed = new Date(gev.end.date+'T12:00:00');
    ed.setDate(ed.getDate()-1);
    endDate = fmt(ed);
    time = '00:00:00'; end = '23:59:00';
  } else {
    const s = new Date(gev.start.dateTime);
    const e = new Date(gev.end.dateTime);
    date    = fmt(s);
    endDate = fmt(e);
    time    = String(s.getHours()).padStart(2,'0')+':'+String(s.getMinutes()).padStart(2,'0')+':00';
    end     = String(e.getHours()).padStart(2,'0')+':'+String(e.getMinutes()).padStart(2,'0')+':00';
  }
  return {
    id, fromGcal: true,
    title   : cleanGcalTitle(gev.summary),
    date, endDate, time, end,
    allDay  : isAllDay,
    who     : parseGcalWho(gev.summary, gev.description),
    loc     : gev.location || '',
    desc    : gev.description || '',
  };
}

let gcalAutoTimer = null;

function syncStatusSet(state, label){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  if(dot) dot.className = 'sync-dot'+(state?' '+state:'');
  if(lbl) lbl.textContent = label;
}

function handleSyncClick(){
  if(!GCAL_API_KEY){
    alert('Add your Google Calendar API key to config.js as:\nwindow.GCAL_API_KEY = "your-key-here";\n\nAlso make sure your calendar is set to public in Google Calendar settings.');
    return;
  }
  gcalFetch();
}

async function gcalFetch(){
  if(!GCAL_API_KEY){ syncStatusSet('','Add API Key'); return; }
  syncStatusSet('syncing','Syncing…');
  try {
    const now  = new Date();
    const tMin = new Date(now); tMin.setMonth(tMin.getMonth()-1); tMin.setDate(1);
    const tMax = new Date(now); tMax.setMonth(tMax.getMonth()+3); tMax.setDate(0);
    const p = new URLSearchParams({
      key          : GCAL_API_KEY,
      timeMin      : tMin.toISOString(),
      timeMax      : tMax.toISOString(),
      maxResults   : '500',
      singleEvents : 'true',
      orderBy      : 'startTime',
    });
    const calId = encodeURIComponent(GCAL_CALENDAR_ID);
    const url = `${GCAL_API}/calendars/${calId}/events?${p}`;
    const r = await fetch(url);
    if(!r.ok){
      const errBody = await r.text();
      throw new Error('HTTP '+r.status);
    }
    const data = await r.json();
    evs = evs.filter(e=>!e.fromGcal);
    (data.items||[]).filter(e=>e.status!=='cancelled').forEach(e=>evs.push(gcalToLocal(e)));
    const t = new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    syncStatusSet('connected','Synced '+t);
    render();
    // After render settles, scroll so current time is centered (or visible if late)
    setTimeout(()=>{
      const body = document.querySelector('.wbody') || document.querySelector('.daybody');
      if(body){
        const SLOT_H  = 104;
        const nowH    = new Date().getHours() + new Date().getMinutes()/60;
        // Cap at 21.5 (9:30pm) so late-night doesn't scroll past end
        const targetH = Math.min(nowH, 21.5);
        const scrollTo = targetH * SLOT_H - body.clientHeight / 2;
        body.scrollTop = Math.max(0, scrollTo);
      }
    }, 50);
    clearTimeout(gcalAutoTimer);
    gcalAutoTimer = setTimeout(gcalFetch, 15*60*1000);
  } catch(err){
    syncStatusSet('error','Sync failed');
    console.error('GCal error:', err);
  }
}

// Auto-sync on load if key is present
if(GCAL_API_KEY) gcalFetch();

// ─── END GOOGLE CALENDAR SYNC ───────────────────────────────────────────────

// ─── GITHUB TASKS STORAGE ───────────────────────────────────────────────────
// Read credentials from window at call time (not at parse time)
// so they work even if config.js loads slowly
function ghToken() { return window.GITHUB_TOKEN || ''; }
function ghOwner() { return window.GITHUB_OWNER || ''; }
function ghRepo()  { return window.GITHUB_REPO  || ''; }
function ghApi()   { return `https://api.github.com/repos/${ghOwner()}/${ghRepo()}/contents/tasks.json`; }

let _ghSha       = null;  // current file SHA — required for updates
let _ghSaveTimer = null;  // debounce timer
let _tasksLoaded = false; // true once tasks have been loaded from GitHub

function ghStatusSet(state, msg){
  const el = document.getElementById('gh-sync-status');
  if(!el) return;
  const colors = {saving:'#c87d12', saved:'#22a06b', error:'#e05b30', '':'var(--muted)'};
  el.textContent = msg;
  el.style.color = colors[state] || 'var(--muted)';
}

// Test GitHub connection — shows exact error in Settings
async function ghTestConnection(){
  const el = document.getElementById('gh-test-result');
  if(!el) return;
  el.style.display = 'block';
  el.style.color = 'var(--muted)';
  el.textContent = 'Testing…';

  if(!ghToken()){ el.style.color='#e05b30'; el.textContent='❌ No token set in config.js'; return; }
  if(!ghOwner() || !ghRepo()){ el.style.color='#e05b30'; el.textContent='❌ GITHUB_OWNER or GITHUB_REPO not set'; return; }

  try {
    // Step 1: test auth against the user endpoint
    const authR = await fetch('https://api.github.com/user', {
      headers: { Authorization: `token ${ghToken()}`, Accept: 'application/vnd.github+json' }
    });
    if(!authR.ok){
      const e = await authR.json().catch(()=>({}));
      el.style.color = '#e05b30';
      el.textContent = `❌ Auth failed (${authR.status}): ${e.message||'bad credentials'}`;
      return;
    }
    const user = await authR.json();

    // Step 2: test repo access
    const repoR = await fetch(`https://api.github.com/repos/${ghOwner()}/${ghRepo()}`, {
      headers: { Authorization: `token ${ghToken()}`, Accept: 'application/vnd.github+json' }
    });
    if(!repoR.ok){
      const e = await repoR.json().catch(()=>({}));
      el.style.color = '#e05b30';
      el.textContent = `✓ Auth OK (${user.login}) but repo access failed (${repoR.status}): ${e.message||''}`;
      return;
    }

    // Step 3: test file access
    const fileR = await fetch(ghApi(), {
      headers: { Authorization: `token ${ghToken()}`, Accept: 'application/vnd.github+json' }
    });
    if(fileR.status === 404){
      el.style.color = '#c87d12';
      el.textContent = `✓ Auth OK (${user.login}), repo OK, but tasks.json not found — create it with [] content`;
      return;
    }
    if(!fileR.ok){
      const e = await fileR.json().catch(()=>({}));
      el.style.color = '#e05b30';
      el.textContent = `✓ Auth OK, repo OK, file error (${fileR.status}): ${e.message||''}`;
      return;
    }
    const fileData = await fileR.json();
    el.style.color = '#22a06b';
    el.textContent = `✅ Everything OK! Logged in as ${user.login}, tasks.json found (${fileData.size} bytes)`;
  } catch(e) {
    el.style.color = '#e05b30';
    el.textContent = `❌ Network error: ${e.message} — check CORS or network`;
  }
}

// Load tasks from GitHub on startup
async function ghLoadTasks(){
  if(!ghToken() || !ghOwner() || !ghRepo()){ return; }
  ghStatusSet('saving', 'Loading tasks…');
  try {
    const r = await fetch(ghApi() + '?t=' + Date.now(), {
      headers: {
        Authorization: `token ${ghToken()}`,
        Accept: 'application/vnd.github+json',
      }
    });
    if(r.status === 404){
      ghStatusSet('', 'Creating tasks.json…');
      await ghSaveNow();
      return;
    }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    _ghSha = data.sha;
    const loaded = JSON.parse(atob(data.content.replace(/\n/g,'')));
    if(Array.isArray(loaded)){
      tasks = loaded;
      _tasksLoaded = true;
      render();
    }
    ghStatusSet('saved', 'Synced');
    setTimeout(() => ghStatusSet('', ''), 2000);
  } catch(e) {
    console.error('GitHub load failed:', e);
    ghStatusSet('error', 'Load failed: '+e.message);
  }
}

// Save tasks to GitHub (called after every change)
async function ghSaveNow(){
  if(!ghToken() || !ghOwner() || !ghRepo()) return;
  ghStatusSet('saving', 'Saving…');
  try {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(tasks, null, 2))));
    const body = {
      message: 'Update tasks',
      content,
      ...(  _ghSha ? { sha: _ghSha } : {} )
    };
    const r = await fetch(ghApi(), {
      method : 'PUT',
      headers: {
        Authorization : `token ${ghToken()}`,
        Accept        : 'application/vnd.github+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if(!r.ok){
      let errMsg = 'HTTP '+r.status;
      try { const err = await r.json(); errMsg = err.message || errMsg; } catch(e){}
      // SHA conflict — re-fetch and retry once
      if(r.status === 409 || r.status === 422){
        ghStatusSet('saving', 'Conflict — retrying…');
        const rGet = await fetch(ghApi(), { headers:{ Authorization:`token ${ghToken()}`, Accept:'application/vnd.github+json' } });
        if(rGet.ok){ const d = await rGet.json(); _ghSha = d.sha; }
        return ghSaveNow();
      }
      throw new Error(errMsg + ' ('+r.status+')');
    }
    const result = await r.json();
    _ghSha = result.content.sha;
    ghStatusSet('saved', '✓ Saved');
    setTimeout(() => ghStatusSet('', ''), 2000);
  } catch(e) {
    console.error('GitHub save failed:', e);
    ghStatusSet('error', e.message || 'Save failed');
  }
}

// Debounced save — waits 1.5s after last change before writing
function ghScheduleSave(){
  if(!_tasksLoaded) return; // don't save until we've loaded from GitHub
  clearTimeout(_ghSaveTimer);
  _ghSaveTimer = setTimeout(ghSaveNow, 800);
}

// Flush any pending save on refresh — but ONLY if tasks were loaded from GitHub first
// (prevents overwriting tasks.json with [] if page is refreshed before load completes)
window.addEventListener('beforeunload', () => {
  if(_ghSaveTimer && _tasksLoaded){
    clearTimeout(_ghSaveTimer);
    ghSaveNow();
  }
});

// ─── END GITHUB TASKS STORAGE ───────────────────────────────────────────────

</script>
